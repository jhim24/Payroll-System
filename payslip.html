<!DOCTYPE html>
<html>
<head>

<title>4 Payslip Bond Paper</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{

background:linear-gradient(
135deg,
#1f1f1f,
#2b2b2b
);

padding:10px;
}

/* HEADER */

.topbar{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:10px;

background:linear-gradient(
135deg,
#ffcc00,
#ff8800
);

padding:12px;

border-radius:12px;

box-shadow:0 5px 15px rgba(0,0,0,0.5);

flex-wrap:wrap;

gap:10px;
}

.title{

font-size:24px;

font-weight:bold;

color:black;
}

/* BUTTON */

.btn{

padding:8px 16px;

border:none;

border-radius:8px;

cursor:pointer;

font-weight:bold;

font-size:12px;

transition:0.3s;
}

.btn:hover{

transform:scale(1.03);
}

.back-btn{

background:#cc0000;

color:white;
}

.print-btn{

background:#008000;

color:white;
}

.next-btn{

background:#0066cc;

color:white;
}

/* PAPER */

.paper{

width:190mm;

height:270mm;

margin:auto;

background:white;

padding:5mm;

display:grid;

grid-template-columns:1fr 1fr;

grid-template-rows:1fr 1fr;

gap:6px;

overflow:hidden;

border-radius:10px;

box-shadow:0 5px 20px rgba(0,0,0,0.5);
}

/* PAYSLIP */

.payslip{

border:2px solid #ffcc00;

border-radius:10px;

padding:8px;

display:flex;

flex-direction:column;

justify-content:space-between;

overflow:hidden;

background:#f9f9f9;
}

/* COMPANY */

.company{

text-align:center;

margin-bottom:5px;

padding-bottom:4px;

border-bottom:2px solid #ffcc00;
}

.company h2{

font-size:14px;

color:#cc0000;
}

.company p{

font-size:9px;

font-weight:bold;

color:#444;
}

/* INFO */

.info{

font-size:10px;

line-height:1.5;

margin-bottom:5px;

background:#fff8dc;

padding:5px;

border-radius:5px;

border:1px solid #ffcc00;
}

/* TABLE */

table{

width:100%;

border-collapse:collapse;

font-size:9px;

margin-top:4px;
}

th,
td{

border:1px solid #999;

padding:3px;
}

th{

background:#ffcc00;

color:black;

font-size:9px;
}

td{

background:white;
}

/* TOTAL */

.total{

margin-top:6px;

padding:5px;

background:#008000;

color:white;

border-radius:5px;

font-size:11px;

font-weight:bold;

text-align:right;
}

/* SIGNATURE */

.signature{

margin-top:10px;

display:flex;

justify-content:space-between;

font-size:8px;
}

.line{

margin-top:12px;

border-top:1px solid black;

width:90px;

text-align:center;

padding-top:2px;

font-weight:bold;
}

/* PAGE NUMBER */

.page-info{

color:white;

font-weight:bold;

font-size:14px;
}

/* PRINT */

@media print{

@page{
size:A4 portrait;
margin:5mm;
}

body{

background:white;
padding:0;
}

.topbar{

display:none;
}

.paper{

border:none;

box-shadow:none;

width:190mm;

height:270mm;

padding:0;

overflow:hidden;

page-break-after:avoid;
}

.payslip{

box-shadow:none;
}

}

</style>

</head>

<body>

<!-- HEADER -->

<div class="topbar">

<div class="title">
💰 PAYSLIP SYSTEM
</div>

<div class="page-info" id="pageInfo">

PAGE 1

</div>

<div style="display:flex;gap:10px;flex-wrap:wrap;">

<button
class="btn back-btn"
onclick="window.history.back()">

← BACK

</button>

<button
class="btn next-btn"
onclick="prevPage()">

⬅ PREV

</button>

<button
class="btn next-btn"
onclick="nextPage()">

NEXT ➡

</button>

<button
class="btn print-btn"
onclick="window.print()">

🖨 PRINT

</button>

</div>

</div>

<!-- PAPER -->

<div class="paper" id="paper">

</div>

<script>

/* =========================
LOAD PAYROLL
========================= */

let payrollRecords = [];

try{

payrollRecords = JSON.parse(
localStorage.getItem('payroll')
) || [];

}catch(error){

payrollRecords = [];

}

/* =========================
VARIABLES
========================= */

let currentPage = 0;

const perPage = 4;

/* =========================
RENDER PAYSLIP
========================= */

function renderPayslips(){

let paper =
document.getElementById('paper');

paper.innerHTML = '';

let start =
currentPage * perPage;

let end =
start + perPage;

let currentRecords =
payrollRecords.slice(start,end);

/* FILL EMPTY */

while(currentRecords.length < 4){

currentRecords.push(null);

}

/* LOOP */

currentRecords.forEach(pay=>{

let div =
document.createElement('div');

div.className = 'payslip';

if(pay){

div.innerHTML = `

<div>

<div class="company">

<h2>PAPPRITO</h2>

<p>OFFICIAL EMPLOYEE PAYSLIP</p>

</div>

<div class="info">

<b>Employee:</b>
${pay.employee || '-'}

<br>

<b>Date:</b>
${new Date().toDateString()}

</div>

<table>

<tr>
<th>EARNINGS</th>
<th>AMOUNT</th>
</tr>

<tr>
<td>Gross Pay</td>
<td>
${Number(pay.gross || 0).toFixed(2)}
</td>
</tr>

<tr>
<td>Overtime</td>
<td>
${Number(pay.overtime || 0).toFixed(2)}
</td>
</tr>

<tr>
<td>Holiday</td>
<td>
${Number(pay.holiday || 0).toFixed(2)}
</td>
</tr>

<tr>
<td>Sick Leave</td>
<td>
${Number(pay.sick || 0).toFixed(2)}
</td>
</tr>

<tr>
<td>Birthday Leave</td>
<td>
${Number(pay.birthday || 0).toFixed(2)}
</td>
</tr>

<tr>
<td>Vacation Leave</td>
<td>
${Number(pay.vacation || 0).toFixed(2)}
</td>
</tr>

</table>

<table>

<tr>
<th>DEDUCTIONS</th>
<th>AMOUNT</th>
</tr>

<tr>
<td>SSS</td>
<td>
${Number(pay.sss || 0).toFixed(2)}
</td>
</tr>

<tr>
<td>PhilHealth</td>
<td>
${Number(pay.philhealth || 0).toFixed(2)}
</td>
</tr>

<tr>
<td>Pag-IBIG</td>
<td>
${Number(pay.pagibig || 0).toFixed(2)}
</td>
</tr>

<tr>
<td>Other</td>
<td>
${Number(pay.other || 0).toFixed(2)}
</td>
</tr>

</table>

<div class="total">

NET PAY :
${Number(pay.net || 0).toFixed(2)}

</div>

</div>

<div class="signature">

<div class="line">
Employer
</div>

<div class="line">
Employee
</div>

</div>

`;

}

paper.appendChild(div);

});

/* PAGE INFO */

pageInfo.innerText =
'PAGE ' + (currentPage + 1);

}

/* =========================
NEXT PAGE
========================= */

function nextPage(){

if(
(currentPage + 1) * perPage
<
payrollRecords.length
){

currentPage++;

renderPayslips();

}

}

/* =========================
PREV PAGE
========================= */

function prevPage(){

if(currentPage > 0){

currentPage--;

renderPayslips();

}

}

/* =========================
AUTO LOAD
========================= */

renderPayslips();

</script>

</body>
</html>
