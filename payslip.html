<!DOCTYPE html>
<html>
<head>

<title>Payslip System</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{

background:#d4d0c8;

padding:15px;
}

/* CONTAINER */

.container{

max-width:1200px;

margin:auto;

}

/* HEADER */

.header{

background:#c0c0c0;

padding:15px;

border:2px solid #808080;

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:15px;
}

.title{

font-size:28px;

font-weight:bold;
}

/* BUTTON */

.btn{

padding:8px 18px;

background:#dcdcdc;

border-top:1px solid white;
border-left:1px solid white;

border-right:1px solid #808080;
border-bottom:1px solid #808080;

cursor:pointer;

font-weight:bold;

font-size:12px;
}

.print-btn{
background:#008000;
color:white;
}

/* SELECT */

.select-box{

background:#c0c0c0;

padding:15px;

border:2px solid #808080;

margin-bottom:15px;
}

select{

width:100%;

padding:10px;

border:1px solid #808080;

font-size:14px;
}

/* WHOLE PAGE */

.paper{

background:white;

width:100%;

min-height:1123px;

padding:20px;

border:2px solid #808080;

display:grid;

grid-template-columns:1fr 1fr;

grid-template-rows:1fr 1fr;

gap:20px;
}

/* PAYSLIP */

.payslip{

border:2px dashed #808080;

padding:15px;

display:flex;

flex-direction:column;

justify-content:space-between;
}

/* COMPANY */

.company{

text-align:center;

margin-bottom:10px;
}

.company h2{

font-size:20px;
}

.company p{

font-size:12px;
}

/* INFO */

.info{

margin-top:10px;

font-size:12px;

line-height:1.6;
}

/* TABLE */

table{

width:100%;

border-collapse:collapse;

margin-top:10px;

font-size:11px;
}

th,
td{

border:1px solid #808080;

padding:5px;
}

th{

background:#dcdcdc;
}

/* TOTAL */

.total{

margin-top:10px;

font-size:14px;

font-weight:bold;

text-align:right;
}

/* SIGN */

.signature{

margin-top:20px;

display:flex;

justify-content:space-between;

font-size:11px;
}

.line{

margin-top:25px;

border-top:1px solid black;

padding-top:3px;

width:120px;

text-align:center;
}

/* PRINT */

@media print{

body{
background:white;
padding:0;
}

.header,
.select-box{
display:none;
}

.paper{

border:none;

padding:0;

gap:10px;
}

.payslip{

break-inside:avoid;
}

}

</style>

</head>

<body>

<div class="container">

<!-- HEADER -->

<div class="header">

<div class="title">
PAYSLIP SYSTEM
</div>

<div>

<button
class="btn"
onclick="window.history.back()">

← BACK

</button>

<button
class="btn print-btn"
onclick="window.print()">

🖨 PRINT

</button>

</div>

</div>

<!-- SELECT -->

<div class="select-box">

<select id="payrollSelect" onchange="loadPayslip()">

<option value="">
Select Payroll Record
</option>

</select>

</div>

<!-- WHOLE BOND -->

<div class="paper">

<!-- PAYSLIP 1 -->

<div class="payslip">

<div>

<div class="company">

<h2>COMPANY NAME</h2>

<p>OFFICIAL PAYSLIP</p>

</div>

<div class="info">

<b>Employee :</b>
<span class="empName">-</span>

<br>

<b>Date :</b>
<span class="payDate">-</span>

</div>

<table>

<tr>
<th>EARNINGS</th>
<th>AMOUNT</th>
</tr>

<tr>
<td>Gross Pay</td>
<td class="gross">0.00</td>
</tr>

<tr>
<td>Overtime</td>
<td class="overtime">0.00</td>
</tr>

<tr>
<td>Holiday</td>
<td class="holiday">0.00</td>
</tr>

<tr>
<td>Sick Leave</td>
<td class="sick">0.00</td>
</tr>

<tr>
<td>Birthday Leave</td>
<td class="birthday">0.00</td>
</tr>

<tr>
<td>Vacation Leave</td>
<td class="vacation">0.00</td>
</tr>

</table>

<table>

<tr>
<th>DEDUCTIONS</th>
<th>AMOUNT</th>
</tr>

<tr>
<td>SSS</td>
<td class="sss">0.00</td>
</tr>

<tr>
<td>PhilHealth</td>
<td class="philhealth">0.00</td>
</tr>

<tr>
<td>Pag-IBIG</td>
<td class="pagibig">0.00</td>
</tr>

<tr>
<td>Other</td>
<td class="other">0.00</td>
</tr>

</table>

<div class="total">

NET PAY :
<span class="net">0.00</span>

</div>

</div>

<div class="signature">

<div class="line">
Employer
</div>

<div class="line">
Employee
</div>

</div>

</div>

<!-- COPY 2 -->

<div class="payslip copy"></div>

<!-- COPY 3 -->

<div class="payslip copy"></div>

<!-- COPY 4 -->

<div class="payslip copy"></div>

</div>

</div>

<script>

/* DUPLICATE */

document.querySelectorAll('.copy')

.forEach(copy=>{

copy.innerHTML =

document.querySelector('.payslip')
.innerHTML;

});

/* STORAGE */

let payrollRecords = [];

try{

payrollRecords = JSON.parse(
localStorage.getItem('payroll')
) || [];

}catch(error){

payrollRecords = [];

}

/* LOAD DROPDOWN */

function loadDropdown(){

payrollRecords.forEach((pay,index)=>{

payrollSelect.innerHTML += `

<option value="${index}">

${pay.employee}

</option>

`;

});

}

/* LOAD PAYSLIP */

function loadPayslip(){

let index =
payrollSelect.value;

if(index==='') return;

let pay =
payrollRecords[index];

document
.querySelectorAll('.empName')

.forEach(el=>{

el.innerText =
pay.employee || '-';

});

document
.querySelectorAll('.payDate')

.forEach(el=>{

el.innerText =
new Date().toDateString();

});

document
.querySelectorAll('.gross')

.forEach(el=>{

el.innerText =
Number(pay.gross || 0)
.toFixed(2);

});

document
.querySelectorAll('.overtime')

.forEach(el=>{

el.innerText =
Number(pay.overtime || 0)
.toFixed(2);

});

document
.querySelectorAll('.holiday')

.forEach(el=>{

el.innerText =
Number(pay.holiday || 0)
.toFixed(2);

});

document
.querySelectorAll('.sick')

.forEach(el=>{

el.innerText =
Number(pay.sick || 0)
.toFixed(2);

});

document
.querySelectorAll('.birthday')

.forEach(el=>{

el.innerText =
Number(pay.birthday || 0)
.toFixed(2);

});

document
.querySelectorAll('.vacation')

.forEach(el=>{

el.innerText =
Number(pay.vacation || 0)
.toFixed(2);

});

document
.querySelectorAll('.sss')

.forEach(el=>{

el.innerText =
Number(pay.sss || 0)
.toFixed(2);

});

document
.querySelectorAll('.philhealth')

.forEach(el=>{

el.innerText =
Number(pay.philhealth || 0)
.toFixed(2);

});

document
.querySelectorAll('.pagibig')

.forEach(el=>{

el.innerText =
Number(pay.pagibig || 0)
.toFixed(2);

});

document
.querySelectorAll('.other')

.forEach(el=>{

el.innerText =
Number(pay.other || 0)
.toFixed(2);

});

document
.querySelectorAll('.net')

.forEach(el=>{

el.innerText =
Number(pay.net || 0)
.toFixed(2);

});

}

/* AUTO LOAD */

loadDropdown();

</script>

</body>
</html>
