<!DOCTYPE html>
<html>
<head>

<title>4 Payslip Bond Paper</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{

background:linear-gradient(
135deg,
#1f1f1f,
#2b2b2b
);

padding:15px;
}

/* HEADER */

.topbar{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:15px;

background:linear-gradient(
135deg,
#ffcc00,
#ff8800
);

padding:15px;

border-radius:15px;

box-shadow:0 5px 15px rgba(0,0,0,0.5);
}

.title{

font-size:30px;

font-weight:bold;

color:black;

text-shadow:1px 1px 3px white;
}

/* BUTTON */

.btn{

padding:10px 20px;

border:none;

border-radius:10px;

cursor:pointer;

font-weight:bold;

font-size:13px;

transition:0.3s;

box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

.btn:hover{

transform:translateY(-2px);

filter:brightness(1.1);
}

.back-btn{

background:#cc0000;

color:white;
}

.print-btn{

background:#008000;

color:white;
}

/* PAPER */

.paper{

width:210mm;

min-height:297mm;

margin:auto;

background:white;

padding:10mm;

display:grid;

grid-template-columns:1fr 1fr;

grid-template-rows:1fr 1fr;

gap:12px;

border-radius:10px;

box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

/* PAYSLIP */

.payslip{

border:3px solid #ffcc00;

border-radius:12px;

padding:12px;

display:flex;

flex-direction:column;

justify-content:space-between;

overflow:hidden;

background:linear-gradient(
135deg,
#ffffff,
#f5f5f5
);

box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* COMPANY */

.company{

text-align:center;

margin-bottom:10px;

padding-bottom:8px;

border-bottom:2px solid #ffcc00;
}

.company h2{

font-size:18px;

color:#cc0000;
}

.company p{

font-size:10px;

font-weight:bold;

color:#555;
}

/* INFO */

.info{

font-size:11px;

line-height:1.7;

margin-bottom:8px;

background:#fff8dc;

padding:8px;

border-radius:8px;

border:1px solid #ffcc00;
}

/* TABLE */

table{

width:100%;

border-collapse:collapse;

font-size:10px;

margin-top:8px;
}

th,
td{

border:1px solid #999;

padding:4px;
}

th{

background:#ffcc00;

color:black;

font-size:10px;
}

td{

background:white;
}

/* TOTAL */

.total{

margin-top:10px;

padding:8px;

background:#008000;

color:white;

border-radius:8px;

font-size:13px;

font-weight:bold;

text-align:right;
}

/* SIGNATURE */

.signature{

margin-top:18px;

display:flex;

justify-content:space-between;

font-size:9px;
}

.line{

margin-top:18px;

border-top:1px solid black;

width:100px;

text-align:center;

padding-top:3px;

font-weight:bold;
}

/* PRINT */

@media print{

body{

background:white;
padding:0;
}

.topbar{

display:none;
}

.paper{

border:none;

box-shadow:none;

padding:0;

width:100%;
}

.payslip{

box-shadow:none;
}

}

</style>

</head>

<body>

<!-- HEADER -->

<div class="topbar">

<div class="title">
💰 PAYSLIP SYSTEM
</div>

<div>

<button
class="btn back-btn"
onclick="window.history.back()">

← BACK

</button>

<button
class="btn print-btn"
onclick="window.print()">

🖨 PRINT

</button>

</div>

</div>

<!-- PAPER -->

<div class="paper" id="paper">

</div>

<script>

/* LOAD PAYROLL */

let payrollRecords = [];

try{

payrollRecords = JSON.parse(
localStorage.getItem('payroll')
) || [];

}catch(error){

payrollRecords = [];

}

/* PAPER */

let paper =
document.getElementById('paper');

/* SHOW ONLY 4 STAFF */

let firstFour =
payrollRecords.slice(0,4);

/* EMPTY */

while(firstFour.length < 4){

firstFour.push(null);

}

/* CREATE */

firstFour.forEach(pay=>{

let div =
document.createElement('div');

div.className = 'payslip';

if(pay){

div.innerHTML = `

<div>

<div class="company">

<h2>COMPANY NAME</h2>

<p>OFFICIAL EMPLOYEE PAYSLIP</p>

</div>

<div class="info">

<b>Employee:</b>
${pay.employee || '-'}

<br>

<b>Date:</b>
${new Date().toDateString()}

</div>

<table>

<tr>
<th>EARNINGS</th>
<th>AMOUNT</th>
</tr>

<tr>
<td>Gross Pay</td>
<td>
${Number(pay.gross || 0).toFixed(2)}
</td>
</tr>

<tr>
<td>Overtime</td>
<td>
${Number(pay.overtime || 0).toFixed(2)}
</td>
</tr>

<tr>
<td>Holiday</td>
<td>
${Number(pay.holiday || 0).toFixed(2)}
</td>
</tr>

<tr>
<td>Sick Leave</td>
<td>
${Number(pay.sick || 0).toFixed(2)}
</td>
</tr>

<tr>
<td>Birthday Leave</td>
<td>
${Number(pay.birthday || 0).toFixed(2)}
</td>
</tr>

<tr>
<td>Vacation Leave</td>
<td>
${Number(pay.vacation || 0).toFixed(2)}
</td>
</tr>

</table>

<table>

<tr>
<th>DEDUCTIONS</th>
<th>AMOUNT</th>
</tr>

<tr>
<td>SSS</td>
<td>
${Number(pay.sss || 0).toFixed(2)}
</td>
</tr>

<tr>
<td>PhilHealth</td>
<td>
${Number(pay.philhealth || 0).toFixed(2)}
</td>
</tr>

<tr>
<td>Pag-IBIG</td>
<td>
${Number(pay.pagibig || 0).toFixed(2)}
</td>
</tr>

<tr>
<td>Other</td>
<td>
${Number(pay.other || 0).toFixed(2)}
</td>
</tr>

</table>

<div class="total">

NET PAY :
${Number(pay.net || 0).toFixed(2)}

</div>

</div>

<div class="signature">

<div class="line">
Employer
</div>

<div class="line">
Employee
</div>

</div>

`;

}

paper.appendChild(div);

});

</script>

</body>
</html>
