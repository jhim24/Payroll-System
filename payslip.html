<!DOCTYPE html>
<html>
<head>

<title>4 Payslip Bond Paper</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#d4d0c8;
padding:15px;
}

/* HEADER */

.topbar{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:15px;

background:#c0c0c0;

padding:15px;

border:2px solid #808080;
}

.title{

font-size:28px;

font-weight:bold;
}

/* BUTTON */

.btn{

padding:8px 18px;

background:#dcdcdc;

border-top:1px solid white;
border-left:1px solid white;

border-right:1px solid #808080;
border-bottom:1px solid #808080;

cursor:pointer;

font-weight:bold;
}

/* PAPER */

.paper{

width:210mm;

min-height:297mm;

margin:auto;

background:white;

padding:10mm;

display:grid;

grid-template-columns:1fr 1fr;

grid-template-rows:1fr 1fr;

gap:10px;

border:2px solid #808080;
}

/* PAYSLIP */

.payslip{

border:1px dashed #808080;

padding:10px;

display:flex;

flex-direction:column;

justify-content:space-between;

overflow:hidden;
}

/* COMPANY */

.company{

text-align:center;

margin-bottom:8px;
}

.company h2{

font-size:16px;
}

.company p{

font-size:10px;
}

/* INFO */

.info{

font-size:11px;

line-height:1.5;

margin-bottom:8px;
}

/* TABLE */

table{

width:100%;

border-collapse:collapse;

font-size:10px;

margin-top:5px;
}

th,
td{

border:1px solid #808080;

padding:3px;
}

th{

background:#dcdcdc;
}

/* TOTAL */

.total{

margin-top:8px;

font-size:12px;

font-weight:bold;

text-align:right;
}

/* SIGNATURE */

.signature{

margin-top:15px;

display:flex;

justify-content:space-between;

font-size:9px;
}

.line{

margin-top:18px;

border-top:1px solid black;

width:100px;

text-align:center;

padding-top:2px;
}

/* PRINT */

@media print{

body{
background:white;
padding:0;
}

.topbar{
display:none;
}

.paper{

border:none;

width:100%;

min-height:auto;

padding:0;
}

}

</style>

</head>

<body>

<!-- TOP -->

<div class="topbar">

<div class="title">
PAYSLIP SYSTEM
</div>

<div>

<button
class="btn"
onclick="window.history.back()">

← BACK

</button>

<button
class="btn"
onclick="window.print()">

🖨 PRINT

</button>

</div>

</div>

<!-- PAPER -->

<div class="paper" id="paper">

</div>

<script>

/* LOAD PAYROLL */

let payrollRecords = [];

try{

payrollRecords = JSON.parse(
localStorage.getItem('payroll')
) || [];

}catch(error){

payrollRecords = [];

}

/* PAPER */

let paper =
document.getElementById('paper');

/* SHOW ONLY 4 STAFF */

let firstFour =
payrollRecords.slice(0,4);

/* EMPTY BOXES */

while(firstFour.length < 4){

firstFour.push(null);

}

/* CREATE PAYSLIPS */

firstFour.forEach(pay=>{

let div =
document.createElement('div');

div.className = 'payslip';

if(pay){

div.innerHTML = `

<div>

<div class="company">

<h2>COMPANY NAME</h2>

<p>OFFICIAL PAYSLIP</p>

</div>

<div class="info">

<b>Employee:</b>
${pay.employee || '-'}

<br>

<b>Date:</b>
${new Date().toDateString()}

</div>

<table>

<tr>
<th>EARNINGS</th>
<th>AMOUNT</th>
</tr>

<tr>
<td>Gross Pay</td>
<td>
${Number(pay.gross || 0).toFixed(2)}
</td>
</tr>

<tr>
<td>Overtime</td>
<td>
${Number(pay.overtime || 0).toFixed(2)}
</td>
</tr>

<tr>
<td>Holiday</td>
<td>
${Number(pay.holiday || 0).toFixed(2)}
</td>
</tr>

<tr>
<td>Sick Leave</td>
<td>
${Number(pay.sick || 0).toFixed(2)}
</td>
</tr>

<tr>
<td>Birthday Leave</td>
<td>
${Number(pay.birthday || 0).toFixed(2)}
</td>
</tr>

<tr>
<td>Vacation Leave</td>
<td>
${Number(pay.vacation || 0).toFixed(2)}
</td>
</tr>

</table>

<table>

<tr>
<th>DEDUCTIONS</th>
<th>AMOUNT</th>
</tr>

<tr>
<td>SSS</td>
<td>
${Number(pay.sss || 0).toFixed(2)}
</td>
</tr>

<tr>
<td>PhilHealth</td>
<td>
${Number(pay.philhealth || 0).toFixed(2)}
</td>
</tr>

<tr>
<td>Pag-IBIG</td>
<td>
${Number(pay.pagibig || 0).toFixed(2)}
</td>
</tr>

<tr>
<td>Other</td>
<td>
${Number(pay.other || 0).toFixed(2)}
</td>
</tr>

</table>

<div class="total">

NET PAY :
${Number(pay.net || 0).toFixed(2)}

</div>

</div>

<div class="signature">

<div class="line">
Employer
</div>

<div class="line">
Employee
</div>

</div>

`;

}else{

div.innerHTML = '';

}

paper.appendChild(div);

});

</script>

</body>
</html>
