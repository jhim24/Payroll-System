<!DOCTYPE html>
<html>
<head>

<title>Employee Request Portal</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#1f1f1f;
padding:15px;
color:white;
}

.container{

max-width:1200px;

margin:auto;

background:#2b2b2b;

border:3px solid #ffcc00;

border-radius:15px;

overflow:hidden;
}

/* HEADER */

.header{

background:linear-gradient(
135deg,
#ffcc00,
#ff8800
);

padding:15px;

display:flex;

justify-content:space-between;

align-items:center;

flex-wrap:wrap;
}

.title{

font-size:28px;

font-weight:bold;

color:black;
}

/* BUTTON */

.btn{

padding:10px 18px;

border:none;

border-radius:10px;

cursor:pointer;

font-weight:bold;

font-size:13px;
}

.back-btn{
background:#0066cc;
color:white;
}

.save-btn{
background:#008000;
color:white;
}

/* FORM */

.form-section{
padding:20px;
}

.form-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:12px;
}

input,
select,
textarea{

width:100%;

padding:10px;

border-radius:10px;

border:2px solid #555;

background:#1f1f1f;

color:white;
}

/* TABLE */

.table-wrapper{

margin-top:20px;

overflow:auto;

background:white;

border-radius:10px;
}

table{

width:100%;

border-collapse:collapse;

min-width:1000px;
}

th,
td{

border:1px solid #999;

padding:10px;

text-align:center;
}

th{

background:#ffcc00;

color:black;
}

td{
color:black;
}

/* STATUS */

.pending{
color:orange;
font-weight:bold;
}

.approved{
color:green;
font-weight:bold;
}

.rejected{
color:red;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<!-- HEADER -->

<div class="header">

<div class="title">
👨‍💼 EMPLOYEE REQUEST
</div>

<button
class="btn back-btn"
onclick="window.location.href='index.html'">

← BACK

</button>

</div>

<!-- FORM -->

<div class="form-section">

<div class="form-grid">

<select id="employee">

<option value="">
Select Employee
</option>

</select>

<select id="requestType">

<option value="">
Select Request
</option>

<option>DAY OFF</option>

<option>VACATION LEAVE</option>

<option>BIRTHDAY LEAVE</option>

<option>SICK LEAVE</option>

</select>

<input
type="date"
id="requestDate">

<input
type="number"
id="days"
placeholder="Number of Days">

<textarea
id="reason"
placeholder="Reason"></textarea>

</div>

<br>

<button
class="btn save-btn"
onclick="submitRequest()">

SUBMIT REQUEST

</button>

<!-- TABLE -->

<div class="table-wrapper">

<table>

<thead>

<tr>

<th>EMPLOYEE ID</th>
<th>EMPLOYEE</th>
<th>REQUEST</th>
<th>DATE</th>
<th>DAYS</th>
<th>REASON</th>
<th>STATUS</th>

</tr>

</thead>

<tbody id="requestBody">

</tbody>

</table>

</div>

</div>

</div>

<script>

/* LOAD EMPLOYEES */

function loadEmployees(){

let employees =

JSON.parse(
localStorage.getItem('employees')
) || [];

employee.innerHTML =
'<option value="">Select Employee</option>';

employees.forEach(emp=>{

let fullname =

(emp[0] || '') + ' ' +
(emp[1] || '') + ' ' +
(emp[2] || '');

let empId =
emp[18] || 'NO-ID';

employee.innerHTML += `

<option value="${fullname}"
data-id="${empId}">

${empId} - ${fullname}

</option>

`;

});

}

/* STORAGE */

let requests =

JSON.parse(
localStorage.getItem('employeeRequests')
) || [];

/* SUBMIT */

function submitRequest(){

if(employee.value===''){

alert('Select Employee');

return;

}

let selected =
employee.options[
employee.selectedIndex
];

let empId =
selected.dataset.id;

let data = {

empid:empId,

employee:employee.value,

type:requestType.value,

date:requestDate.value,

days:days.value,

reason:reason.value,

status:'PENDING'

};

requests.push(data);

localStorage.setItem(
'employeeRequests',
JSON.stringify(requests)
);

alert('Request Submitted');

renderRequests();

}

/* RENDER */

function renderRequests(){

requestBody.innerHTML='';

requests.forEach(req=>{

let statusClass =
req.status.toLowerCase();

requestBody.innerHTML += `

<tr>

<td>${req.empid}</td>

<td>${req.employee}</td>

<td>${req.type}</td>

<td>${req.date}</td>

<td>${req.days}</td>

<td>${req.reason}</td>

<td class="${statusClass}">
${req.status}
</td>

</tr>

`;

});

}

/* AUTO LOAD */

loadEmployees();

renderRequests();

</script>

</body>
</html>
