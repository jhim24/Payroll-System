<!DOCTYPE html>
<html>
<head>

<title>Employee Portal</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{

background:linear-gradient(
135deg,
#1f1f1f,
#2b2b2b
);

padding:15px;

color:white;
}

/* CONTAINER */

.container{

max-width:1200px;

margin:auto;

background:#2b2b2b;

border:3px solid #ffcc00;

border-radius:15px;

overflow:hidden;

box-shadow:0 5px 20px rgba(0,0,0,0.5);
}

/* HEADER */

.header{

background:linear-gradient(
135deg,
#ffcc00,
#ff8800
);

padding:15px;

display:flex;

justify-content:space-between;

align-items:center;

flex-wrap:wrap;

gap:10px;
}

.title{

font-size:28px;

font-weight:bold;

color:black;
}

/* BUTTON */

.btn{

padding:10px 18px;

border:none;

border-radius:10px;

cursor:pointer;

font-weight:bold;

transition:0.3s;

font-size:13px;
}

.btn:hover{

transform:scale(1.03);
}

.back-btn{

background:#0066cc;

color:white;
}

.logout-btn{

background:#cc0000;

color:white;
}

.save-btn{

background:#008000;

color:white;
}

.edit-btn{

background:#0066cc;

color:white;
}

.delete-btn{

background:#cc0000;

color:white;
}

/* HEADER BUTTONS */

.header-buttons{

display:flex;

gap:10px;

flex-wrap:wrap;
}

/* FORM */

.form-section{

padding:20px;
}

.form-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:12px;
}

input,
select,
textarea{

width:100%;

padding:10px;

border:2px solid #555;

border-radius:10px;

background:#1f1f1f;

color:white;

font-size:13px;
}

input:focus,
select:focus,
textarea:focus{

outline:none;

border-color:#ffcc00;
}

/* TABLE */

.table-wrapper{

margin-top:20px;

overflow:auto;

background:white;

border-radius:10px;
}

table{

width:100%;

border-collapse:collapse;

min-width:1300px;

font-size:12px;
}

th,
td{

border:1px solid #999;

padding:10px;

text-align:center;
}

th{

background:#ffcc00;

color:black;

position:sticky;

top:0;
}

td{

background:white;

color:black;
}

/* STATUS */

.pending{

color:#ff8800;

font-weight:bold;
}

.approved{

color:green;

font-weight:bold;
}

.rejected{

color:red;

font-weight:bold;
}

/* TITLE BOX */

.section-title{

margin-bottom:15px;

font-size:22px;

color:#ffcc00;
}

/* EMPLOYEE INFO */

.employee-info{

background:#1f1f1f;

padding:15px;

border-radius:10px;

margin-bottom:20px;

border:2px solid #ffcc00;

line-height:1.8;
}

.employee-info span{

color:#ffcc00;

font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<!-- HEADER -->

<div class="header">

<div class="title">
👨‍💼 EMPLOYEE PORTAL
</div>

<div class="header-buttons">

<button
class="btn back-btn"
onclick="window.location.href='index.html'">

← BACK

</button>

<button
class="btn logout-btn"
onclick="logout()">

🚪 LOG OUT

</button>

</div>

</div>

<!-- FORM -->

<div class="form-section">

<!-- EMPLOYEE INFO -->

<div class="employee-info">

<div>
<span>Connected Employee:</span>
<div id="employeeConnected">
No Employee Selected
</div>
</div>

</div>

<div class="section-title">

Employee Request Form

</div>

<div class="form-grid">

<select id="employee" onchange="showEmployeeInfo()">

<option value="">
Select Employee
</option>

</select>

<select id="requestType">

<option value="">
Select Request
</option>

<option>DAY OFF</option>

<option>VACATION LEAVE</option>

<option>BIRTHDAY LEAVE</option>

<option>SICK LEAVE</option>

</select>

<input
type="date"
id="requestDate">

<input
type="number"
id="days"
placeholder="Number of Days">

<textarea
id="reason"
placeholder="Reason / Notes"></textarea>

</div>

<br>

<button
class="btn save-btn"
onclick="submitRequest()">

SUBMIT REQUEST

</button>

<!-- TABLE -->

<div class="table-wrapper">

<table>

<thead>

<tr>

<th>EMPLOYEE ID</th>

<th>EMPLOYEE</th>

<th>REQUEST TYPE</th>

<th>DATE</th>

<th>DAYS</th>

<th>REASON</th>

<th>STATUS</th>

<th>ACTION</th>

</tr>

</thead>

<tbody id="requestBody">

</tbody>

</table>

</div>

</div>

</div>

<script>

/* =========================
LOGOUT
========================= */

function logout(){

let confirmLogout = confirm(
'Are you sure you want to logout?'
);

if(confirmLogout){

localStorage.removeItem(
'userRole'
);

window.location.href =
'login.html';

}

}

/* =========================
EMPLOYEE STORAGE
========================= */

let employeeMasterlist = [];

try{

employeeMasterlist = JSON.parse(
localStorage.getItem('employees')
) || [];

}catch(error){

employeeMasterlist = [];

}

/* =========================
LOAD EMPLOYEES
========================= */

function loadEmployees(){

employee.innerHTML =
'<option value="">Select Employee</option>';

employeeMasterlist.forEach(emp=>{

let fullname =

(emp[0] || '') + ' ' +
(emp[1] || '') + ' ' +
(emp[2] || '');

let empId =
emp[18] || 'NO-ID';

let option =
document.createElement('option');

option.value = fullname;

option.textContent =
empId + ' - ' + fullname;

option.dataset.empid =
empId;

employee.appendChild(option);

});

}

/* =========================
SHOW EMPLOYEE INFO
========================= */

function showEmployeeInfo(){

let selected =
employee.options[
employee.selectedIndex
];

if(employee.value===''){

employeeConnected.innerText =
'No Employee Selected';

return;

}

employeeConnected.innerText =

selected.dataset.empid +
' - ' +
employee.value;

}

/* =========================
REQUEST STORAGE
========================= */

let requests = [];

try{

requests = JSON.parse(
localStorage.getItem('employeeRequests')
) || [];

}catch(error){

requests = [];

}

/* =========================
EDIT INDEX
========================= */

let editIndex = null;

/* =========================
SUBMIT REQUEST
========================= */

function submitRequest(){

if(employee.value===''){

alert('Select Employee');

return;

}

if(requestType.value===''){

alert('Select Request');

return;

}

let selected =
employee.options[
employee.selectedIndex
];

let empId =
selected.dataset.empid || 'NO-ID';

let data = {

empid:empId,

employee:employee.value,

type:requestType.value,

date:requestDate.value,

days:days.value || 1,

reason:reason.value || '-',

status:'PENDING'

};

if(editIndex !== null){

requests[editIndex] = data;

editIndex = null;

alert('Request Updated');

}else{

requests.push(data);

alert('Request Submitted');

}

localStorage.setItem(
'employeeRequests',
JSON.stringify(requests)
);

renderRequests();

clearForm();

}

/* =========================
RENDER REQUESTS
========================= */

function renderRequests(){

requestBody.innerHTML='';

if(requests.length===0){

requestBody.innerHTML = `

<tr>

<td colspan="8">

NO REQUEST FOUND

</td>

</tr>

`;

return;

}

requests.forEach((req,index)=>{

let statusClass =
req.status.toLowerCase();

requestBody.innerHTML += `

<tr>

<td>${req.empid}</td>

<td>${req.employee}</td>

<td>${req.type}</td>

<td>${req.date}</td>

<td>${req.days}</td>

<td>${req.reason}</td>

<td class="${statusClass}">
${req.status}
</td>

<td>

<button
class="btn edit-btn"
onclick="editRequest(${index})">

EDIT

</button>

<button
class="btn delete-btn"
onclick="deleteRequest(${index})">

DELETE

</button>

</td>

</tr>

`;

});

}

/* =========================
EDIT REQUEST
========================= */

function editRequest(index){

let req = requests[index];

editIndex = index;

employee.value =
req.employee || '';

requestType.value =
req.type || '';

requestDate.value =
req.date || '';

days.value =
req.days || '';

reason.value =
req.reason || '';

showEmployeeInfo();

window.scrollTo({

top:0,

behavior:'smooth'

});

}

/* =========================
DELETE REQUEST
========================= */

function deleteRequest(index){

let confirmDelete = confirm(
'Delete this request?'
);

if(confirmDelete){

requests.splice(index,1);

localStorage.setItem(
'employeeRequests',
JSON.stringify(requests)
);

renderRequests();

}

}

/* =========================
CLEAR
========================= */

function clearForm(){

employee.value='';

requestType.value='';

requestDate.value='';

days.value='';

reason.value='';

employeeConnected.innerText =
'No Employee Selected';

}

/* =========================
AUTO LOAD
========================= */

loadEmployees();

renderRequests();

</script>

</body>
</html>
