<!DOCTYPE html>
<html>
<head>

<title>Employee Request Portal</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#1f1f1f;
padding:15px;
color:white;
}

.container{

max-width:1200px;

margin:auto;

background:#2b2b2b;

border:3px solid #ffcc00;

border-radius:15px;

overflow:hidden;
}

/* HEADER */

.header{

background:linear-gradient(
135deg,
#ffcc00,
#ff8800
);

padding:15px;

display:flex;

justify-content:space-between;

align-items:center;

flex-wrap:wrap;
}

.title{

font-size:28px;

font-weight:bold;

color:black;
}

/* BUTTON */

.btn{

padding:10px 18px;

border:none;

border-radius:10px;

cursor:pointer;

font-weight:bold;

font-size:13px;
}

.back-btn{
background:#0066cc;
color:white;
}

.save-btn{
background:#008000;
color:white;
}

.print-btn{
background:#cc0000;
color:white;
}

/* FORM */

.form-section{
padding:20px;
}

.form-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:12px;
}

input,
select,
textarea{

width:100%;

padding:10px;

border-radius:10px;

border:2px solid #555;

background:#1f1f1f;

color:white;
}

/* TABLE */

.table-wrapper{

margin-top:20px;

overflow:auto;

background:white;

border-radius:10px;
}

table{

width:100%;

border-collapse:collapse;

min-width:1000px;
}

th,
td{

border:1px solid #999;

padding:10px;

text-align:center;
}

th{

background:#ffcc00;

color:black;
}

td{
color:black;
}

/* STATUS */

.pending{
color:orange;
font-weight:bold;
}

.approved{
color:green;
font-weight:bold;
}

.rejected{
color:red;
font-weight:bold;
}

/* PAYSLIP */

.payslip{

margin-top:25px;

background:white;

padding:20px;

border-radius:12px;

color:black;

display:none;
}

.payslip-header{

text-align:center;

margin-bottom:20px;

border-bottom:2px solid #ffcc00;

padding-bottom:10px;
}

.payslip-header h2{

color:#cc0000;

font-size:28px;
}

.payroll-table{

width:100%;

border-collapse:collapse;

margin-top:10px;
}

.payroll-table th{

background:#ffcc00;

color:black;
}

.netpay{

font-size:22px;

font-weight:bold;

color:green;

margin-top:20px;

text-align:right;
}

.signature{

margin-top:50px;

display:flex;

justify-content:space-between;
}

.line{

border-top:1px solid black;

width:220px;

text-align:center;

padding-top:5px;
}

/* PRINT */

@media print{

body{
background:white;
padding:0;
}

.header,
.form-section > .form-grid,
.save-btn,
.table-wrapper,
.back-btn,
.print-btn,
#requestType,
#requestDate,
#days,
#reason{
display:none !important;
}

.container{

border:none;

background:white;
}

.payslip{
display:block !important;
}

}

</style>

</head>

<body>

<div class="container">

<!-- HEADER -->

<div class="header">

<div class="title">
👨‍💼 EMPLOYEE REQUEST
</div>

<div style="display:flex;gap:10px;">

<button
class="btn back-btn"
onclick="window.location.href='index.html'">

← BACK

</button>

<button
class="btn print-btn"
onclick="printPayslip()">

🖨 PRINT PAYSLIP

</button>

</div>

</div>

<!-- FORM -->

<div class="form-section">

<div class="form-grid">

<select id="employee">

<option value="">
Select Employee
</option>

</select>

<select id="requestType">

<option value="">
Select Request
</option>

<option>DAY OFF</option>

<option>VACATION LEAVE</option>

<option>BIRTHDAY LEAVE</option>

<option>SICK LEAVE</option>

</select>

<input
type="date"
id="requestDate">

<input
type="number"
id="days"
placeholder="Number of Days">

<textarea
id="reason"
placeholder="Reason"></textarea>

</div>

<br>

<button
class="btn save-btn"
onclick="submitRequest()">

SUBMIT REQUEST

</button>

<!-- TABLE -->

<div class="table-wrapper">

<table>

<thead>

<tr>

<th>EMPLOYEE ID</th>
<th>EMPLOYEE</th>
<th>REQUEST</th>
<th>DATE</th>
<th>DAYS</th>
<th>REASON</th>
<th>STATUS</th>

</tr>

</thead>

<tbody id="requestBody">

</tbody>

</table>

</div>

<!-- INDIVIDUAL PAYSLIP -->

<div
class="payslip"
id="payslipArea">

<div class="payslip-header">

<h2>PAPPRITO</h2>

<p>EMPLOYEE PAYSLIP</p>

</div>

<table class="payroll-table">

<tr>
<th>Employee</th>
<td id="payEmp">-</td>
</tr>

<tr>
<th>Gross Pay</th>
<td id="payGross">0.00</td>
</tr>

<tr>
<th>Overtime</th>
<td id="payOvertime">0.00</td>
</tr>

<tr>
<th>SSS</th>
<td id="paySSS">0.00</td>
</tr>

<tr>
<th>PhilHealth</th>
<td id="payPhilhealth">0.00</td>
</tr>

<tr>
<th>Pag-IBIG</th>
<td id="payPagibig">0.00</td>
</tr>

<tr>
<th>Health Card</th>
<td id="payHealth">0.00</td>
</tr>

<tr>
<th>Other Deduction</th>
<td id="payOther">0.00</td>
</tr>

<tr>
<th>Total Deduction</th>
<td id="payDeduction">0.00</td>
</tr>

</table>

<div class="netpay">

NET PAY :
<span id="payNet">
0.00
</span>

</div>

<div class="signature">

<div class="line">
HR Signature
</div>

<div class="line">
Employee Signature
</div>

</div>

</div>

</div>

</div>

<script>

/* LOAD EMPLOYEES */

function loadEmployees(){

let employees =

JSON.parse(
localStorage.getItem('employees')
) || [];

employee.innerHTML =
'<option value="">Select Employee</option>';

employees.forEach(emp=>{

let fullname =

(emp[0] || '') + ' ' +
(emp[1] || '') + ' ' +
(emp[2] || '');

let empId =
emp[18] || 'NO-ID';

employee.innerHTML += `

<option value="${fullname}"
data-id="${empId}">

${empId} - ${fullname}

</option>

`;

});

}

/* STORAGE */

let requests =

JSON.parse(
localStorage.getItem('employeeRequests')
) || [];

/* SUBMIT */

function submitRequest(){

if(employee.value===''){

alert('Select Employee');

return;

}

let selected =
employee.options[
employee.selectedIndex
];

let empId =
selected.dataset.id;

let data = {

empid:empId,

employee:employee.value,

type:requestType.value,

date:requestDate.value,

days:days.value,

reason:reason.value,

status:'PENDING'

};

requests.push(data);

localStorage.setItem(
'employeeRequests',
JSON.stringify(requests)
);

alert('Request Submitted');

renderRequests();

loadPayslip();

}

/* RENDER */

function renderRequests(){

requestBody.innerHTML='';

requests.forEach(req=>{

let statusClass =
req.status.toLowerCase();

requestBody.innerHTML += `

<tr>

<td>${req.empid}</td>

<td>${req.employee}</td>

<td>${req.type}</td>

<td>${req.date}</td>

<td>${req.days}</td>

<td>${req.reason}</td>

<td class="${statusClass}">
${req.status}
</td>

</tr>

`;

});

}

/* LOAD PAYSLIP */

function loadPayslip(){

let payroll =

JSON.parse(
localStorage.getItem('payroll')
) || [];

let empName =
employee.value;

let pay = payroll.find(p=>
p.employee === empName
);

if(!pay) return;

document.getElementById(
'payslipArea'
).style.display='block';

payEmp.innerText =
pay.employee || '-';

payGross.innerText =
Number(pay.gross || 0)
.toFixed(2);

payOvertime.innerText =
Number(pay.overtime || 0)
.toFixed(2);

paySSS.innerText =
Number(pay.sss || 0)
.toFixed(2);

payPhilhealth.innerText =
Number(pay.philhealth || 0)
.toFixed(2);

payPagibig.innerText =
Number(pay.pagibig || 0)
.toFixed(2);

payHealth.innerText =
Number(pay.health || 0)
.toFixed(2);

payOther.innerText =
Number(pay.other || 0)
.toFixed(2);

payDeduction.innerText =
Number(pay.deductions || 0)
.toFixed(2);

payNet.innerText =
Number(pay.net || 0)
.toFixed(2);

}

/* PRINT */

function printPayslip(){

loadPayslip();

window.print();

}

/* AUTO LOAD */

loadEmployees();

renderRequests();

</script>

</body>
</html>
