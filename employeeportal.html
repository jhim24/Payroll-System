<!DOCTYPE html>
<html>
<head>

<title>Employee Portal</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{

background:linear-gradient(
135deg,
#1f1f1f,
#2b2b2b
);

padding:15px;

color:white;
}

/* CONTAINER */

.container{

max-width:1200px;

margin:auto;

background:#2b2b2b;

border:3px solid #ffcc00;

border-radius:15px;

overflow:hidden;

box-shadow:0 5px 20px rgba(0,0,0,0.5);
}

/* HEADER */

.header{

background:linear-gradient(
135deg,
#ffcc00,
#ff8800
);

padding:15px;

display:flex;

justify-content:space-between;

align-items:center;

flex-wrap:wrap;

gap:10px;
}

.title{

font-size:28px;

font-weight:bold;

color:black;
}

/* BUTTON */

.btn{

padding:10px 18px;

border:none;

border-radius:10px;

cursor:pointer;

font-weight:bold;

transition:0.3s;

font-size:13px;
}

.btn:hover{

transform:scale(1.03);
}

.back-btn{

background:#0066cc;

color:white;
}

.logout-btn{

background:#cc0000;

color:white;
}

.save-btn{

background:#008000;

color:white;
}

/* HEADER BUTTONS */

.header-buttons{

display:flex;

gap:10px;

flex-wrap:wrap;
}

/* FORM */

.form-section{

padding:20px;
}

.form-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:12px;
}

input,
select,
textarea{

width:100%;

padding:10px;

border:2px solid #555;

border-radius:10px;

background:#1f1f1f;

color:white;

font-size:13px;
}

input:focus,
select:focus,
textarea:focus{

outline:none;

border-color:#ffcc00;
}

/* TABLE */

.table-wrapper{

margin-top:20px;

overflow:auto;

background:white;

border-radius:10px;
}

table{

width:100%;

border-collapse:collapse;

min-width:1000px;

font-size:12px;
}

th,
td{

border:1px solid #999;

padding:10px;

text-align:center;
}

th{

background:#ffcc00;

color:black;

position:sticky;

top:0;
}

td{

background:white;

color:black;
}

/* STATUS */

.pending{

color:#ff8800;

font-weight:bold;
}

.approved{

color:green;

font-weight:bold;
}

.rejected{

color:red;

font-weight:bold;
}

/* TITLE BOX */

.section-title{

margin-bottom:15px;

font-size:22px;

color:#ffcc00;
}

</style>

</head>

<body>

<div class="container">

<!-- HEADER -->

<div class="header">

<div class="title">
👨‍💼 EMPLOYEE PORTAL
</div>

<div class="header-buttons">

<button
class="btn back-btn"
onclick="window.location.href='index.html'">

← BACK

</button>

<button
class="btn logout-btn"
onclick="logout()">

🚪 LOG OUT

</button>

</div>

</div>

<!-- FORM -->

<div class="form-section">

<div class="section-title">

Employee Request Form

</div>

<div class="form-grid">

<select id="employee">

<option value="">
Select Employee
</option>

</select>

<select id="requestType">

<option value="">
Select Request
</option>

<option>DAY OFF</option>

<option>VACATION LEAVE</option>

<option>BIRTHDAY LEAVE</option>

<option>SICK LEAVE</option>

</select>

<input
type="date"
id="requestDate">

<input
type="number"
id="days"
placeholder="Number of Days">

<textarea
id="reason"
placeholder="Reason / Notes"></textarea>

</div>

<br>

<button
class="btn save-btn"
onclick="submitRequest()">

SUBMIT REQUEST

</button>

<!-- TABLE -->

<div class="table-wrapper">

<table>

<thead>

<tr>

<th>EMPLOYEE</th>

<th>REQUEST TYPE</th>

<th>DATE</th>

<th>DAYS</th>

<th>REASON</th>

<th>STATUS</th>

</tr>

</thead>

<tbody id="requestBody">

</tbody>

</table>

</div>

</div>

</div>

<script>

/* =========================
LOGOUT
========================= */

function logout(){

let confirmLogout = confirm(
'Are you sure you want to logout?'
);

if(confirmLogout){

localStorage.removeItem(
'userRole'
);

window.location.href =
'login.html';

}

}

/* =========================
LOAD EMPLOYEES
========================= */

function loadEmployees(){

let employees = [];

try{

employees = JSON.parse(
localStorage.getItem('employees')
) || [];

}catch(error){

employees = [];

}

employee.innerHTML =
'<option value="">Select Employee</option>';

employees.forEach(emp=>{

let fullname =

(emp[0] || '') + ' ' +
(emp[1] || '') + ' ' +
(emp[2] || '');

let option =
document.createElement('option');

option.value = fullname;

option.textContent = fullname;

employee.appendChild(option);

});

}

/* =========================
STORAGE
========================= */

let requests = [];

try{

requests = JSON.parse(
localStorage.getItem('employeeRequests')
) || [];

}catch(error){

requests = [];

}

/* =========================
SUBMIT
========================= */

function submitRequest(){

if(employee.value===''){

alert('Select Employee');

return;

}

if(requestType.value===''){

alert('Select Request');

return;

}

let data = {

employee:employee.value,

type:requestType.value,

date:requestDate.value,

days:days.value || 1,

reason:reason.value || '-',

status:'PENDING'

};

requests.push(data);

localStorage.setItem(
'employeeRequests',
JSON.stringify(requests)
);

alert('Request Submitted
