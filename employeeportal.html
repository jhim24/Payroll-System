<!DOCTYPE html>
<html>
<head>

<title>Employee Portal</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#1f1f1f;
padding:15px;
color:white;
}

/* CONTAINER */

.container{

max-width:1400px;

margin:auto;

background:#2b2b2b;

border:3px solid #ffcc00;

border-radius:15px;

overflow:hidden;
}

/* HEADER */

.header{

background:
linear-gradient(
135deg,
#ffcc00,
#ff8800
);

padding:15px;

display:flex;

justify-content:space-between;

align-items:center;

flex-wrap:wrap;

gap:10px;
}

.title{

font-size:28px;

font-weight:bold;

color:black;
}

/* BUTTON */

.btn{

padding:10px 18px;

border:none;

border-radius:10px;

cursor:pointer;

font-weight:bold;

font-size:13px;

transition:0.3s;
}

.btn:hover{

transform:scale(1.03);
}

.logout-btn{
background:#cc0000;
color:white;
}

.submit-btn{
background:#008000;
color:white;
}

.view-btn{
background:#ff8800;
color:black;
}

.close-btn{
background:#444;
color:white;
}

.print-btn{
background:#0066cc;
color:white;
}

.edit-btn{
background:#0099cc;
color:white;
}

.delete-btn{
background:#990000;
color:white;
}

/* FORM */

.form-section{
padding:20px;
}

/* EMPLOYEE INFO */

.emp-info{

background:#1a1a1a;

padding:15px;

border-radius:10px;

border:2px solid #ffcc00;

margin-bottom:20px;

line-height:1.8;

font-size:15px;
}

/* GRID */

.form-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:12px;
}

input,
select,
textarea{

width:100%;

padding:10px;

border-radius:10px;

border:2px solid #555;

background:#1f1f1f;

color:white;
}

/* TABLE */

.table-wrapper{

margin-top:25px;

overflow-x:auto;

background:white;

border-radius:10px;

width:100%;
}

table{

width:100%;

border-collapse:collapse;

min-width:1000px;
}

th,
td{

border:1px solid #999;

padding:6px;

text-align:center;

font-size:11px;

word-break:break-word;
}

th{

background:#ffcc00;

color:black;
}

td{
color:black;
}

/* STATUS */

.pending{
color:orange;
font-weight:bold;
}

.approved{
color:green;
font-weight:bold;
}

.rejected{
color:red;
font-weight:bold;
}

/* =========================
PAPER
========================= */

.paper{

width:190mm;

min-height:270mm;

margin:20px auto;

background:white;

padding:5mm;

display:none;

grid-template-columns:1fr 1fr;

gap:6px;

border-radius:10px;

box-shadow:0 5px 20px rgba(0,0,0,0.5);

}

/* PAYSLIP */

.payslip{

border:2px solid #ffcc00;

border-radius:10px;

padding:6px;

background:#f9f9f9;

color:black;

display:flex;

flex-direction:column;

justify-content:space-between;

min-height:125mm;

overflow:hidden;

}

/* COMPANY */

.company{

text-align:center;

margin-bottom:4px;

padding-bottom:3px;

border-bottom:2px solid #ffcc00;

}

.company h2{

font-size:13px;

color:#cc0000;

}

.company p{

font-size:8px;

font-weight:bold;

}

/* INFO */

.info{

font-size:8px;

line-height:1.4;

background:#fff8dc;

padding:4px;

border-radius:4px;

border:1px solid #ffcc00;

margin-bottom:4px;

}

/* PAYROLL TABLE */

.payroll-table{

width:100%;

border-collapse:collapse;

font-size:7px;

margin-top:3px;

}

.payroll-table th,
.payroll-table td{

border:1px solid #999;

padding:2px;

}

.payroll-table th{

background:#ffcc00;

font-size:7px;

}

.payroll-table td{

background:white;

}

/* TOTAL */

.total{

margin-top:5px;

padding:5px;

background:#008000;

color:white;

border-radius:5px;

font-size:9px;

font-weight:bold;

text-align:right;

}

/* SIGNATURE */

.signature{

margin-top:8px;

display:flex;

justify-content:space-between;

font-size:7px;

}

.line{

margin-top:10px;

border-top:1px solid black;

width:65px;

text-align:center;

padding-top:2px;

}

/* PRINT */

@media print{

body{
background:white;
padding:0;
}

.header,
.form-grid,
.table-wrapper,
.emp-info,
.action-buttons{
display:none !important;
}

.container{
border:none;
background:white;
}

.paper{

display:grid !important;

border:none;

box-shadow:none;

width:190mm;

min-height:270mm;

padding:0;

margin:auto;

}

.payslip{

box-shadow:none;

break-inside:avoid;

}

}

/* MOBILE */

@media(max-width:768px){

.title{
font-size:22px;
}

.paper{

width:100%;

grid-template-columns:1fr;

}

.payslip{

min-height:auto;

}

table{

min-width:800px;

}

}

</style>

</head>

<body>

<div class="container">

<!-- HEADER -->

<div class="header">

<div class="title">
👨‍💼 EMPLOYEE PORTAL
</div>

<button
class="btn logout-btn"
onclick="logout()">

🚪 LOGOUT

</button>

</div>

<div class="form-section">

<!-- EMPLOYEE INFO -->

<div class="emp-info">

<div>

<b>EMPLOYEE ID :</b>

<span id="empIdDisplay">
-
</span>

</div>

<div>

<b>EMPLOYEE NAME :</b>

<span id="empNameDisplay">
-
</span>

</div>

</div>

<!-- FORM -->

<div class="form-grid">

<select id="requestType">

<option value="">
Select Request
</option>

<option>DAY OFF</option>

<option>VACATION LEAVE</option>

<option>BIRTHDAY LEAVE</option>

<option>SICK LEAVE</option>

</select>

<input
type="date"
id="requestDate">

<input
type="number"
id="days"
placeholder="Days">

<textarea
id="reason"
placeholder="Reason"></textarea>

</div>

<br>

<div
class="action-buttons"
style="display:flex;gap:10px;flex-wrap:wrap;">

<button
class="btn submit-btn"
onclick="submitRequest()">

SUBMIT REQUEST

</button>

<button
class="btn view-btn"
onclick="loadPayslip()">

👁 VIEW PAYSLIP

</button>

<button
class="btn close-btn"
onclick="closePayslip()">

❌ CLOSE PAYSLIP

</button>

<button
class="btn print-btn"
onclick="printPayslip()">

🖨 PRINT PAYSLIP

</button>

</div>

<!-- REQUEST TABLE -->

<div class="table-wrapper">

<table>

<thead>

<tr>

<th>EMPLOYEE ID</th>
<th>EMPLOYEE</th>
<th>REQUEST</th>
<th>DATE</th>
<th>DAYS</th>
<th>REASON</th>
<th>STATUS</th>
<th>ACTION</th>

</tr>

</thead>

<tbody id="requestBody">

</tbody>

</table>

</div>

<!-- PAPER -->

<div
class="paper"
id="paper">

</div>

</div>

</div>

<script type="module">

import {
initializeApp
}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
addDoc,
updateDoc,
deleteDoc,
doc
}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

apiKey:
"AIzaSyAehoq0teVYHiJ4bkKOgBqIgJZrQpce3k8",

authDomain:
"hr-system-38fc3.firebaseapp.com",

projectId:
"hr-system-38fc3",

storageBucket:
"hr-system-38fc3.firebasestorage.app",

messagingSenderId:
"615471610834",

appId:
"1:615471610834:web:a0d671d4e3f4c1b57b660b"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* USER */

let currentUser =
localStorage.getItem(
'loggedInUser'
) || '';

let currentEmployee = null;

let editId = null;

/* LOAD EMPLOYEE */

async function loadEmployee(){

let querySnapshot =
await getDocs(
collection(db,'employees')
);

querySnapshot.forEach(docSnap=>{

let emp = docSnap.data();

let fullname =

(emp.firstname || '') + ' ' +
(emp.middlename || '') + ' ' +
(emp.lastname || '');

if(
(emp.employeeid || '').trim()
===
currentUser.trim()
){

currentEmployee = {

id: emp.employeeid,
name: fullname

};

}

});

if(currentEmployee){

empIdDisplay.innerText =
currentEmployee.id;

empNameDisplay.innerText =
currentEmployee.name;

loadRequests();

}else{

alert(
'Employee account not found'
);

}

}

loadEmployee();

/* SUBMIT REQUEST */

window.submitRequest =
async function(){

if(requestType.value===''){

alert('Select Request Type');

return;

}

if(editId){

await updateDoc(

doc(db,'employeeRequests',editId),

{

type:requestType.value,
date:requestDate.value,
days:days.value,
reason:reason.value

}

);

alert('Request Updated');

editId = null;

}else{

await addDoc(

collection(db,'employeeRequests'),

{

empid:
currentEmployee.id,

employee:
currentEmployee.name,

type:
requestType.value,

date:
requestDate.value,

days:
days.value,

reason:
reason.value,

status:
'PENDING'

}

);

alert('Request Submitted');

}

clearForm();

loadRequests();

}

/* LOAD REQUESTS */

async function loadRequests(){

requestBody.innerHTML='';

let querySnapshot =
await getDocs(
collection(db,'employeeRequests')
);

querySnapshot.forEach(docSnap=>{

let req = docSnap.data();

let id = docSnap.id;

if(req.empid === currentEmployee.id){

let statusClass =
(req.status || '')
.toLowerCase();

requestBody.innerHTML += `

<tr>

<td>${req.empid}</td>

<td>${req.employee}</td>

<td>${req.type}</td>

<td>${req.date}</td>

<td>${req.days}</td>

<td>${req.reason}</td>

<td class="${statusClass}">
${req.status}
</td>

<td>

<button
class="btn edit-btn"
onclick="editRequest(
'${id}',
'${req.type}',
'${req.date}',
'${req.days}',
'${req.reason}'
)">

EDIT

</button>

<button
class="btn delete-btn"
onclick="deleteRequest('${id}')">

DELETE

</button>

</td>

</tr>

`;

}

});

}

/* EDIT */

window.editRequest =
function(id,type,date,daysValue,reasonText){

editId = id;

requestType.value = type;
requestDate.value = date;
days.value = daysValue;
reason.value = reasonText;

window.scrollTo({
top:0,
behavior:'smooth'
});

}

/* DELETE */

window.deleteRequest =
async function(id){

if(confirm('Delete Request?')){

await deleteDoc(
doc(db,'employeeRequests',id)
);

loadRequests();

}

}

/* CLEAR */

function clearForm(){

requestType.value='';
requestDate.value='';
days.value='';
reason.value='';

}

/* LOAD PAYSLIP */

window.loadPayslip =
async function(){

let querySnapshot =
await getDocs(
collection(db,'payroll')
);

let payrollRecords = [];

querySnapshot.forEach(docSnap=>{

let pay = docSnap.data();

if(
pay.empid ===
currentEmployee.id
){

payrollRecords.push(pay);

}

});

if(payrollRecords.length === 0){

alert('No Payslip Found');

return;

}

paper.style.display='grid';

paper.innerHTML='';

while(payrollRecords.length < 4){

payrollRecords.push(null);

}

payrollRecords.forEach(pay=>{

let div =
document.createElement('div');

div.className='payslip';

if(pay){

div.innerHTML = `

<div>

<div class="company">

<h2>PAPPRITO</h2>

<p>OFFICIAL EMPLOYEE PAYSLIP</p>

</div>

<div class="info">

<b>ID:</b>
${pay.empid || '-'}

<br>

<b>Name:</b>
${pay.employee || '-'}

<br>

<b>Date:</b>
${pay.date || '-'}

</div>

<table class="payroll-table">

<tr>
<th>EARNINGS</th>
<th>AMOUNT</th>
</tr>

<tr>
<td>Daily Rate</td>
<td>₱ ${Number(pay.dailyrate || 0).toFixed(2)}</td>
</tr>

<tr>
<td>Total Days</td>
<td>${Number(pay.totaldays || 0)}</td>
</tr>

<tr>
<td>Overtime</td>
<td>₱ ${Number(pay.overtime || 0).toFixed(2)}</td>
</tr>

<tr>
<td>Holiday</td>
<td>₱ ${Number(pay.holiday || 0).toFixed(2)}</td>
</tr>

<tr>
<td>Sick Leave</td>
<td>₱ ${Number(pay.sick || 0).toFixed(2)}</td>
</tr>

<tr>
<td>Vacation Leave</td>
<td>₱ ${Number(pay.vacation || 0).toFixed(2)}</td>
</tr>

<tr>
<td>Birthday Leave</td>
<td>₱ ${Number(pay.birthday || 0).toFixed(2)}</td>
</tr>

<tr>
<td>Allowance</td>
<td>₱ ${Number(pay.allowance || 0).toFixed(2)}</td>
</tr>

</table>

<table class="payroll-table">

<tr>
<th>DEDUCTIONS</th>
<th>AMOUNT</th>
</tr>

<tr>
<td>SSS</td>
<td>₱ ${Number(pay.sss || 0).toFixed(2)}</td>
</tr>

<tr>
<td>PhilHealth</td>
<td>₱ ${Number(pay.philhealth || 0).toFixed(2)}</td>
</tr>

<tr>
<td>Pag-IBIG</td>
<td>₱ ${Number(pay.pagibig || 0).toFixed(2)}</td>
</tr>

<tr>
<td>Health Card</td>
<td>₱ ${Number(pay.health || 0).toFixed(2)}</td>
</tr>

<tr>
<td>Others</td>
<td>₱ ${Number(pay.other || 0).toFixed(2)}</td>
</tr>

<tr>
<td>Total Deduction</td>
<td>₱ ${Number(pay.deductions || 0).toFixed(2)}</td>
</tr>

</table>

<div class="total">

NET PAY :
₱ ${Number(pay.net || 0).toFixed(2)}

</div>

</div>

<div class="signature">

<div class="line">
HR
</div>

<div class="line">
Employee
</div>

</div>

`;

}

paper.appendChild(div);

});

}

/* CLOSE */

window.closePayslip =
function(){

paper.style.display='none';

}

/* PRINT */

window.printPayslip =
function(){

window.print();

}

/* LOGOUT */

window.logout =
function(){

localStorage.removeItem(
'loggedInUser'
);

localStorage.removeItem(
'userRole'
);

window.location.href =
'login.html';

}

</script>

</body>
</html>
