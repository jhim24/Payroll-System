<!DOCTYPE html>
<html>
<head>

<title>Payroll System</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#d4d0c8;
padding:15px;
}

/* CONTAINER */

.container{

max-width:1200px;

margin:auto;

background:#c0c0c0;

border:2px solid #808080;

box-shadow:
inset 1px 1px white,
inset -1px -1px #808080;
}

/* HEADER */

.header{

padding:15px;

background:#d4d0c8;

border-bottom:2px solid #808080;

display:flex;

justify-content:space-between;

align-items:center;

flex-wrap:wrap;

gap:10px;
}

.title{

font-size:28px;

font-weight:bold;
}

/* BUTTON */

.btn{

padding:8px 18px;

background:#dcdcdc;

border-top:1px solid white;
border-left:1px solid white;

border-right:1px solid #808080;
border-bottom:1px solid #808080;

cursor:pointer;

font-weight:bold;

font-size:12px;
}

.edit-btn{
background:#0066cc;
color:white;
}

.delete-btn{
background:#cc0000;
color:white;
}

/* FORM */

.form-section{

padding:15px;
}

.form-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:10px;
}

input,
select,
textarea{

width:100%;

padding:10px;

border:1px solid #808080;

font-size:13px;
}

/* COMPUTE BOX */

.compute-box{

margin-top:20px;

padding:15px;

background:white;

border:1px solid #808080;
}

.compute-box h3{

margin-bottom:15px;
}

/* TABLE */

.table-wrapper{

margin-top:20px;

overflow-x:auto;

overflow-y:auto;

max-height:400px;

background:white;

border-top:2px solid #808080;
}

table{

width:100%;

border-collapse:collapse;

min-width:1900px;

font-size:12px;
}

th,
td{

border:1px solid #808080;

padding:10px;

text-align:center;

white-space:nowrap;
}

th{

background:#dcdcdc;

position:sticky;

top:0;
}

/* TOTAL */

.total-box{

margin-top:15px;

font-size:18px;

font-weight:bold;
}

/* STATUS */

.netpay{

color:green;

font-weight:bold;
}

.deduction{

color:red;

font-weight:bold;
}

.notes{

text-align:left;

white-space:normal;

min-width:250px;
}

</style>

</head>

<body>

<div class="container">

<!-- HEADER -->

<div class="header">

<div class="title">
PAYROLL SYSTEM
</div>

<button
class="btn"
onclick="window.history.back()">

← BACK

</button>

</div>

<!-- FORM -->

<div class="form-section">

<div class="form-grid">

<select id="employeeSelect">

<option value="">
Select Employee
</option>

</select>

<input
type="number"
id="dailyRate"
placeholder="Daily Rate">

<input
type="number"
id="daysWorked"
placeholder="Days Worked">

<input
type="number"
id="overtime"
placeholder="Overtime Pay">

<input
type="number"
id="cashAdvance"
placeholder="Cash Advance">

<input
type="number"
id="lateDeduction"
placeholder="Late Deduction">

<input
type="number"
id="sss"
placeholder="SSS">

<input
type="number"
id="philhealth"
placeholder="PhilHealth">

<input
type="number"
id="pagibig"
placeholder="Pag-IBIG">

<input
type="number"
id="healthCard"
placeholder="Health Card">

<input
type="number"
id="otherDeduction"
placeholder="Other Deduction">

<textarea
id="otherNote"
placeholder="Reason / Notes for Other Deduction"></textarea>

</div>

<!-- COMPUTE -->

<div class="compute-box">

<h3>Payroll Computation</h3>

<button
class="btn"
onclick="computePayroll()">

SAVE PAYROLL

</button>

<div class="total-box">

<p id="grossPay">
Gross Pay : 0
</p>

<p id="totalDeduction">
Total Deduction : 0
</p>

<p class="netpay"
id="netPay">

Net Pay : 0

</p>

</div>

</div>

<!-- TABLE -->

<div class="table-wrapper">

<table id="payrollTable">

<thead>

<tr>

<th>EMPLOYEE</th>
<th>DAILY RATE</th>
<th>DAYS WORKED</th>
<th>GROSS PAY</th>
<th>OVERTIME</th>

<th>CASH ADVANCE</th>
<th>LATE</th>
<th>SSS</th>
<th>PHILHEALTH</th>
<th>PAG-IBIG</th>
<th>HEALTH CARD</th>
<th>OTHER</th>

<th>OTHER NOTE</th>

<th>TOTAL DEDUCTION</th>
<th>NET PAY</th>

<th>ACTION</th>

</tr>

</thead>

<tbody></tbody>

</table>

</div>

</div>

</div>

<script>

let editIndex = null;

/* =========================
LOAD EMPLOYEES
========================= */

function loadEmployees(){

let employees =

JSON.parse(
localStorage.getItem('employees')
) || [];

let select =

document.getElementById(
'employeeSelect'
);

select.innerHTML =

'<option value="">Select Employee</option>';

employees.forEach((emp,index)=>{

let fullName =

emp[0] + ' ' +
emp[1] + ' ' +
emp[2];

let empId = emp[18];

select.innerHTML += `

<option value="${fullName}">

${empId} - ${fullName}

</option>

`;

});

}

/* =========================
PAYROLL STORAGE
========================= */

let payrollRecords =

JSON.parse(
localStorage.getItem('payroll')
) || [];

/* =========================
SAVE / UPDATE PAYROLL
========================= */

function computePayroll(){

if(employeeSelect.value===''){

alert('Select Employee');

return;

}

/* VALUES */

let employee =
employeeSelect.value;

let rate =
Number(dailyRate.value) || 0;

let days =
Number(daysWorked.value) || 0;

let overtimePay =
Number(overtime.value) || 0;

let cash =
Number(cashAdvance.value) || 0;

let late =
Number(lateDeduction.value) || 0;

let sssDed =
Number(sss.value) || 0;

let phil =
Number(philhealth.value) || 0;

let pagibigDed =
Number(pagibig.value) || 0;

let health =
Number(healthCard.value) || 0;

let other =
Number(otherDeduction.value) || 0;

let otherReason =
otherNote.value || '-';

/* COMPUTE */

let gross =

(rate * days) +
overtimePay;

let deductions =

cash +
late +
sssDed +
phil +
pagibigDed +
health +
other;

let net =

gross - deductions;

/* DISPLAY */

grossPay.innerText =
'Gross Pay : ' +
gross.toFixed(2);

totalDeduction.innerText =
'Total Deduction : ' +
deductions.toFixed(2);

netPay.innerText =
'Net Pay : ' +
net.toFixed(2);

/* DATA */

let data = {

employee,

rate,

days,

gross,

overtimePay,

cash,

late,

sssDed,

phil,

pagibigDed,

health,

other,

otherReason,

deductions,

net

};

/* EDIT */

if(editIndex !== null){

payrollRecords[editIndex] = data;

editIndex = null;

alert('Payroll Updated');

}

/* ADD */

else{

payrollRecords.push(data);

alert('Payroll Saved');

}

/* STORAGE */

localStorage.setItem(
'payroll',
JSON.stringify(payrollRecords)
);

/* REFRESH */

renderPayroll();

clearForm();

}

/* =========================
RENDER TABLE
========================= */

function renderPayroll(){

let table =

document.querySelector(
'#payrollTable tbody'
);

table.innerHTML='';

payrollRecords.forEach((pay,index)=>{

table.innerHTML += `

<tr>

<td>${pay.employee}</td>
<td>${pay.rate}</td>
<td>${pay.days}</td>
<td>${pay.gross.toFixed(2)}</td>
<td>${pay.overtimePay.toFixed(2)}</td>

<td class="deduction">
${pay.cash.toFixed(2)}
</td>

<td class="deduction">
${pay.late.toFixed(2)}
</td>

<td class="deduction">
${pay.sssDed.toFixed(2)}
</td>

<td class="deduction">
${pay.phil.toFixed(2)}
</td>

<td class="deduction">
${pay.pagibigDed.toFixed(2)}
</td>

<td class="deduction">
${pay.health.toFixed(2)}
</td>

<td class="deduction">
${pay.other.toFixed(2)}
</td>

<td class="notes">
${pay.otherReason}
</td>

<td class="deduction">
${pay.deductions.toFixed(2)}
</td>

<td class="netpay">
${pay.net.toFixed(2)}
</td>

<td>

<button
class="btn edit-btn"
onclick="editPayroll(${index})">

EDIT

</button>

<button
class="btn delete-btn"
onclick="deletePayroll(${index})">

DELETE

</button>

</td>

</tr>

`;

});

}

/* =========================
EDIT
========================= */

function editPayroll(index){

let pay =
payrollRecords[index];

editIndex = index;

employeeSelect.value =
pay.employee;

dailyRate.value =
pay.rate;

daysWorked.value =
pay.days;

overtime.value =
pay.overtimePay;

cashAdvance.value =
pay.cash;

lateDeduction.value =
pay.late;

sss.value =
pay.sssDed;

philhealth.value =
pay.phil;

pagibig.value =
pay.pagibigDed;

healthCard.value =
pay.health;

otherDeduction.value =
pay.other;

otherNote.value =
pay.otherReason;

grossPay.innerText =
'Gross Pay : ' +
pay.gross.toFixed(2);

totalDeduction.innerText =
'Total Deduction : ' +
pay.deductions.toFixed(2);

netPay.innerText =
'Net Pay : ' +
pay.net.toFixed(2);

}

/* =========================
DELETE
========================= */

function deletePayroll(index){

if(confirm(
'Delete Payroll Record?'
)){

payrollRecords.splice(index,1);

localStorage.setItem(
'payroll',
JSON.stringify(payrollRecords)
);

renderPayroll();

}

}

/* =========================
CLEAR FORM
========================= */

function clearForm(){

employeeSelect.value='';

dailyRate.value='';

daysWorked.value='';

overtime.value='';

cashAdvance.value='';

lateDeduction.value='';

sss.value='';

philhealth.value='';

pagibig.value='';

healthCard.value='';

otherDeduction.value='';

otherNote.value='';

}

/* =========================
AUTO LOAD
========================= */

loadEmployees();

renderPayroll();

</script>

</body>
</html>
