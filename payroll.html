<!DOCTYPE html>
<html>
<head>

<title>Payroll System</title>

<style>

*{
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{

margin:0;
padding:20px;

background:#1f1f1f;

color:white;
}

/* TOP */

.top-bar{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:20px;

flex-wrap:wrap;

gap:10px;
}

h1{

margin:0;

color:#ffcc00;

text-shadow:2px 2px 5px black;
}

/* BUTTONS */

button{

padding:10px 18px;

border:none;

border-radius:10px;

cursor:pointer;

font-weight:bold;

background:linear-gradient(
135deg,
#ffcc00,
#ff6600
);

color:black;

transition:0.3s;

box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

button:hover{

transform:translateY(-2px);

filter:brightness(1.1);

}

/* FORM */

.form-box{

background:#2b2b2b;

padding:20px;

border-radius:15px;

border:2px solid #ffcc00;

margin-bottom:20px;
}

.grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:10px;
}

input,
select{

width:100%;

padding:10px;

border:2px solid #555;

border-radius:8px;

background:#1f1f1f;

color:white;
}

input:focus,
select:focus{

outline:none;

border-color:#ffcc00;
}

/* TABLE */

.table-box{

background:#2b2b2b;

border:2px solid #ffcc00;

border-radius:12px;

overflow:auto;

height:60vh;
}

.table-box::-webkit-scrollbar{

height:12px;
width:12px;
}

.table-box::-webkit-scrollbar-thumb{

background:#ffcc00;
border-radius:10px;
}

.table-box::-webkit-scrollbar-track{

background:#333;
}

table{

width:100%;

border-collapse:collapse;

min-width:2500px;
}

th,
td{

border:1px solid #555;

padding:8px;

white-space:nowrap;

text-align:center;
}

th{

background:#ffcc00;

color:black;

position:sticky;

top:0;
}

tr:nth-child(even){

background:#242424;
}

tr:hover{

background:#3a3a3a;
}

/* DELETE BUTTON */

.delete-btn{

background:#cc0000;

color:white;

border:none;

padding:6px 12px;

border-radius:6px;

cursor:pointer;

font-weight:bold;
}

.delete-btn:hover{

background:#ff0000;
}

</style>

</head>

<body>

<div class="top-bar">

<h1>
💰 Payroll System
</h1>

<button
onclick="window.location.href='index.html'">

← BACK

</button>

</div>

<!-- FORM -->

<div class="form-box">

<div class="grid">

<select id="employeeName">

<option value="">
Select Employee
</option>

</select>

<input
id="salaryRate"
type="number"
placeholder="Hourly Rate">

<input
id="totalHours"
type="number"
placeholder="Total Hours">

<input
id="overtimeHours"
type="number"
placeholder="Overtime Hours">

<input
id="overtimePay"
type="number"
placeholder="Overtime Pay">

<input
id="holidayPay"
type="number"
placeholder="Holiday Pay">

<input
id="sickLeave"
type="number"
placeholder="Sick Leave Pay">

<input
id="birthdayLeave"
type="number"
placeholder="Birthday Leave Pay">

<input
id="vacationLeave"
type="number"
placeholder="Vacation Leave Pay">

<input
id="sss"
type="number"
placeholder="SSS Deduction">

<input
id="philhealth"
type="number"
placeholder="PhilHealth Deduction">

<input
id="pagibig"
type="number"
placeholder="Pag-IBIG Deduction">

<input
id="healthcard"
type="number"
placeholder="Health Card">

<input
id="others"
type="number"
placeholder="Other Deduction">

<input
id="grossSalary"
placeholder="Gross Salary"
readonly>

<input
id="netSalary"
placeholder="Net Salary"
readonly>

</div>

<br>

<button
onclick="computePayroll()">

🧮 Compute Payroll

</button>

<button
onclick="savePayroll()">

💾 Save Payroll

</button>

</div>

<!-- TABLE -->

<div class="table-box">

<table id="payrollTable">

<thead>

<tr>

<th>Employee</th>
<th>Hours</th>
<th>OT Hours</th>
<th>Rate</th>

<th>Gross</th>

<th>OT Pay</th>
<th>Holiday Pay</th>
<th>Sick Leave</th>
<th>Birthday Leave</th>
<th>Vacation Leave</th>

<th>SSS</th>
<th>PhilHealth</th>
<th>Pag-IBIG</th>
<th>Health Card</th>
<th>Others</th>

<th>Net Salary</th>

<th>Action</th>

</tr>

</thead>

<tbody></tbody>

</table>

</div>

<script>

/* STORAGE */

let payrolls =

JSON.parse(
localStorage.getItem('payrolls')
) || [];

/* LOAD EMPLOYEES */

function loadEmployees(){

let employees =

JSON.parse(
localStorage.getItem('employees')
) || [];

let select =

document.getElementById(
'employeeName'
);

select.innerHTML =

'<option value=\"\">Select Employee</option>';

employees.forEach(emp=>{

let option =
document.createElement('option');

option.value =

(emp[0] || '') +
' ' +
(emp[2] || '');

option.textContent =

(emp[18] || 'NO-ID') +
' - ' +

(emp[0] || '') +
' ' +
(emp[2] || '');

select.appendChild(option);

});

}

/* COMPUTE */

function computePayroll(){

let rate =
Number(salaryRate.value || 0);

let hours =
Number(totalHours.value || 0);

let overtime =
Number(overtimeHours.value || 0);

let overtimepay =
Number(overtimePay.value || 0);

let holiday =
Number(holidayPay.value || 0);

let sick =
Number(sickLeave.value || 0);

let birthday =
Number(birthdayLeave.value || 0);

let vacation =
Number(vacationLeave.value || 0);

let sssDed =
Number(sss.value || 0);

let philDed =
Number(philhealth.value || 0);

let pagibigDed =
Number(pagibig.value || 0);

let healthDed =
Number(healthcard.value || 0);

let otherDed =
Number(others.value || 0);

/* COMPUTE */

let gross =

(hours * rate) +

(overtime * rate) +

overtimepay +

holiday +

sick +

birthday +

vacation;

let deductions =

sssDed +
philDed +
pagibigDed +
healthDed +
otherDed;

let net = gross - deductions;

/* DISPLAY */

grossSalary.value =
gross.toFixed(2);

netSalary.value =
net.toFixed(2);

}

/* SAVE */

function savePayroll(){

let payroll = {

employee:
employeeName.value,

hours:
totalHours.value,

ot:
overtimeHours.value,

rate:
salaryRate.value,

gross:
grossSalary.value,

otpay:
overtimePay.value,

holidaypay:
holidayPay.value,

sickleave:
sickLeave.value,

birthdayleave:
birthdayLeave.value,

vacationleave:
vacationLeave.value,

sss:
sss.value,

philhealth:
philhealth.value,

pagibig:
pagibig.value,

healthcard:
healthcard.value,

others:
others.value,

net:
netSalary.value

};

payrolls.push(payroll);

localStorage.setItem(

'payrolls',

JSON.stringify(payrolls)

);

renderPayroll();

alert(
'Payroll Saved'
);

}

/* DELETE */

function deletePayroll(index){

if(confirm('Delete Payroll?')){

payrolls.splice(index,1);

localStorage.setItem(
'payrolls',
JSON.stringify(payrolls)
);

renderPayroll();

}

}

/* RENDER */

function renderPayroll(){

let table =

document.querySelector(
'#payrollTable tbody'
);

table.innerHTML='';

payrolls.forEach((pay,index)=>{

table.innerHTML += `

<tr>

<td>${pay.employee}</td>
<td>${pay.hours}</td>
<td>${pay.ot}</td>
<td>${pay.rate}</td>

<td>${pay.gross}</td>

<td>${pay.otpay}</td>
<td>${pay.holidaypay}</td>
<td>${pay.sickleave}</td>
<td>${pay.birthdayleave}</td>
<td>${pay.vacationleave}</td>

<td>${pay.sss}</td>
<td>${pay.philhealth}</td>
<td>${pay.pagibig}</td>
<td>${pay.healthcard}</td>
<td>${pay.others}</td>

<td>${pay.net}</td>

<td>

<button
class="delete-btn"
onclick="deletePayroll(${index})">

DELETE

</button>

</td>

</tr>

`;

});

}

/* AUTO LOAD */

loadEmployees();

renderPayroll();

</script>

</body>
</html>
