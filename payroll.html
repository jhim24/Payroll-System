<!DOCTYPE html>
<html>
<head>

<title>Payroll System</title>

<style>

*{
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
margin:0;
padding:15px;
background:#d4d0c8;
}

/* CONTAINER */

.container{

max-width:1500px;

margin:auto;

background:#c0c0c0;

border:2px solid #808080;

box-shadow:
inset 1px 1px white,
inset -1px -1px #808080;

padding:15px;
}

/* TOP */

.top-bar{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:15px;

flex-wrap:wrap;

gap:10px;
}

h1{

margin:0;

font-size:28px;

color:#cc0000;
}

/* BUTTONS */

button{

padding:8px 15px;

cursor:pointer;

font-weight:bold;

border-top:1px solid white;
border-left:1px solid white;

border-right:1px solid #808080;
border-bottom:1px solid #808080;

transition:0.2s;
}

button:hover{

filter:brightness(1.1);
}

/* COLORS */

.compute-btn{

background:#ffcc00;

color:black;
}

.save-btn{

background:#008000;

color:white;
}

.back-btn{

background:#cc0000;

color:white;
}

.delete-btn{

background:#990000;

color:white;
}

/* FORM */

.form-box{

background:#dcdcdc;

padding:15px;

border:1px solid #808080;

margin-bottom:15px;
}

.grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:10px;
}

/* INPUT */

input,
select{

width:100%;

padding:8px;

border:1px solid #808080;

font-size:13px;
}

/* TABLE */

.table-box{

background:white;

border:1px solid #808080;

overflow:auto;

height:60vh;
}

/* SCROLLBAR */

.table-box::-webkit-scrollbar{

height:12px;
width:12px;
}

.table-box::-webkit-scrollbar-thumb{

background:#808080;
}

.table-box::-webkit-scrollbar-track{

background:#dcdcdc;
}

table{

width:100%;

border-collapse:collapse;

min-width:2500px;

font-size:12px;
}

th,
td{

border:1px solid #808080;

padding:8px;

text-align:center;

white-space:nowrap;
}

th{

background:#ffcc00;

color:black;

position:sticky;

top:0;
}

tr:nth-child(even){

background:#f2f2f2;
}

tr:hover{

background:#ffe699;
}

/* MOBILE */

@media(max-width:768px){

.grid{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="container">

<!-- TOP -->

<div class="top-bar">

<h1>
💰 Payroll System
</h1>

<button
class="back-btn"
onclick="window.location.href='index.html'">

← BACK

</button>

</div>

<!-- FORM -->

<div class="form-box">

<div class="grid">

<select id="employeeName">

<option value="">
Select Employee
</option>

</select>

<input
id="dailyRate"
type="number"
placeholder="Daily Rate">

<input
id="daysWorked"
type="number"
placeholder="Days Worked">

<input
id="overtimePay"
type="number"
placeholder="Overtime Pay">

<input
id="holidayPay"
type="number"
placeholder="Holiday Pay">

<input
id="sickLeave"
type="number"
placeholder="Sick Leave Pay">

<input
id="birthdayLeave"
type="number"
placeholder="Birthday Leave Pay">

<input
id="vacationLeave"
type="number"
placeholder="Vacation Leave Pay">

<input
id="sss"
type="number"
placeholder="SSS Deduction">

<input
id="philhealth"
type="number"
placeholder="PhilHealth Deduction">

<input
id="pagibig"
type="number"
placeholder="Pag-IBIG Deduction">

<input
id="healthcard"
type="number"
placeholder="Health Card">

<input
id="others"
type="number"
placeholder="Other Deduction">

<input
id="grossSalary"
placeholder="Gross Salary"
readonly>

<input
id="netSalary"
placeholder="Net Salary"
readonly>

</div>

<br>

<button
class="compute-btn"
type="button"
onclick="computePayroll()">

🧮 Compute Payroll

</button>

<button
class="save-btn"
type="button"
onclick="savePayroll()">

💾 Save Payroll

</button>

</div>

<!-- TABLE -->

<div class="table-box">

<table id="payrollTable">

<thead>

<tr>

<th>Employee</th>
<th>Daily Rate</th>
<th>Days Worked</th>

<th>Gross Salary</th>

<th>OT Pay</th>
<th>Holiday Pay</th>
<th>Sick Leave</th>
<th>Birthday Leave</th>
<th>Vacation Leave</th>

<th>SSS</th>
<th>PhilHealth</th>
<th>Pag-IBIG</th>
<th>Health Card</th>
<th>Others</th>

<th>Net Salary</th>

<th>Action</th>

</tr>

</thead>

<tbody>

</tbody>

</table>

</div>

</div>

<script>

/* STORAGE */

let payrolls = JSON.parse(
localStorage.getItem('payrolls')
) || [];

/* LOAD EMPLOYEES */

function loadEmployees(){

let employees = JSON.parse(
localStorage.getItem('employees')
) || [];

let select =
document.getElementById(
'employeeName'
);

select.innerHTML =
'<option value=\"\">Select Employee</option>';

employees.forEach(emp=>{

let fullName =

(emp[0] || '') +
' ' +
(emp[2] || '');

let empId =
emp[18] || 'NO-ID';

select.innerHTML += `

<option value="${fullName}">

${empId} - ${fullName}

</option>

`;

});

}

/* COMPUTE */

function computePayroll(){

let daily =
parseFloat(
document.getElementById(
'dailyRate'
).value
) || 0;

let days =
parseFloat(
document.getElementById(
'daysWorked'
).value
) || 0;

let ot =
parseFloat(
document.getElementById(
'overtimePay'
).value
) || 0;

let holiday =
parseFloat(
document.getElementById(
'holidayPay'
).value
) || 0;

let sick =
parseFloat(
document.getElementById(
'sickLeave'
).value
) || 0;

let birthday =
parseFloat(
document.getElementById(
'birthdayLeave'
).value
) || 0;

let vacation =
parseFloat(
document.getElementById(
'vacationLeave'
).value
) || 0;

let sss =
parseFloat(
document.getElementById(
'sss'
).value
) || 0;

let philhealth =
parseFloat(
document.getElementById(
'philhealth'
).value
) || 0;

let pagibig =
parseFloat(
document.getElementById(
'pagibig'
).value
) || 0;

let healthcard =
parseFloat(
document.getElementById(
'healthcard'
).value
) || 0;

let others =
parseFloat(
document.getElementById(
'others'
).value
) || 0;

/* GROSS */

let gross =

(daily * days) +

ot +
holiday +
sick +
birthday +
vacation;

/* DEDUCTIONS */

let deductions =

sss +
philhealth +
pagibig +
healthcard +
others;

/* NET */

let net =
gross - deductions;

/* DISPLAY */

document.getElementById(
'grossSalary'
).value =
gross.toFixed(2);

document.getElementById(
'netSalary'
).value =
net.toFixed(2);

}

/* SAVE */

function savePayroll(){

let employee =
document.getElementById(
'employeeName'
).value;

if(employee===''){

alert('Select Employee');

return;

}

let payroll = {

employee: employee,

daily:
dailyRate.value,

days:
daysWorked.value,

gross:
grossSalary.value,

ot:
overtimePay.value,

holiday:
holidayPay.value,

sick:
sickLeave.value,

birthday:
birthdayLeave.value,

vacation:
vacationLeave.value,

sss:
sss.value,

philhealth:
philhealth.value,

pagibig:
pagibig.value,

healthcard:
healthcard.value,

others:
others.value,

net:
netSalary.value

};

/* PUSH */

payrolls.push(payroll);

/* SAVE STORAGE */

localStorage.setItem(
'payrolls',
JSON.stringify(payrolls)
);

/* RENDER */

renderPayroll();

/* CLEAR */

clearForm();

alert(
'Payroll Saved'
);

}

/* DELETE */

function deletePayroll(index){

if(confirm(
'Delete Payroll?'
)){

payrolls.splice(index,1);

localStorage.setItem(
'payrolls',
JSON.stringify(payrolls)
);

renderPayroll();

}

}

/* RENDER TABLE */

function renderPayroll(){

let tbody =
document.querySelector(
'#payrollTable tbody'
);

tbody.innerHTML = '';

payrolls.forEach((pay,index)=>{

tbody.innerHTML += `

<tr>

<td>${pay.employee}</td>

<td>${pay.daily}</td>
<td>${pay.days}</td>

<td>${pay.gross}</td>

<td>${pay.ot}</td>
<td>${pay.holiday}</td>
<td>${pay.sick}</td>
<td>${pay.birthday}</td>
<td>${pay.vacation}</td>

<td>${pay.sss}</td>
<td>${pay.philhealth}</td>
<td>${pay.pagibig}</td>
<td>${pay.healthcard}</td>
<td>${pay.others}</td>

<td>${pay.net}</td>

<td>

<button
class="delete-btn"
onclick="deletePayroll(${index})">

DELETE

</button>

</td>

</tr>

`;

});

}

/* CLEAR FORM */

function clearForm(){

employeeName.value='';

dailyRate.value='';

daysWorked.value='';

overtimePay.value='';

holidayPay.value='';

sickLeave.value='';

birthdayLeave.value='';

vacationLeave.value='';

sss.value='';

philhealth.value='';

pagibig.value='';

healthcard.value='';

others.value='';

grossSalary.value='';

netSalary.value='';

}

/* AUTO LOAD */

loadEmployees();

renderPayroll();

</script>

</body>
</html>
