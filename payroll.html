<!DOCTYPE html>
<html>
<head>

<title>Payroll System</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#d4d0c8;
padding:15px;
}

/* CONTAINER */

.container{

max-width:1300px;

margin:auto;

background:#c0c0c0;

border:2px solid #808080;

box-shadow:
inset 1px 1px white,
inset -1px -1px #808080;
}

/* HEADER */

.header{

padding:15px;

background:#d4d0c8;

border-bottom:2px solid #808080;

display:flex;

justify-content:space-between;

align-items:center;

flex-wrap:wrap;
}

.title{

font-size:28px;

font-weight:bold;

color:#cc0000;
}

/* BUTTON */

.btn{

padding:8px 18px;

background:#dcdcdc;

border-top:1px solid white;
border-left:1px solid white;

border-right:1px solid #808080;
border-bottom:1px solid #808080;

cursor:pointer;

font-weight:bold;

font-size:12px;
}

.save-btn{
background:#008000;
color:white;
}

.edit-btn{
background:#0066cc;
color:white;
}

.delete-btn{
background:#cc0000;
color:white;
}

.compute-btn{
background:#ffcc00;
}

/* FORM */

.form-section{

padding:15px;
}

.form-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:10px;
}

input,
select,
textarea{

width:100%;

padding:10px;

border:1px solid #808080;

font-size:13px;
}

/* COMPUTE BOX */

.compute-box{

margin-top:20px;

padding:15px;

background:white;

border:1px solid #808080;
}

.compute-box h3{

margin-bottom:15px;
}

/* TABLE */

.table-wrapper{

margin-top:20px;

overflow:auto;

max-height:450px;

background:white;

border-top:2px solid #808080;
}

table{

width:100%;

border-collapse:collapse;

min-width:2600px;

font-size:12px;
}

th,
td{

border:1px solid #808080;

padding:10px;

text-align:center;

white-space:nowrap;
}

th{

background:#ffcc00;

position:sticky;

top:0;

z-index:5;
}

/* TOTAL */

.total-box{

margin-top:15px;

font-size:18px;

font-weight:bold;
}

/* COLORS */

.netpay{

color:green;

font-weight:bold;
}

.deduction{

color:red;

font-weight:bold;
}

.notes{

text-align:left;

white-space:normal;

min-width:250px;
}

</style>

</head>

<body>

<div class="container">

<!-- HEADER -->

<div class="header">

<div class="title">
PAYROLL SYSTEM
</div>

<button
class="btn"
onclick="window.history.back()">

← BACK

</button>

</div>

<!-- FORM -->

<div class="form-section">

<div class="form-grid">

<select id="employeeSelect">

<option value="">
Select Employee
</option>

</select>

<input
type="number"
id="dailyRate"
placeholder="Daily Rate">

<input
type="number"
id="daysWorked"
placeholder="Days Worked">

<input
type="number"
id="overtime"
placeholder="Overtime Pay">

<input
type="number"
id="holidayPay"
placeholder="Holiday Pay">

<input
type="number"
id="sickLeave"
placeholder="Sick Leave Pay">

<input
type="number"
id="birthdayLeave"
placeholder="Birthday Leave Pay">

<input
type="number"
id="vacationLeave"
placeholder="Vacation Leave Pay">

<input
type="number"
id="cashAdvance"
placeholder="Cash Advance">

<input
type="number"
id="lateDeduction"
placeholder="Late Deduction">

<input
type="number"
id="sss"
placeholder="SSS">

<input
type="number"
id="philhealth"
placeholder="PhilHealth">

<input
type="number"
id="pagibig"
placeholder="Pag-IBIG">

<input
type="number"
id="healthCard"
placeholder="Health Card">

<input
type="number"
id="otherDeduction"
placeholder="Other Deduction">

<textarea
id="otherNote"
placeholder="Reason / Notes for Other Deduction"></textarea>

</div>

<!-- COMPUTE -->

<div class="compute-box">

<h3>Payroll Computation</h3>

<button
class="btn compute-btn"
onclick="computePayroll()">

COMPUTE PAYROLL

</button>

<button
class="btn save-btn"
onclick="savePayroll()">

SAVE PAYROLL

</button>

<div class="total-box">

<p id="grossPay">
Gross Pay : 0
</p>

<p id="totalDeduction">
Total Deduction : 0
</p>

<p class="netpay"
id="netPay">

Net Pay : 0

</p>

</div>

</div>

<!-- TABLE -->

<div class="table-wrapper">

<table>

<thead>

<tr>

<th>EMPLOYEE</th>
<th>DAILY RATE</th>
<th>DAYS WORKED</th>

<th>GROSS PAY</th>

<th>OVERTIME</th>
<th>HOLIDAY</th>
<th>SICK LEAVE</th>
<th>BIRTHDAY LEAVE</th>
<th>VACATION LEAVE</th>

<th>CASH ADVANCE</th>
<th>LATE</th>
<th>SSS</th>
<th>PHILHEALTH</th>
<th>PAG-IBIG</th>
<th>HEALTH CARD</th>
<th>OTHER</th>

<th>OTHER NOTE</th>

<th>TOTAL DEDUCTION</th>
<th>NET PAY</th>

<th>ACTION</th>

</tr>

</thead>

<tbody id="payrollBody">

</tbody>

</table>

</div>

</div>

</div>

<script>

let editIndex = null;

/* ======================
LOAD EMPLOYEES
====================== */

function loadEmployees(){

let employees = [];

try{

employees = JSON.parse(
localStorage.getItem('employees')
) || [];

}catch(error){

employees = [];

}

let select =
document.getElementById(
'employeeSelect'
);

select.innerHTML =
'<option value="">Select Employee</option>';

employees.forEach((emp)=>{

let first =
emp[0] || '';

let middle =
emp[1] || '';

let last =
emp[2] || '';

let fullName =
first + ' ' +
middle + ' ' +
last;

let empId =
emp[18] || 'NO-ID';

let option =
document.createElement('option');

option.value = fullName;

option.textContent =
empId + ' - ' + fullName;

select.appendChild(option);

});

}

/* ======================
PAYROLL STORAGE
====================== */

let payrollRecords = [];

try{

payrollRecords = JSON.parse(
localStorage.getItem('payroll')
) || [];

}catch(error){

payrollRecords = [];

}

/* ======================
COMPUTE PAYROLL
====================== */

function computePayroll(){

let rate =
parseFloat(dailyRate.value) || 0;

let days =
parseFloat(daysWorked.value) || 0;

let overtimePay =
parseFloat(overtime.value) || 0;

let holiday =
parseFloat(holidayPay.value) || 0;

let sick =
parseFloat(sickLeave.value) || 0;

let birthday =
parseFloat(birthdayLeave.value) || 0;

let vacation =
parseFloat(vacationLeave.value) || 0;

let cash =
parseFloat(cashAdvance.value) || 0;

let late =
parseFloat(lateDeduction.value) || 0;

let sssDed =
parseFloat(sss.value) || 0;

let phil =
parseFloat(philhealth.value) || 0;

let pagibigDed =
parseFloat(pagibig.value) || 0;

let health =
parseFloat(healthCard.value) || 0;

let other =
parseFloat(otherDeduction.value) || 0;

/* COMPUTE */

let gross =
(rate * days) +
overtimePay +
holiday +
sick +
birthday +
vacation;

let deductions =

cash +
late +
sssDed +
phil +
pagibigDed +
health +
other;

let net =
gross - deductions;

/* DISPLAY */

grossPay.innerText =
'Gross Pay : ' +
gross.toFixed(2);

totalDeduction.innerText =
'Total Deduction : ' +
deductions.toFixed(2);

netPay.innerText =
'Net Pay : ' +
net.toFixed(2);

}

/* ======================
SAVE PAYROLL
====================== */

function savePayroll(){

if(employeeSelect.value===''){

alert('Select Employee');

return;

}

let rate =
parseFloat(dailyRate.value) || 0;

let days =
parseFloat(daysWorked.value) || 0;

let overtimePay =
parseFloat(overtime.value) || 0;

let holiday =
parseFloat(holidayPay.value) || 0;

let sick =
parseFloat(sickLeave.value) || 0;

let birthday =
parseFloat(birthdayLeave.value) || 0;

let vacation =
parseFloat(vacationLeave.value) || 0;

let cash =
parseFloat(cashAdvance.value) || 0;

let late =
parseFloat(lateDeduction.value) || 0;

let sssDed =
parseFloat(sss.value) || 0;

let phil =
parseFloat(philhealth.value) || 0;

let pagibigDed =
parseFloat(pagibig.value) || 0;

let health =
parseFloat(healthCard.value) || 0;

let other =
parseFloat(otherDeduction.value) || 0;

let otherReason =
otherNote.value || '-';

/* COMPUTE */

let gross =
(rate * days) +
overtimePay +
holiday +
sick +
birthday +
vacation;

let deductions =

cash +
late +
sssDed +
phil +
pagibigDed +
health +
other;

let net =
gross - deductions;

/* DATA */

let payrollData = {

employee:employeeSelect.value,

rate:rate,

days:days,

gross:gross,

overtime:overtimePay,

holiday:holiday,

sick:sick,

birthday:birthday,

vacation:vacation,

cash:cash,

late:late,

sss:sssDed,

philhealth:phil,

pagibig:pagibigDed,

health:health,

other:other,

otherReason:otherReason,

deductions:deductions,

net:net

};

/* EDIT */

if(editIndex !== null){

payrollRecords[editIndex] =
payrollData;

editIndex = null;

alert('Payroll Updated');

}

/* ADD */

else{

payrollRecords.push(
payrollData
);

alert('Payroll Saved');

}

/* SAVE STORAGE */

localStorage.setItem(
'payroll',
JSON.stringify(payrollRecords)
);

/* REFRESH */

renderPayroll();

clearForm();

/* RESET DISPLAY */

grossPay.innerText =
'Gross Pay : 0';

totalDeduction.innerText =
'Total Deduction : 0';

netPay.innerText =
'Net Pay : 0';

}

/* ======================
RENDER TABLE
====================== */

function renderPayroll(){

let tbody =
document.getElementById(
'payrollBody'
);

tbody.innerHTML = '';

if(payrollRecords.length === 0){

tbody.innerHTML = `

<tr>

<td colspan="20">

NO PAYROLL RECORD FOUND

</td>

</tr>

`;

return;

}

payrollRecords.forEach((pay,index)=>{

let row =
document.createElement('tr');

row.innerHTML = `

<td>${pay.employee || ''}</td>

<td>${Number(pay.rate || 0).toFixed(2)}</td>

<td>${pay.days || 0}</td>

<td>${Number(pay.gross || 0).toFixed(2)}</td>

<td>${Number(pay.overtime || 0).toFixed(2)}</td>

<td>${Number(pay.holiday || 0).toFixed(2)}</td>

<td>${Number(pay.sick || 0).toFixed(2)}</td>

<td>${Number(pay.birthday || 0).toFixed(2)}</td>

<td>${Number(pay.vacation || 0).toFixed(2)}</td>

<td class="deduction">
${Number(pay.cash || 0).toFixed(2)}
</td>

<td class="deduction">
${Number(pay.late || 0).toFixed(2)}
</td>

<td class="deduction">
${Number(pay.sss || 0).toFixed(2)}
</td>

<td class="deduction">
${Number(pay.philhealth || 0).toFixed(2)}
</td>

<td class="deduction">
${Number(pay.pagibig || 0).toFixed(2)}
</td>

<td class="deduction">
${Number(pay.health || 0).toFixed(2)}
</td>

<td class="deduction">
${Number(pay.other || 0).toFixed(2)}
</td>

<td class="notes">
${pay.otherReason || '-'}
</td>

<td class="deduction">
${Number(pay.deductions || 0).toFixed(2)}
</td>

<td class="netpay">
${Number(pay.net || 0).toFixed(2)}
</td>

<td>

<button
class="btn edit-btn"
onclick="editPayroll(${index})">

EDIT

</button>

<button
class="btn delete-btn"
onclick="deletePayroll(${index})">

DELETE

</button>

</td>

`;

tbody.appendChild(row);

});

}

/* ======================
EDIT
====================== */

function editPayroll(index){

let pay =
payrollRecords[index];

editIndex = index;

employeeSelect.value =
pay.employee || '';

dailyRate.value =
pay.rate || '';

daysWorked.value =
pay.days || '';

overtime.value =
pay.overtime || '';

holidayPay.value =
pay.holiday || '';

sickLeave.value =
pay.sick || '';

birthdayLeave.value =
pay.birthday || '';

vacationLeave.value =
pay.vacation || '';

cashAdvance.value =
pay.cash || '';

lateDeduction.value =
pay.late || '';

sss.value =
pay.sss || '';

philhealth.value =
pay.philhealth || '';

pagibig.value =
pay.pagibig || '';

healthCard.value =
pay.health || '';

otherDeduction.value =
pay.other || '';

otherNote.value =
pay.otherReason || '';

grossPay.innerText =
'Gross Pay : ' +
Number(pay.gross || 0).toFixed(2);

totalDeduction.innerText =
'Total Deduction : ' +
Number(pay.deductions || 0).toFixed(2);

netPay.innerText =
'Net Pay : ' +
Number(pay.net || 0).toFixed(2);

}

/* ======================
DELETE
====================== */

function deletePayroll(index){

let confirmDelete = confirm(
'Delete Payroll Record?'
);

if(confirmDelete){

payrollRecords.splice(index,1);

localStorage.setItem(
'payroll',
JSON.stringify(payrollRecords)
);

renderPayroll();

}

}

/* ======================
CLEAR FORM
====================== */

function clearForm(){

employeeSelect.value='';

dailyRate.value='';

daysWorked.value='';

overtime.value='';

holidayPay.value='';

sickLeave.value='';

birthdayLeave.value='';

vacationLeave.value='';

cashAdvance.value='';

lateDeduction.value='';

sss.value='';

philhealth.value='';

pagibig.value='';

healthCard.value='';

otherDeduction.value='';

otherNote.value='';

}

/* ======================
AUTO LOAD
====================== */

loadEmployees();

renderPayroll();

</script>

</body>
</html>
