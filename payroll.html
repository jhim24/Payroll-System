<!DOCTYPE html>
<html>
<head>

<title>Payroll Management</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#1f1f1f;
padding:15px;
color:white;
}

/* CONTAINER */

.container{

max-width:1600px;

margin:auto;

background:#2b2b2b;

border:3px solid #ffcc00;

border-radius:15px;

overflow:hidden;
}

/* HEADER */

.header{

background:
linear-gradient(
135deg,
#ffcc00,
#ff8800
);

padding:15px;

display:flex;

justify-content:space-between;

align-items:center;

flex-wrap:wrap;
}

.title{

font-size:28px;

font-weight:bold;

color:black;
}

/* BUTTON */

.btn{

padding:10px 18px;

border:none;

border-radius:10px;

cursor:pointer;

font-weight:bold;

font-size:13px;

transition:0.3s;
}

.btn:hover{

transform:scale(1.03);
}

.back-btn{
background:#0066cc;
color:white;
}

.save-btn{
background:#008000;
color:white;
}

.delete-btn{
background:#cc0000;
color:white;
}

.print-btn{
background:#ff8800;
color:black;
}

/* FORM */

.form-section{
padding:20px;
}

.form-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:12px;
}

input,
select{

width:100%;

padding:10px;

border-radius:10px;

border:2px solid #555;

background:#1f1f1f;

color:white;
}

/* TABLE */

.table-wrapper{

margin-top:20px;

overflow:auto;

background:white;

border-radius:10px;
}

table{

width:100%;

border-collapse:collapse;

min-width:2600px;
}

th,
td{

border:1px solid #999;

padding:10px;

text-align:center;
}

th{

background:#ffcc00;

color:black;

position:sticky;

top:0;
}

td{
color:black;
}

/* TOTAL */

.total-box{

margin-top:15px;

padding:15px;

background:#1a1a1a;

border:2px solid #ffcc00;

border-radius:10px;

font-size:18px;

font-weight:bold;
}

/* MOBILE */

@media(max-width:768px){

.title{

font-size:22px;
}

}

</style>

</head>

<body>

<div class="container">

<!-- HEADER -->

<div class="header">

<div class="title">
💰 PAYROLL MANAGEMENT
</div>

<div style="display:flex;gap:10px;flex-wrap:wrap;">

<button
class="btn print-btn"
onclick="window.print()">

🖨 PRINT

</button>

<button
class="btn back-btn"
onclick="window.location.href='index.html'">

← BACK

</button>

</div>

</div>

<!-- FORM -->

<div class="form-section">

<div class="form-grid">

<select id="employeeSelect">

<option value="">
Select Employee
</option>

</select>

<input
type="number"
id="gross"
placeholder="Gross Pay">

<input
type="number"
id="overtime"
placeholder="Overtime">

<input
type="number"
id="holiday"
placeholder="Holiday Pay">

<input
type="number"
id="sickleave"
placeholder="Sick Leave">

<input
type="number"
id="vacationleave"
placeholder="Vacation Leave">

<input
type="number"
id="birthdayleave"
placeholder="Birthday Leave">

<input
type="number"
id="maternityleave"
placeholder="Maternity Leave">

<input
type="number"
id="paternityleave"
placeholder="Paternity Leave">

<input
type="number"
id="allowance"
placeholder="Allowance">

<input
type="number"
id="sss"
placeholder="SSS">

<input
type="number"
id="philhealth"
placeholder="PhilHealth">

<input
type="number"
id="pagibig"
placeholder="Pag-IBIG">

<input
type="number"
id="healthcard"
placeholder="Health Card">

<input
type="number"
id="others"
placeholder="Other Deduction">

<input
type="text"
id="othersReason"
placeholder="Reason for Other Deduction">

</div>

<br>

<button
class="btn save-btn"
onclick="savePayroll()">

💾 SAVE PAYROLL

</button>

<!-- TOTAL -->

<div class="total-box">

TOTAL NET PAY :
₱ <span id="totalNet">
0.00
</span>

</div>

<!-- TABLE -->

<div class="table-wrapper">

<table>

<thead>

<tr>

<th>EMPLOYEE ID</th>
<th>EMPLOYEE</th>
<th>GROSS</th>
<th>OVERTIME</th>
<th>HOLIDAY</th>
<th>SICK</th>
<th>VACATION</th>
<th>BIRTHDAY</th>
<th>MATERNITY</th>
<th>PATERNITY</th>
<th>ALLOWANCE</th>
<th>SSS</th>
<th>PHILHEALTH</th>
<th>PAG-IBIG</th>
<th>HEALTH CARD</th>
<th>OTHERS</th>
<th>REASON</th>
<th>TOTAL DEDUCTION</th>
<th>NET PAY</th>
<th>ACTION</th>

</tr>

</thead>

<tbody id="payrollBody">

</tbody>

</table>

</div>

</div>

</div>

<script type="module">

/* =========================
FIREBASE
========================= */

import {

initializeApp

}

from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc

}

from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

/* CONFIG */

const firebaseConfig = {

apiKey:
"AIzaSyAehoq0teVYHiJ4bkKOgBqIgJZrQpce3k8",

authDomain:
"hr-system-38fc3.firebaseapp.com",

projectId:
"hr-system-38fc3",

storageBucket:
"hr-system-38fc3.firebasestorage.app",

messagingSenderId:
"615471610834",

appId:
"1:615471610834:web:a0d671d4e3f4c1b57b660b"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* =========================
LOAD EMPLOYEES
========================= */

async function loadEmployees(){

employeeSelect.innerHTML =

`
<option value="">
Select Employee
</option>
`;

let querySnapshot =

await getDocs(
collection(db,'employees')
);

querySnapshot.forEach(doc=>{

let emp = doc.data();

let fullname =

(emp.firstname || '') + ' ' +

(emp.middlename || '') + ' ' +

(emp.lastname || '');

employeeSelect.innerHTML += `

<option
value="${fullname}"
data-id="${emp.employeeid}">

${emp.employeeid}
-
${fullname}

</option>

`;

});

}

loadEmployees();

/* =========================
SAVE PAYROLL
========================= */

window.savePayroll =
async function(){

if(employeeSelect.value===''){

alert(
'Select Employee'
);

return;

}

let selected =

employeeSelect.options[
employeeSelect.selectedIndex
];

let empid =
selected.dataset.id;

let employee =
employeeSelect.value;

let grossPay =
Number(gross.value || 0);

let overtimePay =
Number(overtime.value || 0);

let holidayPay =
Number(holiday.value || 0);

let sickLeavePay =
Number(sickleave.value || 0);

let vacationLeavePay =
Number(vacationleave.value || 0);

let birthdayLeavePay =
Number(birthdayleave.value || 0);

let maternityLeavePay =
Number(maternityleave.value || 0);

let paternityLeavePay =
Number(paternityleave.value || 0);

let allowancePay =
Number(allowance.value || 0);

let sssDed =
Number(sss.value || 0);

let philhealthDed =
Number(philhealth.value || 0);

let pagibigDed =
Number(pagibig.value || 0);

let healthCardDed =
Number(healthcard.value || 0);

let othersDed =
Number(others.value || 0);

let othersReasonText =
othersReason.value || '';

let deductions =

sssDed +
philhealthDed +
pagibigDed +
healthCardDed +
othersDed;

let net =

grossPay +
overtimePay +
holidayPay +
sickLeavePay +
vacationLeavePay +
birthdayLeavePay +
maternityLeavePay +
paternityLeavePay +
allowancePay -

deductions;

try{

await addDoc(
collection(db,'payroll'),

{

empid: empid,

employee: employee,

gross: grossPay,

overtime: overtimePay,

holiday: holidayPay,

sick: sickLeavePay,

vacation: vacationLeavePay,

birthday: birthdayLeavePay,

maternity: maternityLeavePay,

paternity: paternityLeavePay,

allowance: allowancePay,

sss: sssDed,

philhealth: philhealthDed,

pagibig: pagibigDed,

health: healthCardDed,

other: othersDed,

otherreason: othersReasonText,

deductions: deductions,

net: net,

date:
new Date()
.toLocaleDateString()

}

);

alert(
'Payroll Saved'
);

clearForm();

loadPayroll();

}catch(error){

console.log(error);

alert(
'Firebase Error'
);

}

}

/* =========================
LOAD PAYROLL
========================= */

async function loadPayroll(){

payrollBody.innerHTML='';

let total = 0;

let querySnapshot =

await getDocs(
collection(db,'payroll')
);

querySnapshot.forEach(async(payrollDoc)=>{

let pay =
payrollDoc.data();

total +=
Number(pay.net || 0);

payrollBody.innerHTML += `

<tr>

<td>${pay.empid || ''}</td>

<td>${pay.employee || ''}</td>

<td>
₱ ${Number(pay.gross || 0)
.toFixed(2)}
</td>

<td>
₱ ${Number(pay.overtime || 0)
.toFixed(2)}
</td>

<td>
₱ ${Number(pay.holiday || 0)
.toFixed(2)}
</td>

<td>
₱ ${Number(pay.sick || 0)
.toFixed(2)}
</td>

<td>
₱ ${Number(pay.vacation || 0)
.toFixed(2)}
</td>

<td>
₱ ${Number(pay.birthday || 0)
.toFixed(2)}
</td>

<td>
₱ ${Number(pay.maternity || 0)
.toFixed(2)}
</td>

<td>
₱ ${Number(pay.paternity || 0)
.toFixed(2)}
</td>

<td>
₱ ${Number(pay.allowance || 0)
.toFixed(2)}
</td>

<td>
₱ ${Number(pay.sss || 0)
.toFixed(2)}
</td>

<td>
₱ ${Number(pay.philhealth || 0)
.toFixed(2)}
</td>

<td>
₱ ${Number(pay.pagibig || 0)
.toFixed(2)}
</td>

<td>
₱ ${Number(pay.health || 0)
.toFixed(2)}
</td>

<td>
₱ ${Number(pay.other || 0)
.toFixed(2)}
</td>

<td>
${pay.otherreason || '-'}
</td>

<td>
₱ ${Number(pay.deductions || 0)
.toFixed(2)}
</td>

<td>
₱ ${Number(pay.net || 0)
.toFixed(2)}
</td>

<td>

<button
class="btn delete-btn"
onclick="deletePayroll(
'${payrollDoc.id}'
)">

DELETE

</button>

</td>

</tr>

`;

});

totalNet.innerText =
total.toFixed(2);

}

loadPayroll();

/* =========================
DELETE PAYROLL
========================= */

window.deletePayroll =
async function(id){

let confirmDelete =
confirm(
'Delete Payroll?'
);

if(confirmDelete){

await deleteDoc(
doc(db,'payroll',id)
);

loadPayroll();

}

}

/* =========================
CLEAR FORM
========================= */

function clearForm(){

employeeSelect.value='';

gross.value='';

overtime.value='';

holiday.value='';

sickleave.value='';

vacationleave.value='';

birthdayleave.value='';

maternityleave.value='';

paternityleave.value='';

allowance.value='';

sss.value='';

philhealth.value='';

pagibig.value='';

healthcard.value='';

others.value='';

othersReason.value='';

}

</script>

</body>
</html>
