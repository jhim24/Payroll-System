<!DOCTYPE html>
<html>
<head>

<title>Payroll System</title>

<style>

*{
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
margin:0;
padding:15px;
background:#d4d0c8;
}

.container{

max-width:1500px;
margin:auto;

background:#c0c0c0;

border:2px solid #808080;

padding:15px;
}

/* TOP */

.top-bar{

display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:15px;
}

h1{

margin:0;
color:#cc0000;
}

/* BUTTON */

button{

padding:8px 15px;

cursor:pointer;

font-weight:bold;

border-top:1px solid white;
border-left:1px solid white;

border-right:1px solid #808080;
border-bottom:1px solid #808080;
}

.compute-btn{
background:#ffcc00;
}

.save-btn{
background:#008000;
color:white;
}

.back-btn{
background:#cc0000;
color:white;
}

.delete-btn{
background:#990000;
color:white;
}

/* FORM */

.form-box{

background:#dcdcdc;

padding:15px;

border:1px solid #808080;

margin-bottom:15px;
}

.grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:10px;
}

input,
select{

width:100%;
padding:8px;

border:1px solid #808080;
}

/* TABLE */

.table-box{

background:white;

border:1px solid #808080;

overflow:auto;

height:60vh;
}

table{

width:100%;

border-collapse:collapse;

min-width:2500px;
}

th,
td{

border:1px solid #808080;

padding:8px;

text-align:center;

white-space:nowrap;
}

th{

background:#ffcc00;

position:sticky;
top:0;
}

</style>

</head>

<body>

<div class="container">

<div class="top-bar">

<h1>
💰 Payroll System
</h1>

<button
class="back-btn"
onclick="window.location.href='index.html'">

← BACK

</button>

</div>

<!-- FORM -->

<div class="form-box">

<div class="grid">

<select id="employeeName">

<option value="">
Select Employee
</option>

</select>

<input
id="dailyRate"
type="number"
placeholder="Daily Rate">

<input
id="daysWorked"
type="number"
placeholder="Days Worked">

<input
id="overtimePay"
type="number"
placeholder="Overtime Pay">

<input
id="holidayPay"
type="number"
placeholder="Holiday Pay">

<input
id="sickLeave"
type="number"
placeholder="Sick Leave Pay">

<input
id="birthdayLeave"
type="number"
placeholder="Birthday Leave Pay">

<input
id="vacationLeave"
type="number"
placeholder="Vacation Leave Pay">

<input
id="sss"
type="number"
placeholder="SSS Deduction">

<input
id="philhealth"
type="number"
placeholder="PhilHealth Deduction">

<input
id="pagibig"
type="number"
placeholder="Pag-IBIG Deduction">

<input
id="healthcard"
type="number"
placeholder="Health Card">

<input
id="others"
type="number"
placeholder="Other Deduction">

<input
id="grossSalary"
placeholder="Gross Salary"
readonly>

<input
id="netSalary"
placeholder="Net Salary"
readonly>

</div>

<br>

<button
class="compute-btn"
onclick="computePayroll()">

COMPUTE

</button>

<button
class="save-btn"
onclick="savePayroll()">

SAVE

</button>

</div>

<!-- TABLE -->

<div class="table-box">

<table>

<thead>

<tr>

<th>Employee</th>
<th>Daily</th>
<th>Days</th>
<th>Gross</th>

<th>OT</th>
<th>Holiday</th>
<th>Sick</th>
<th>Birthday</th>
<th>Vacation</th>

<th>SSS</th>
<th>PhilHealth</th>
<th>PagIBIG</th>
<th>HealthCard</th>
<th>Others</th>

<th>Net</th>

<th>Action</th>

</tr>

</thead>

<tbody id="payrollBody">

</tbody>

</table>

</div>

</div>

<script>

/* STORAGE */

let payrolls = JSON.parse(
localStorage.getItem('payrolls')
) || [];

/* LOAD EMPLOYEE */

function loadEmployees(){

let employees = JSON.parse(
localStorage.getItem('employees')
) || [];

let select =
document.getElementById(
'employeeName'
);

select.innerHTML =
'<option value="">Select Employee</option>';

employees.forEach(emp=>{

let fullname =

(emp[0] || '') +
' ' +
(emp[2] || '');

let empid =
emp[18] || '';

select.innerHTML += `

<option value="${fullname}">

${empid} - ${fullname}

</option>

`;

});

}

/* COMPUTE */

function computePayroll(){

let daily =
Number(dailyRate.value) || 0;

let days =
Number(daysWorked.value) || 0;

let ot =
Number(overtimePay.value) || 0;

let holiday =
Number(holidayPay.value) || 0;

let sick =
Number(sickLeave.value) || 0;

let birthday =
Number(birthdayLeave.value) || 0;

let vacation =
Number(vacationLeave.value) || 0;

let sssded =
Number(sss.value) || 0;

let phded =
Number(philhealth.value) || 0;

let pagibigded =
Number(pagibig.value) || 0;

let healthded =
Number(healthcard.value) || 0;

let othersded =
Number(others.value) || 0;

/* GROSS */

let gross =

(daily * days) +

ot +
holiday +
sick +
birthday +
vacation;

/* DEDUCTIONS */

let deductions =

sssded +
phded +
pagibigded +
healthded +
othersded;

/* NET */

let net =
gross - deductions;

grossSalary.value =
gross.toFixed(2);

netSalary.value =
net.toFixed(2);

}

/* SAVE */

function savePayroll(){

if(employeeName.value===''){

alert('Select Employee');

return;

}

let payroll = {

employee:
employeeName.value,

daily:
dailyRate.value,

days:
daysWorked.value,

gross:
grossSalary.value,

ot:
overtimePay.value,

holiday:
holidayPay.value,

sick:
sickLeave.value,

birthday:
birthdayLeave.value,

vacation:
vacationLeave.value,

sss:
sss.value,

philhealth:
philhealth.value,

pagibig:
pagibig.value,

healthcard:
healthcard.value,

others:
others.value,

net:
netSalary.value

};

payrolls.push(payroll);

/* SAVE */

localStorage.setItem(
'payrolls',
JSON.stringify(payrolls)
);

/* UPDATE TABLE */

renderPayroll();

/* CLEAR */

clearForm();

alert('Payroll Saved');

}

/* RENDER */

function renderPayroll(){

let tbody =
document.getElementById(
'payrollBody'
);

tbody.innerHTML = '';

payrolls.forEach((pay,index)=>{

tbody.innerHTML += `

<tr>

<td>${pay.employee}</td>
<td>${pay.daily}</td>
<td>${pay.days}</td>
<td>${pay.gross}</td>

<td>${pay.ot}</td>
<td>${pay.holiday}</td>
<td>${pay.sick}</td>
<td>${pay.birthday}</td>
<td>${pay.vacation}</td>

<td>${pay.sss}</td>
<td>${pay.philhealth}</td>
<td>${pay.pagibig}</td>
<td>${pay.healthcard}</td>
<td>${pay.others}</td>

<td>${pay.net}</td>

<td>

<button
class="delete-btn"
onclick="deletePayroll(${index})">

DELETE

</button>

</td>

</tr>

`;

});

}

/* DELETE */

function deletePayroll(index){

payrolls.splice(index,1);

localStorage.setItem(
'payrolls',
JSON.stringify(payrolls)
);

renderPayroll();

}

/* CLEAR */

function clearForm(){

dailyRate.value='';
daysWorked.value='';
overtimePay.value='';
holidayPay.value='';
sickLeave.value='';
birthdayLeave.value='';
vacationLeave.value='';
sss.value='';
philhealth.value='';
pagibig.value='';
healthcard.value='';
others.value='';
grossSalary.value='';
netSalary.value='';

}

/* AUTO LOAD */

loadEmployees();

renderPayroll();

</script>

</body>
</html>
