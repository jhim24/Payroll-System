<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inactive Employees</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{

background:
linear-gradient(
135deg,
#1f1f1f,
#2b2b2b
);

padding:15px;

color:white;
}

/* TOP */

.top-bar{

display:flex;

justify-content:space-between;

align-items:center;

flex-wrap:wrap;

gap:10px;

margin-bottom:15px;
}

h2{

font-size:30px;

color:#ff4444;

text-shadow:2px 2px 5px black;
}

/* BUTTONS */

.btn,
.back-btn,
.restore-btn{

padding:10px 18px;

border:none;

border-radius:10px;

cursor:pointer;

font-weight:bold;

font-size:13px;

transition:0.3s;

color:white;

box-shadow:
0 4px 10px rgba(0,0,0,0.4);
}

.back-btn{

background:
linear-gradient(
135deg,
#ffcc00,
#ff6600
);

color:black;
}

.restore-btn{

background:
linear-gradient(
135deg,
#00cc66,
#00994d
);
}

.btn{

background:
linear-gradient(
135deg,
#ff4444,
#cc0000
);
}

.back-btn:hover,
.restore-btn:hover,
.btn:hover{

transform:translateY(-2px);

filter:brightness(1.1);
}

/* SEARCH */

.search-box input{

width:250px;

padding:10px;

border:2px solid #ff4444;

border-radius:8px;

background:#2f2f2f;

color:white;
}

/* TABLE */

.table-box{

background:#2b2b2b;

border:2px solid #ff4444;

overflow:auto;

height:75vh;

border-radius:12px;

box-shadow:
0 5px 15px rgba(0,0,0,0.5);
}

table{

width:100%;

border-collapse:collapse;

min-width:2200px;

font-size:12px;
}

th,
td{

border:1px solid #555;

padding:8px;

text-align:left;

white-space:nowrap;
}

th{

background:#ff4444;

color:white;

position:sticky;

top:0;

z-index:2;
}

tr:nth-child(even){

background:#242424;
}

tr:hover{

background:#3a3a3a;
}

/* STATUS */

.status-awol{
color:#ff3333;
font-weight:bold;
}

.status-resigned{
color:#ffaa00;
font-weight:bold;
}

.status-other{
color:#ff6666;
font-weight:bold;
}

/* MOBILE */

@media(max-width:768px){

.top-bar{

flex-direction:column;

align-items:flex-start;
}

.search-box input{
width:100%;
}

}

</style>

</head>

<body>

<div class="top-bar">

<button
class="back-btn"
onclick="window.location.href='employee-masterlist.html'">

← BACK

</button>

<h2>Inactive Employees</h2>

<div class="search-box">

<input
id="search"
type="text"
placeholder="Search Inactive Employee..."
onkeyup="searchEmp()">

</div>

</div>

<h3 id="total"
style="
margin-bottom:10px;
color:#ff4444;
font-size:20px;
">
Total : 0
</h3>

<div class="table-box">

<table id="empTable">

<thead>

<tr>

<th>Employee ID</th>
<th>Name</th>
<th>Department</th>
<th>Position</th>
<th>Employment</th>
<th>Status</th>
<th>Mobile</th>
<th>Email</th>
<th>Action</th>

</tr>

</thead>

<tbody></tbody>

</table>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getFirestore,
collection,
getDocs,
doc,
updateDoc,
deleteDoc

}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyAehoq0teVYHiJ4bkKOgBqIgJZrQpce3k8",

authDomain:"hr-system-38fc3.firebaseapp.com",

projectId:"hr-system-38fc3",

storageBucket:"hr-system-38fc3.firebasestorage.app",

messagingSenderId:"615471610834",

appId:"1:615471610834:web:a0d671d4e3f4c1b57b660b"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

let employees = [];

/* LOAD EMPLOYEES */

async function loadEmployees(){

employees = [];

let snapshot =
await getDocs(
collection(db,'employees')
);

snapshot.forEach(docSnap=>{

employees.push({

id:docSnap.id,

...docSnap.data()

});

});

renderTable();
}

/* RENDER */

function renderTable(){

let table =
document.querySelector(
'#empTable tbody'
);

table.innerHTML='';

employees.forEach((emp)=>{

if(emp.status === 'Active') return;

let statusClass =
emp.status==='AWOL'
? 'status-awol'
: emp.status==='Resigned'
? 'status-resigned'
: 'status-other';

let fullName =
(emp.firstname || '') + ' ' +
(emp.lastname || '');

table.innerHTML += `

<tr>

<td>${emp.employeeid || ''}</td>

<td>${fullName}</td>

<td>${emp.department || ''}</td>

<td>${emp.position || ''}</td>

<td>${emp.employment || ''}</td>

<td class="${statusClass}">
${emp.status || ''}
</td>

<td>${emp.mobile || ''}</td>

<td>${emp.email || ''}</td>

<td>

<button
class="restore-btn"
onclick="restoreEmployee('${emp.id}')">

RESTORE

</button>

<button
class="btn"
onclick="archiveEmployee('${emp.id}')">

ARCHIVE

</button>

</td>

</tr>

`;

});

updateTotal();
}

/* RESTORE */

window.restoreEmployee = async function(id){

if(confirm('Restore Employee?')){

await updateDoc(

doc(db,'employees',id),

{
status:'Active'

}

);

alert('Employee Restored');

loadEmployees();

}

}

/* ARCHIVE */

window.archiveEmployee = async function(id){

if(confirm('Archive Employee?')){

await updateDoc(

doc(db,'employees',id),

{
status:'Archived'

}

);

alert('Employee Archived');

loadEmployees();

}

}

/* SEARCH */

window.searchEmp = function(){

let val =
search.value.toLowerCase();

let rows =
document.querySelectorAll(
'#empTable tbody tr'
);

let visible = 0;

rows.forEach(row=>{

let show =
row.innerText
.toLowerCase()
.includes(val);

row.style.display =
show ? '' : 'none';

if(show) visible++;

});

total.innerText =
'Showing : ' + visible;

}

/* TOTAL */

function updateTotal(){

let rows =
document.querySelectorAll(
'#empTable tbody tr'
);

total.innerText =
'Total : ' + rows.length;

}

loadEmployees();

</script>

</body>
</html>
