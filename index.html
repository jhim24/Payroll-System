<!DOCTYPE html>
<html>
<head>
  <title>Employee Master List</title>
  <style>
    body {font-family: Arial; padding:20px; background:#f0f4ff;}
    h2 {border-bottom:3px solid blue;}
    .box {border:2px solid blue; padding:15px; border-radius:10px; background:white;}

    input, select {
      padding:8px; margin:5px; width:180px;
      border:1px solid #ccc; border-radius:5px;
    }

    button {
      padding:10px; margin:5px;
      color:white; border:none; cursor:pointer; border-radius:5px;
    }

    .add {background:green;}
    .update {background:orange;}
    .go {background:purple;}

    table {
      width:100%; margin-top:20px;
      border-collapse:collapse; background:white;
      border:2px solid blue; font-size:12px;
    }

    th, td {border:1px solid #ccc; padding:8px; text-align:center;}
    th {background:blue; color:white;}

    .delete {background:red;}
    .edit {background:gray;}
  </style>
</head>
<body>

<h2>👥 Employee Master List</h2>

<button class="go" onclick="goPayroll()">Go to Payroll 💰</button>

<div class="box">

<input id="fname" placeholder="First Name">
<input id="mname" placeholder="Middle Name">
<input id="lname" placeholder="Last Name"><br>

<input type="date" id="birthday">
<input id="age" placeholder="Age" readonly><br>

<input id="contact" placeholder="Contact">
<input id="empid" placeholder="Employee ID"><br>

<select id="bank">
<option value="">Bank</option>
<option>BDO</option>
<option>BPI</option>
<option>Metrobank</option>
</select>

<input id="bankAccount" placeholder="Account Number"><br>

<input id="sss" placeholder="SSS">
<input id="philhealth" placeholder="PhilHealth">
<input id="pagibig" placeholder="Pag-IBIG"><br>

<button class="add" onclick="add()">Add</button>
<button class="update" onclick="update()">Update</button>

</div>

<table>
<tr>
<th>First</th><th>Middle</th><th>Last</th>
<th>Age</th><th>ID</th><th>Bank</th><th>Account</th>
<th>Action</th>
</tr>
<tbody id="table"></tbody>
</table>

<script>
let data = JSON.parse(localStorage.getItem("employees")) || [];
let editIndex = -1;

document.getElementById("birthday").onchange = function(){
  let b = new Date(this.value);
  let t = new Date();
  let age = t.getFullYear() - b.getFullYear();
  document.getElementById("age").value = age;
}

function save(){ localStorage.setItem("employees", JSON.stringify(data)); }

function render(){
  let t = document.getElementById("table");
  t.innerHTML="";
  data.forEach((e,i)=>{
    t.innerHTML += `
    <tr>
      <td>${e.fname}</td>
      <td>${e.mname}</td>
      <td>${e.lname}</td>
      <td>${e.age}</td>
      <td>${e.empid}</td>
      <td>${e.bank}</td>
      <td>${e.bankAccount}</td>
      <td>
        <button class="edit" onclick="edit(${i})">Edit</button>
        <button class="delete" onclick="del(${i})">Delete</button>
      </td>
    </tr>`;
  });
}

function getForm(){
  return {
    fname: fname.value,
    mname: mname.value,
    lname: lname.value,
    birthday: birthday.value,
    age: age.value,
    contact: contact.value,
    empid: empid.value,
    bank: bank.value,
    bankAccount: bankAccount.value,
    sss: sss.value,
    philhealth: philhealth.value,
    pagibig: pagibig.value
  };
}

function add(){
  data.push(getForm());
  save(); render(); clear();
}

function edit(i){
  let e=data[i]; editIndex=i;
  fname.value=e.fname; mname.value=e.mname; lname.value=e.lname;
  birthday.value=e.birthday; age.value=e.age;
  contact.value=e.contact; empid.value=e.empid;
  bank.value=e.bank; bankAccount.value=e.bankAccount;
}

function update(){
  if(editIndex==-1)return;
  data[editIndex]=getForm();
  save(); render(); clear(); editIndex=-1;
}

function del(i){
  data.splice(i,1);
  save(); render();
}

function clear(){ document.querySelectorAll("input").forEach(i=>i.value=""); }

function goPayroll(){
  window.location.href="payroll.html";
}

render();
</script>

</body>
</html>
