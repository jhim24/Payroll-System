<!DOCTYPE html>
<html>
<head>
  <title>Payroll System Level 2</title>
  <style>
    body {
      font-family: Arial;
      padding:20px;
      background:#f5f5f5;
    }

    h2 {color:#333;}

    input {
      padding:8px;
      margin:5px;
      width:150px;
    }

    button {
      padding:10px;
      background:green;
      color:white;
      border:none;
      cursor:pointer;
    }

    button:hover {
      background:darkgreen;
    }

    table {
      width:100%;
      margin-top:20px;
      border-collapse:collapse;
      background:white;
    }

    th, td {
      border:1px solid #ccc;
      padding:10px;
      text-align:center;
    }

    th {
      background:#333;
      color:white;
    }

    .deleteBtn {
      background:red;
      padding:5px 10px;
    }
  </style>
</head>
<body>

<h2>💰 Payroll System (Level 2)</h2>

<input type="text" id="name" placeholder="Employee Name">
<input type="number" id="rate" placeholder="Daily Rate">
<input type="number" id="days" placeholder="Days Worked">
<input type="number" id="deduction" placeholder="Deductions">

<br>

<button onclick="addEmployee()">Add Employee</button>

<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Gross</th>
      <th>Deduction</th>
      <th>Net</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="payrollTable"></tbody>
</table>

<script>
let employees = JSON.parse(localStorage.getItem("payroll")) || [];

function saveData() {
  localStorage.setItem("payroll", JSON.stringify(employees));
}

function renderTable() {
  let table = document.getElementById("payrollTable");
  table.innerHTML = "";

  employees.forEach((emp, index) => {
    let row = `
      <tr>
        <td>${emp.name}</td>
        <td>${emp.gross.toFixed(2)}</td>
        <td>${emp.deduction.toFixed(2)}</td>
        <td>${emp.net.toFixed(2)}</td>
        <td>
          <button class="deleteBtn" onclick="deleteEmployee(${index})">Delete</button>
        </td>
      </tr>
    `;
    table.innerHTML += row;
  });
}

function addEmployee() {
  let name = document.getElementById("name").value;
  let rate = parseFloat(document.getElementById("rate").value) || 0;
  let days = parseFloat(document.getElementById("days").value) || 0;
  let deduction = parseFloat(document.getElementById("deduction").value) || 0;

  let gross = rate * days;
  let net = gross - deduction;

  let employee = {
    name,
    gross,
    deduction,
    net
  };

  employees.push(employee);
  saveData();
  renderTable();

  // clear input
  document.getElementById("name").value = "";
  document.getElementById("rate").value = "";
  document.getElementById("days").value = "";
  document.getElementById("deduction").value = "";
}

function deleteEmployee(index) {
  employees.splice(index, 1);
  saveData();
  renderTable();
}

// auto load data
renderTable();
</script>

</body>
</html>
