<!DOCTYPE html>
<html>
<head>
  <title>HR + Payroll System</title>
  <style>
    body {font-family:Arial; padding:20px; background:#f0f4ff;}

    h2 {border-bottom:3px solid blue;}

    .nav button {
      padding:10px;
      margin:5px;
      border:none;
      color:white;
      cursor:pointer;
      border-radius:5px;
    }

    .empBtn {background:blue;}
    .payBtn {background:green;}

    .box {
      border:2px solid blue;
      padding:15px;
      border-radius:10px;
      background:white;
      margin-top:10px;
    }

    input, select {
      padding:8px;
      margin:5px;
      width:180px;
      border-radius:5px;
      border:1px solid #ccc;
    }

    button.action {
      padding:10px;
      margin:5px;
      color:white;
      border:none;
      border-radius:5px;
      cursor:pointer;
    }

    .add {background:green;}
    .update {background:orange;}
    .delete {background:red;}
    .edit {background:gray;}

    table {
      width:100%;
      margin-top:20px;
      border-collapse:collapse;
      background:white;
      border:2px solid blue;
      font-size:12px;
    }

    th, td {
      border:1px solid #ccc;
      padding:8px;
      text-align:center;
    }

    th {background:blue; color:white;}

    .hidden {display:none;}
  </style>
</head>
<body>

<h2>💼 HR + Payroll System</h2>

<div class="nav">
  <button class="empBtn" onclick="showEmployee()">Employee</button>
  <button class="payBtn" onclick="showPayroll()">Payroll</button>
</div>

<!-- ================= EMPLOYEE TAB ================= -->
<div id="employeeTab">

<div class="box">

<input id="fname" placeholder="First Name">
<input id="mname" placeholder="Middle Name">
<input id="lname" placeholder="Last Name"><br>

<input type="date" id="birthday">
<input id="age" placeholder="Age" readonly><br>

<input id="contact" placeholder="Contact">
<input id="empid" placeholder="Employee ID"><br>

<select id="bank">
<option value="">Bank</option>
<option>BDO</option>
<option>BPI</option>
<option>Metrobank</option>
</select>

<input id="bankAccount" placeholder="Account Number"><br>

<input id="sss" placeholder="SSS">
<input id="philhealth" placeholder="PhilHealth">
<input id="pagibig" placeholder="Pag-IBIG"><br>

<button class="action add" onclick="add()">Add</button>
<button class="action update" onclick="update()">Update</button>
<button onclick="location.reload()">Refresh</button>

</div>

<table>
<tr>
<th>First</th><th>Middle</th><th>Last</th>
<th>Age</th><th>ID</th><th>Bank</th><th>Account</th>
<th>Action</th>
</tr>
<tbody id="empTable"></tbody>
</table>

</div>

<!-- ================= PAYROLL TAB ================= -->
<div id="payrollTab" class="hidden">

<div class="box">

<select id="empSelect"></select>
<input id="rate" placeholder="Rate">
<input id="days" placeholder="Days">
<input id="deduction" placeholder="Deduction">

<button class="action add" onclick="compute()">Compute</button>

</div>

<table>
<tr>
<th>Name</th>
<th>Gross</th>
<th>Deduction</th>
<th>Net</th>
</tr>
<tbody id="payTable"></tbody>
</table>

</div>

<script>
let data = JSON.parse(localStorage.getItem("employees")) || [];
let editIndex = -1;

// TAB SWITCH
function showEmployee(){
  employeeTab.classList.remove("hidden");
  payrollTab.classList.add("hidden");
}

function showPayroll(){
  employeeTab.classList.add("hidden");
  payrollTab.classList.remove("hidden");
  loadEmployees();
}

// AGE AUTO
birthday.onchange = function(){
  let b = new Date(this.value);
  let t = new Date();
  age.value = t.getFullYear() - b.getFullYear();
}

// SAVE
function save(){
  localStorage.setItem("employees", JSON.stringify(data));
}

// RENDER EMPLOYEE
function render(){
  empTable.innerHTML="";
  data.forEach((e,i)=>{
    empTable.innerHTML += `
    <tr>
      <td>${e.fname}</td>
      <td>${e.mname}</td>
      <td>${e.lname}</td>
      <td>${e.age}</td>
      <td>${e.empid}</td>
      <td>${e.bank}</td>
      <td>${e.bankAccount}</td>
      <td>
        <button class="edit" onclick="edit(${i})">Edit</button>
        <button class="delete" onclick="del(${i})">Delete</button>
      </td>
    </tr>`;
  });
}

// GET FORM
function getForm(){
  return {
    fname: fname.value,
    mname: mname.value,
    lname: lname.value,
    birthday: birthday.value,
    age: age.value,
    contact: contact.value,
    empid: empid.value,
    bank: bank.value,
    bankAccount: bankAccount.value,
    sss: sss.value,
    philhealth: philhealth.value,
    pagibig: pagibig.value
  };
}

// ADD
function add(){
  data.push(getForm());
  save(); render(); clear();
}

// EDIT
function edit(i){
  let e=data[i]; editIndex=i;
  fname.value=e.fname;
  mname.value=e.mname;
  lname.value=e.lname;
  birthday.value=e.birthday;
  age.value=e.age;
  contact.value=e.contact;
  empid.value=e.empid;
  bank.value=e.bank;
  bankAccount.value=e.bankAccount;
}

// UPDATE
function update(){
  if(editIndex==-1)return;
  data[editIndex]=getForm();
  save(); render(); clear();
  editIndex=-1;
}

// DELETE
function del(i){
  data.splice(i,1);
  save(); render();
}

// CLEAR
function clear(){
  document.querySelectorAll("input").forEach(i=>i.value="");
  bank.value="";
}

// LOAD EMPLOYEES TO PAYROLL
function loadEmployees(){
  empSelect.innerHTML="<option>Select Employee</option>";
  data.forEach((e,i)=>{
    empSelect.innerHTML += `<option value="${i}">${e.fname} ${e.lname}</option>`;
  });
}

// COMPUTE PAYROLL
function compute(){
  let i=empSelect.value;
  let e=data[i];
  if(!e){ alert("Select employee"); return; }

  let r=+rate.value||0;
  let d=+days.value||0;
  let ded=+deduction.value||0;

  let gross=r*d;
  let net=gross-ded;

  payTable.innerHTML += `
  <tr>
    <td>${e.fname} ${e.lname}</td>
    <td>${gross}</td>
    <td>${ded}</td>
    <td>${net}</td>
  </tr>`;
}

render();
</script>

</body>
</html>
