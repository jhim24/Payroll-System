body{

/* CONTAINER */

.container{

max-width:1400px;

margin:auto;

background:#2b2b2b;

border:3px solid #ffcc00;

}

/* HEADER */

.header{

#ff8800

padding:15px;

display:flex;

justify-content:space-between;

align-items:center;

flex-wrap:wrap;
}

.title{

font-size:28px;

font-weight:bold;

color:black;
}

/* BUTTON */

.btn{

padding:10px 18px;

border:none;

border-radius:10px;

cursor:pointer;

font-weight:bold;

font-size:13px;

transition:0.3s;
}

.btn:hover{

transform:scale(1.03);
}

.back-btn{
background:#0066cc;
color:white;
}

.approve-btn{
background:#008000;
color:white;
}

.reject-btn{
background:#cc0000;
color:white;
}

.delete-btn{
background:#444;
color:white;
}

/* TABLE */

.table-wrapper{

padding:20px;

overflow:auto;
}

table{

width:100%;

border-collapse:collapse;

min-width:1400px;

background:white;
}

th,
td{

border:1px solid #999;

padding:10px;

text-align:center;
}

th{

background:#ffcc00;

color:black;

position:sticky;

top:0;
}

td{
color:black;
}

/* STATUS */

.pending{

color:orange;

font-weight:bold;
}

.approved{

color:green;

font-weight:bold;
}

.rejected{

color:red;

font-weight:bold;
}

/* EMPTY */

.empty{

padding:30px;

text-align:center;

font-size:18px;

color:#ffcc00;
}

/* MOBILE */

@media(max-width:768px){

.title{
font-size:22px;
}

}

</style>

</head>
