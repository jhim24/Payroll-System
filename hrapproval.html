<!DOCTYPE html>
<html>
<head>

<title>HR Approval</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#1f1f1f;
padding:15px;
color:white;
}

.container{

max-width:1300px;

margin:auto;

background:#2b2b2b;

border:3px solid #ffcc00;

border-radius:15px;

overflow:hidden;
}

/* HEADER */

.header{

background:linear-gradient(
135deg,
#ffcc00,
#ff8800
);

padding:15px;

display:flex;

justify-content:space-between;

align-items:center;
}

.title{

font-size:28px;

font-weight:bold;

color:black;
}

/* BUTTON */

.btn{

padding:10px 18px;

border:none;

border-radius:10px;

cursor:pointer;

font-weight:bold;

font-size:12px;
}

.back-btn{
background:#0066cc;
color:white;
}

.approve-btn{
background:#008000;
color:white;
}

.reject-btn{
background:#cc0000;
color:white;
}

/* TABLE */

.table-wrapper{

padding:20px;

overflow:auto;
}

table{

width:100%;

border-collapse:collapse;

min-width:1200px;

background:white;
}

th,
td{

border:1px solid #999;

padding:10px;

text-align:center;
}

th{

background:#ffcc00;

color:black;
}

td{
color:black;
}

/* STATUS */

.pending{
color:orange;
font-weight:bold;
}

.approved{
color:green;
font-weight:bold;
}

.rejected{
color:red;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="title">
✅ HR APPROVAL
</div>

<button
class="btn back-btn"
onclick="window.location.href='index.html'">

← BACK

</button>

</div>

<div class="table-wrapper">

<table>

<thead>

<tr>

<th>EMPLOYEE ID</th>
<th>EMPLOYEE</th>
<th>REQUEST</th>
<th>DATE</th>
<th>DAYS</th>
<th>REASON</th>
<th>STATUS</th>
<th>ACTION</th>

</tr>

</thead>

<tbody id="requestBody">

</tbody>

</table>

</div>

</div>

<script>

/* STORAGE */

let requests =

JSON.parse(
localStorage.getItem('employeeRequests')
) || [];

/* RENDER */

function renderRequests(){

requestBody.innerHTML='';

requests.forEach((req,index)=>{

let statusClass =
req.status.toLowerCase();

requestBody.innerHTML += `

<tr>

<td>${req.empid}</td>

<td>${req.employee}</td>

<td>${req.type}</td>

<td>${req.date}</td>

<td>${req.days}</td>

<td>${req.reason}</td>

<td class="${statusClass}">
${req.status}
</td>

<td>

<button
class="btn approve-btn"
onclick="approveRequest(${index})">

APPROVE

</button>

<button
class="btn reject-btn"
onclick="rejectRequest(${index})">

REJECT

</button>

</td>

</tr>

`;

});

}

/* APPROVE */

function approveRequest(index){

requests[index].status =
'APPROVED';

localStorage.setItem(
'employeeRequests',
JSON.stringify(requests)
);

renderRequests();

}

/* REJECT */

function rejectRequest(index){

requests[index].status =
'REJECTED';

localStorage.setItem(
'employeeRequests',
JSON.stringify(requests)
);

renderRequests();

}

/* AUTO LOAD */

renderRequests();

</script>

</body>
</html>
