<!DOCTYPE html>
<html>
<head>

<title>QR Attendance Scanner</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{

background:#1f1f1f;

color:white;

padding:20px;

text-align:center;
}

.container{

max-width:600px;

margin:auto;

background:#2b2b2b;

padding:20px;

border-radius:20px;

border:3px solid #ffcc00;

box-shadow:0 5px 20px rgba(0,0,0,0.5);
}

h1{

color:#ffcc00;

margin-bottom:20px;
}

.back-btn{

background:linear-gradient(
135deg,
#ffcc00,
#ff8800
);

color:black;

padding:12px 18px;

border:none;

border-radius:10px;

font-weight:bold;

cursor:pointer;

margin-bottom:20px;

font-size:14px;
}

#reader{

width:100%;

overflow:hidden;

border-radius:15px;

border:3px solid #ffcc00;
}

.result{

margin-top:20px;

padding:20px;

background:#111;

border-radius:15px;

font-size:18px;

line-height:1.8;

border:2px solid #00cc66;
}

.success{

color:#00ff99;

font-weight:bold;
}

.time{

color:#ffcc00;

font-size:22px;

font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<button
class="back-btn"
onclick="window.location.href='index.html'">

← BACK

</button>

<h1>
📷 QR ATTENDANCE
</h1>

<div id="reader"></div>

<div class="result">

<div class="success">
Waiting for QR Scan...
</div>

<div class="time"
id="clock">

00:00:00

</div>

<div id="employeeInfo">

No Employee

</div>

</div>

</div>

<script src="https://unpkg.com/html5-qrcode"></script>

<script type="module">

import {

initializeApp

}

from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getFirestore,
collection,
addDoc,
query,
where,
getDocs

}

from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

apiKey:
"YOUR_API_KEY",

authDomain:
"YOUR_AUTH_DOMAIN",

projectId:
"YOUR_PROJECT_ID",

storageBucket:
"YOUR_STORAGE_BUCKET",

messagingSenderId:
"YOUR_SENDER_ID",

appId:
"YOUR_APP_ID"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* CLOCK */

function updateClock(){

clock.innerText =

new Date()
.toLocaleTimeString();

}

setInterval(updateClock,1000);

updateClock();

/* SCAN PROTECTION */

let lastScan = "";

let scanLock = false;

/* QR SUCCESS */

async function onScanSuccess(decodedText){

if(scanLock) return;

scanLock = true;

try{

let data =
JSON.parse(decodedText);

let currentScan =
data.employeeid;

/* BLOCK DUPLICATE */

if(lastScan === currentScan){

setTimeout(()=>{

scanLock = false;

},3000);

return;

}

lastScan = currentScan;

let today =
new Date().toLocaleDateString();

/* CHECK EXISTING */

const attendanceQuery = query(

collection(db,'attendance'),

where('employeeid','==',data.employeeid),

where('date','==',today)

);

const existing =
await getDocs(attendanceQuery);

if(!existing.empty){

employeeInfo.innerHTML = `

<div style="color:red;font-weight:bold;">

ALREADY SCANNED TODAY

</div>

<br>

<b>Employee ID:</b>
${data.employeeid}

<br>

<b>Name:</b>
${data.name}

`;

setTimeout(()=>{

scanLock = false;

lastScan = "";

},3000);

return;

}

/* SHOW INFO */

employeeInfo.innerHTML = `

<b>Employee ID:</b>
${data.employeeid}

<br>

<b>Name:</b>
${data.name}

<br>

<b>Date:</b>
${today}

<br>

<b>Time:</b>
${new Date().toLocaleTimeString()}

<br><br>

<div style="color:#00ff99;font-weight:bold;">

TIME IN SAVED

</div>

`;

/* SAVE ATTENDANCE */

await addDoc(

collection(db,'attendance'),

{

employeeid:
data.employeeid,

employee:
data.name,

date:
today,

timein:
new Date()
.toLocaleTimeString(),

timestamp:
Date.now()

}

);

navigator.vibrate(200);

/* RESET */

setTimeout(()=>{

scanLock = false;

lastScan = "";

},3000);

}catch(error){

console.log(error);

alert('Invalid QR');

scanLock = false;

}

}

/* START QR */

new Html5QrcodeScanner(

"reader",

{

fps:10,

qrbox:250

}

).render(onScanSuccess);

</script>

</body>
</html>
