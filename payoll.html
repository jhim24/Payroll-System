<!DOCTYPE html>
<html>
<head>
  <title>Payroll</title>
  <style>
    body {font-family:Arial; padding:20px; background:#fff7f0;}
    h2 {border-bottom:3px solid green;}

    button {
      padding:10px;
      margin:5px;
      border:none;
      color:white;
      border-radius:5px;
      cursor:pointer;
    }

    .back {background:#444;}
    .compute {background:green;}

    select,input {
      padding:8px;
      margin:5px;
      width:180px;
    }

    table {
      width:100%;
      margin-top:20px;
      border-collapse:collapse;
      border:2px solid green;
    }

    th,td {
      border:1px solid #ccc;
      padding:10px;
      text-align:center;
    }

    th {background:green; color:white;}
  </style>
</head>
<body>

<h2>💰 Payroll System</h2>

<button class="back" onclick="back()">⬅ Back to Employee</button>

<br><br>

<select id="emp"></select>
<input id="rate" placeholder="Rate">
<input id="days" placeholder="Days">
<input id="deduction" placeholder="Deduction">

<button class="compute" onclick="compute()">Compute</button>

<table>
<tr>
<th>Name</th>
<th>Gross</th>
<th>Deduction</th>
<th>Net</th>
</tr>
<tbody id="table"></tbody>
</table>

<script>
let data = JSON.parse(localStorage.getItem("employees")) || [];

function back(){
  window.location.href="index.html";
}

function load(){
  emp.innerHTML="<option>Select Employee</option>";
  data.forEach((e,i)=>{
    emp.innerHTML += `<option value="${i}">${e.fname} ${e.lname}</option>`;
  });
}

function compute(){
  let i=emp.value;
  let e=data[i];

  if(!e){ alert("Select employee"); return; }

  let r=+rate.value||0;
  let d=+days.value||0;
  let ded=+deduction.value||0;

  let gross=r*d;
  let net=gross-ded;

  table.innerHTML += `
  <tr>
    <td>${e.fname} ${e.lname}</td>
    <td>${gross}</td>
    <td>${ded}</td>
    <td>${net}</td>
  </tr>`;
}

load();
</script>

</body>
</html>
