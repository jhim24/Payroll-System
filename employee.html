<!DOCTYPE html>
<html>
<head>

<title>Employee Masterlist</title>

<style>

*{
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
margin:0;
padding:15px;
background:linear-gradient(
135deg,
#1f1f1f,
#2b2b2b
);
color:white;
}

/* TOP */

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:10px;
margin-bottom:15px;
}

h2{
margin:0;
font-size:30px;
color:#ffcc00;
text-shadow:2px 2px 5px black;
}

/* BUTTONS */

.add-btn,
.save-btn,
.btn,
.close-btn,
.back-btn{

padding:10px 18px;

border:none;

border-radius:10px;

cursor:pointer;

font-weight:bold;

font-size:13px;

transition:0.3s;

box-shadow:0 4px 10px rgba(0,0,0,0.4);

color:white;

}

.add-btn{
background:linear-gradient(
135deg,
#ffcc00,
#ff9900
);
color:black;
}

.save-btn{
background:linear-gradient(
135deg,
#00cc66,
#00994d
);
}

.btn{
background:linear-gradient(
135deg,
#ff4444,
#cc0000
);
}

.close-btn{
background:linear-gradient(
135deg,
#ff0000,
#990000
);

position:absolute;

top:10px;
right:10px;
}

.back-btn{
background:linear-gradient(
135deg,
#ffcc00,
#ff6600
);

color:black;
}

/* HOVER */

.add-btn:hover,
.save-btn:hover,
.btn:hover,
.close-btn:hover,
.back-btn:hover{

transform:translateY(-2px) scale(1.03);

filter:brightness(1.1);

}

/* SEARCH */

.search-box input{

padding:10px;

width:250px;

border:2px solid #ffcc00;

border-radius:8px;

background:#2f2f2f;

color:white;

}

/* TABLE */

.table-box{

background:#2b2b2b;

border:2px solid #ffcc00;

overflow:auto;

height:70vh;

border-radius:12px;

box-shadow:0 5px 15px rgba(0,0,0,0.5);

}

table{
width:100%;
border-collapse:collapse;
min-width:4000px;
font-size:12px;
}

th,
td{

border:1px solid #555;

padding:8px;

text-align:left;

white-space:nowrap;

}

th{

background:#ffcc00;

color:black;

position:sticky;

top:0;

z-index:2;

}

tr:nth-child(even){
background:#242424;
}

tr:hover{
background:#3a3a3a;
}

/* MODAL */

.modal{

display:none;

position:fixed;

inset:0;

background:rgba(0,0,0,0.5);

justify-content:center;

align-items:center;

z-index:999;
}

.modal-box{

background:#2b2b2b;

width:95%;

max-width:1200px;

height:95vh;

overflow:auto;

padding:15px;

border:3px solid #ffcc00;

position:relative;

border-radius:15px;

color:white;

}

/* TABS */

.classic-tabs{

display:flex;
flex-wrap:wrap;
gap:4px;
background:#1f1f1f;
padding:6px;
border-radius:8px;
margin-top:10px;

}

.tab-btn{

background:#444;
padding:8px 16px;
cursor:pointer;
font-size:12px;
font-weight:bold;
border:none;
color:white;
border-radius:6px;

}

.tab-btn.active{
background:#ffcc00;
color:black;
}

/* CONTENT */

.tab-content{

display:none;
padding:15px;
background:#333;
margin-top:10px;
border-radius:8px;

}

.tab-content.active{
display:block;
}

/* GRID */

.form-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(200px,1fr));

gap:8px;
}

/* INPUT */

input,
select{

width:100%;

padding:10px;

border:2px solid #555;

border-radius:8px;

background:#1f1f1f;

color:white;

}

</style>

</head>

<body>

<div class="top-bar">

<button
class="back-btn"
onclick="window.location.href='index.html'">

← BACK

</button>

<h2>Employee Masterlist</h2>

<div style="display:flex;gap:10px;">

<div class="search-box">

<input
type="text"
id="search"
placeholder="Search..."
onkeyup="searchEmp()">

</div>

<button
class="add-btn"
onclick="openModal()">

+ Add Employee

</button>

</div>

</div>

<h3 id="total"
style="
color:#ff4444;
font-size:20px;
">

Total : 0

</h3>

<!-- TABLE -->

<div class="table-box">

<table id="empTable">

<thead>

<tr>

<th>First Name</th>
<th>Middle Name</th>
<th>Last Name</th>
<th>Birthdate</th>
<th>Age</th>
<th>Gender</th>
<th>SSS Number</th>
<th>PhilHealth Number</th>
<th>Pag-IBIG Number</th>
<th>Health Card Number</th>
<th>Bank Name</th>
<th>Bank Account Number</th>
<th>ID Type</th>
<th>ID Number</th>
<th>Mobile</th>
<th>Email</th>
<th>Employee ID</th>
<th>Position</th>
<th>Department</th>
<th>Employment</th>
<th>Salary Rate</th>
<th>Action</th>

</tr>

</thead>

<tbody></tbody>

</table>

</div>

<!-- MODAL -->

<div
class="modal"
id="employeeModal">

<div class="modal-box">

<button
class="close-btn"
onclick="closeModal()">

X

</button>

<h3>Employee Information</h3>

<div class="classic-tabs">

<button
class="tab-btn active"
onclick="openTab(event,'personal')">

Personal

</button>

<button
class="tab-btn"
onclick="openTab(event,'contact')">

Contact

</button>

<button
class="tab-btn"
onclick="openTab(event,'job')">

Job

</button>

</div>

<!-- PERSONAL -->

<div
id="personal"
class="tab-content active">

<div class="form-grid">

<input class="emp-field" placeholder="First Name">
<input class="emp-field" placeholder="Middle Name">
<input class="emp-field" placeholder="Last Name">

<input
class="emp-field"
type="date"
id="birthdate"
onchange="calcAge()">

<input
class="emp-field"
id="age"
placeholder="Age"
readonly>

<select class="emp-field">

<option>Gender</option>
<option>Male</option>
<option>Female</option>

</select>

<input class="emp-field" placeholder="SSS Number">
<input class="emp-field" placeholder="PhilHealth Number">
<input class="emp-field" placeholder="Pag-IBIG Number">
<input class="emp-field" placeholder="Health Card Number">
<input class="emp-field" placeholder="Bank Name">
<input class="emp-field" placeholder="Bank Account Number">

<select class="emp-field">

<option>Select ID</option>
<option>Passport</option>
<option>Driver's License</option>

</select>

<input class="emp-field" placeholder="ID Number">

</div>

</div>

<!-- CONTACT -->

<div
id="contact"
class="tab-content">

<div class="form-grid">

<input class="emp-field" placeholder="Mobile">
<input class="emp-field" placeholder="Email">
<input class="emp-field" placeholder="Current Address">
<input class="emp-field" placeholder="Permanent Address">

</div>

</div>

<!-- JOB -->

<div
id="job"
class="tab-content">

<div class="form-grid">

<input class="emp-field" placeholder="Employee ID">
<input class="emp-field" placeholder="Position">
<input class="emp-field" placeholder="Department">

<select class="emp-field">

<option>Employment</option>
<option>Regular</option>
<option>Probationary</option>
<option>Contractual</option>

</select>

<input class="emp-field" placeholder="Salary Rate">

</div>

</div>

<br>

<button
class="save-btn"
onclick="addEmployee()">

Save Employee

</button>

</div>

</div>

<script type="module">

/* =========================
FIREBASE IMPORT
========================= */

import { initializeApp }

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getFirestore,
collection,
addDoc,
getDocs

}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

/* =========================
FIREBASE CONFIG
========================= */

const firebaseConfig = {

apiKey: "AIzaSyAehoq0teVYHiJ4bkKOgBqIgJZrQpce3k8",

authDomain: "hr-system-38fc3.firebaseapp.com",

projectId: "hr-system-38fc3",

storageBucket: "hr-system-38fc3.firebasestorage.app",

messagingSenderId: "615471610834",

appId: "1:615471610834:web:a0d671d4e3f4c1b57b660b",

measurementId: "G-TGBXWWZWE0"

};

/* =========================
INIT FIREBASE
========================= */

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* =========================
VARIABLES
========================= */

let editRowIndex = null;

let employees = [];

/* =========================
MODAL
========================= */

window.openModal = function(){

document.getElementById(
'employeeModal'
).style.display='flex';

}

window.closeModal = function(){

document.getElementById(
'employeeModal'
).style.display='none';

}

/* =========================
TAB
========================= */

window.openTab = function(evt,tabId){

document
.querySelectorAll('.tab-content')
.forEach(tab=>{

tab.classList.remove('active');

});

document
.getElementById(tabId)
.classList.add('active');

document
.querySelectorAll('.tab-btn')
.forEach(btn=>{

btn.classList.remove('active');

});

evt.currentTarget
.classList.add('active');

}

/* =========================
AGE
========================= */

window.calcAge = function(){

let birthInput =
document.getElementById(
'birthdate'
);

let ageInput =
document.getElementById(
'age'
);

let birth =
new Date(birthInput.value);

let today =
new Date();

let years =
today.getFullYear() -
birth.getFullYear();

let m =
today.getMonth() -
birth.getMonth();

if(
m < 0 ||

(m === 0 &&
today.getDate() <
birth.getDate())
){

years--;

}

ageInput.value = years;

}

/* =========================
SAVE EMPLOYEE
========================= */

window.addEmployee =
async function(){

let fields =

document.querySelectorAll(
'.emp-field'
);

let employeeData = [];

fields.forEach(field=>{

employeeData.push(field.value);

});

/* EDIT */

if(editRowIndex !== null){

employees[editRowIndex] =
employeeData;

localStorage.setItem(
'employees',
JSON.stringify(employees)
);

editRowIndex = null;

alert('Employee Updated');

renderTable();

closeModal();

clearForm();

return;

}

/* CHECK DUPLICATE */

let employeeId =
employeeData[18] || '';

let duplicate =
employees.find(emp =>

(emp[18] || '') === employeeId

);

if(duplicate){

alert(
'Employee ID already exists!'
);

return;

}

/* SAVE NEW */

employees.push(employeeData);

localStorage.setItem(
'employees',
JSON.stringify(employees)
);

/* FIREBASE SAVE */

try{

await addDoc(

collection(db,'employees'),

{

firstname: employeeData[0] || '',
middlename: employeeData[1] || '',
lastname: employeeData[2] || '',
birthdate: employeeData[3] || '',
age: employeeData[4] || '',
gender: employeeData[5] || '',
sss: employeeData[6] || '',
philhealth: employeeData[7] || '',
pagibig: employeeData[8] || '',
healthcard: employeeData[9] || '',
bankname: employeeData[10] || '',
bankaccount: employeeData[11] || '',
idtype: employeeData[12] || '',
idnumber: employeeData[13] || '',
mobile: employeeData[14] || '',
email: employeeData[15] || '',
currentaddress: employeeData[16] || '',
permanentaddress: employeeData[17] || '',
employeeid: employeeData[18] || '',
position: employeeData[19] || '',
department: employeeData[20] || '',
employment: employeeData[21] || '',
salary: employeeData[22] || ''

}

);

alert(
'Employee Saved Successfully'
);

}catch(error){

console.log(error);

alert(
'Firebase Save Error'
);

}

renderTable();

closeModal();

clearForm();

}

/* =========================
RENDER TABLE
========================= */

function renderTable(){

let table =
document.querySelector(
'#empTable tbody'
);

table.innerHTML='';

employees.forEach((emp,index)=>{

table.innerHTML += `

<tr>

<td>${emp[0] || ''}</td>
<td>${emp[1] || ''}</td>
<td>${emp[2] || ''}</td>
<td>${emp[3] || ''}</td>
<td>${emp[4] || ''}</td>
<td>${emp[5] || ''}</td>
<td>${emp[6] || ''}</td>
<td>${emp[7] || ''}</td>
<td>${emp[8] || ''}</td>
<td>${emp[9] || ''}</td>
<td>${emp[10] || ''}</td>
<td>${emp[11] || ''}</td>
<td>${emp[12] || ''}</td>
<td>${emp[13] || ''}</td>
<td>${emp[14] || ''}</td>
<td>${emp[15] || ''}</td>
<td>${emp[18] || ''}</td>
<td>${emp[19] || ''}</td>
<td>${emp[20] || ''}</td>
<td>${emp[21] || ''}</td>
<td>${emp[22] || ''}</td>

<td>

<button
class='btn'
onclick='editRow(${index})'>

Edit

</button>

<button
class='btn'
onclick='deleteRow(${index})'>

Delete

</button>

</td>

</tr>

`;

});

updateTotal();

}

/* =========================
EDIT
========================= */

window.editRow = function(index){

openModal();

editRowIndex = index;

let emp = employees[index];

let fields =
document.querySelectorAll(
'.emp-field'
);

fields.forEach((field,i)=>{

field.value = emp[i] || '';

});

}

/* =========================
DELETE
========================= */

window.deleteRow = function(index){

employees.splice(index,1);

localStorage.setItem(
'employees',
JSON.stringify(employees)
);

renderTable();

}

/* =========================
SEARCH
========================= */

window.searchEmp = function(){

let val =
document.getElementById(
'search'
).value.toLowerCase();

let rows =
document.querySelectorAll(
'#empTable tbody tr'
);

let visible = 0;

rows.forEach(row=>{

let show =
row.innerText
.toLowerCase()
.includes(val);

row.style.display =
show ? '' : 'none';

if(show) visible++;

});

document.getElementById(
'total'
).innerText =
'Showing : ' + visible;

}

/* =========================
CLEAR
========================= */

function clearForm(){

document
.querySelectorAll('.emp-field')
.forEach(el=>{

el.value='';

});

}

/* =========================
TOTAL
========================= */

function updateTotal(){

let rows =
document.querySelectorAll(
'#empTable tbody tr'
);

document.getElementById(
'total'
).innerText =
'Total : ' + rows.length;

}

/* =========================
LOAD FIREBASE
========================= */

async function loadEmployeesFirebase(){

employees =

JSON.parse(
localStorage.getItem('employees')
) || [];

let querySnapshot =
await getDocs(
collection(db,'employees')
);

querySnapshot.forEach((doc)=>{

let data = doc.data();

let empId =
data.employeeid || '';

let exists =
employees.find(emp =>

(emp[18] || '') === empId

);

if(!exists){

employees.push([

data.firstname || '',
data.middlename || '',
data.lastname || '',
data.birthdate || '',
data.age || '',
data.gender || '',
data.sss || '',
data.philhealth || '',
data.pagibig || '',
data.healthcard || '',
data.bankname || '',
data.bankaccount || '',
data.idtype || '',
data.idnumber || '',
data.mobile || '',
data.email || '',
data.currentaddress || '',
data.permanentaddress || '',
data.employeeid || '',
data.position || '',
data.department || '',
data.employment || '',
data.salary || ''

]);

}

});

/* SAVE CLEAN */

localStorage.setItem(
'employees',
JSON.stringify(employees)
);

renderTable();

}

/* =========================
AUTO LOAD
========================= */

loadEmployeesFirebase();

</script>

</body>
</html>
