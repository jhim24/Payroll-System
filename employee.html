<!DOCTYPE html>
<html>
<head>

<title>Employees</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="main">

<h1>Employee Masterlist</h1>

<div class="top-bar">

<input
type="text"
id="search"
placeholder="Search Employee"
onkeyup="searchEmployee()">

<button onclick="openModal()">
+ Add Employee
</button>

</div>

<h3 id="totalEmployee">
Total Employees : 0
</h3>

<!-- MODAL -->

<div id="modal"
class="modal">

<div class="modal-box">

<h2>Employee Information</h2>

<input
id="fname"
placeholder="First Name">

<input
id="lname"
placeholder="Last Name">

<input
id="department"
placeholder="Department">

<input
id="position"
placeholder="Position">

<select id="status">

<option>Active</option>
<option>Inactive</option>

</select>

<input
type="date"
id="datehired">

<input
type="file"
id="photo">

<br><br>

<button onclick="saveEmployee()">
Save Employee
</button>

<button onclick="closeModal()">
Close
</button>

</div>

</div>

<!-- TABLE -->

<div class="table-box">

<table id="empTable">

<thead>

<tr>

<th>Photo</th>
<th>Employee ID</th>
<th>First Name</th>
<th>Last Name</th>
<th>Department</th>
<th>Position</th>
<th>Status</th>
<th>Date Hired</th>
<th>Action</th>

</tr>

</thead>

<tbody></tbody>

</table>

</div>

</div>

<script>

let editIndex = null;

window.onload = loadEmployees;

/* OPEN */

function openModal(){

modal.style.display='block';

}

/* CLOSE */

function closeModal(){

modal.style.display='none';

clearForm();

}

/* SAVE */

function saveEmployee(){

let employees =
JSON.parse(
localStorage.getItem('employees')
) || [];

let reader =
new FileReader();

let file =
photo.files[0];

if(file){

reader.readAsDataURL(file);

reader.onload = function(){

saveData(reader.result);

};

}else{

saveData('');

}

}

/* SAVE DATA */

function saveData(photoData){

let employees =
JSON.parse(
localStorage.getItem('employees')
) || [];

let employee = {

id:
'EMP-' +
Date.now(),

fname:fname.value,

lname:lname.value,

department:department.value,

position:position.value,

status:status.value,

datehired:datehired.value,

photo:photoData

};

/* EDIT */

if(editIndex !== null){

employee.id =
employees[editIndex].id;

employees[editIndex] =
employee;

editIndex = null;

}

/* ADD */

else{

employees.push(employee);

}

localStorage.setItem(
'employees',
JSON.stringify(employees)
);

loadEmployees();

closeModal();

}

/* LOAD */

function loadEmployees(){

let employees =
JSON.parse(
localStorage.getItem('employees')
) || [];

let table =
document.querySelector(
'#empTable tbody'
);

table.innerHTML='';

employees.forEach((emp,index)=>{

table.innerHTML += `

<tr>

<td>

<img
src="${emp.photo}"
width="50"
height="50"
style="
object-fit:cover;
border-radius:50%;
">

</td>

<td>${emp.id}</td>

<td>${emp.fname}</td>

<td>${emp.lname}</td>

<td>${emp.department}</td>

<td>${emp.position}</td>

<td>${emp.status}</td>

<td>${emp.datehired}</td>

<td>

<button
onclick="editEmployee(${index})">

Edit

</button>

<button
onclick="deleteEmployee(${index})">

Delete

</button>

</td>

</tr>

`;

});

totalEmployee.innerText =

'Total Employees : ' +
employees.length;

}

/* DELETE */

function deleteEmployee(index){

let employees =
JSON.parse(
localStorage.getItem('employees')
) || [];

employees.splice(index,1);

localStorage.setItem(
'employees',
JSON.stringify(employees)
);

loadEmployees();

}

/* EDIT */

function editEmployee(index){

let employees =
JSON.parse(
localStorage.getItem('employees')
) || [];

let emp = employees[index];

fname.value = emp.fname;

lname.value = emp.lname;

department.value =
emp.department;

position.value =
emp.position;

status.value =
emp.status;

datehired.value =
emp.datehired;

editIndex = index;

openModal();

}

/* SEARCH */

function searchEmployee(){

let value =
search.value.toLowerCase();

let rows =
document.querySelectorAll(
'#empTable tbody tr'
);

rows.forEach(row=>{

row.style.display =

row.innerText
.toLowerCase()
.includes(value)

? ''

: 'none';

});

}

/* CLEAR */

function clearForm(){

fname.value='';

lname.value='';

department.value='';

position.value='';

datehired.value='';

photo.value='';

}

</script>

</body>
</html>
