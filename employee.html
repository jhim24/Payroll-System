<!DOCTYPE html>
<html>
<head>

<title>Employee Masterlist</title>

<style>

*{
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
margin:0;
padding:15px;
background:#d4d0c8;
}

/* TOP */

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:10px;
margin-bottom:15px;
}

h2{
margin:0;
}

/* BUTTONS */

.add-btn,
.save-btn,
.btn,
.close-btn{

padding:8px 15px;

background:#dcdcdc;

border-top:1px solid white;
border-left:1px solid white;

border-right:1px solid #808080;
border-bottom:1px solid #808080;

cursor:pointer;

font-weight:bold;
}

/* SEARCH */

.search-box input{

padding:8px;

width:250px;

border:1px solid #808080;
}

/* TABLE */

.table-box{

background:white;

border:1px solid #808080;

overflow:auto;

height:70vh;
}

table{

width:100%;

border-collapse:collapse;

min-width:4000px;

font-size:12px;
}

th,
td{

border:1px solid #808080;

padding:6px;

text-align:left;

white-space:nowrap;
}

th{

background:#dcdcdc;

position:sticky;

top:0;
}

/* MODAL */

.modal{

display:none;

position:fixed;

inset:0;

background:rgba(0,0,0,0.5);

justify-content:center;

align-items:center;

z-index:999;
}

.modal-box{

background:white;

width:95%;

max-width:1200px;

height:95vh;

overflow:auto;

padding:15px;

border:2px solid #808080;

position:relative;
}

/* CLOSE */

.close-btn{

position:absolute;

top:10px;
right:10px;
}

/* TABS */

.classic-tabs{

display:flex;
flex-wrap:wrap;

gap:2px;

background:#c0c0c0;

padding:4px 4px 0 4px;

border:1px solid #808080;

border-bottom:none;

margin-top:10px;
}

.tab-btn{

background:#dcdcdc;

padding:6px 14px;

cursor:pointer;

font-size:12px;

font-weight:bold;

border-top:1px solid white;
border-left:1px solid white;

border-right:1px solid #808080;
border-bottom:1px solid #808080;
}

.tab-btn.active{

background:white;

border-bottom:1px solid white;
}

/* CONTENT */

.tab-content{

display:none;

border:1px solid #808080;

padding:15px;

background:white;
}

.tab-content.active{
display:block;
}

/* GRID */

.form-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(200px,1fr));

gap:8px;
}

/* INPUT */

input,
select{

width:100%;

padding:8px;

border:1px solid #808080;
}

</style>

</head>

<body>

<div class="top-bar">

<h2>Employee Masterlist</h2>

<div style="display:flex;gap:10px;">

<div class="search-box">

<input
type="text"
id="search"
placeholder="Search..."
onkeyup="searchEmp()">

</div>

<button
class="add-btn"
onclick="openModal()">

+ Add Employee

</button>

</div>

</div>

<h3 id="total">
Total : 0
</h3>

<!-- TABLE -->

<div class="table-box">

<table id="empTable">

<thead>

<tr>

<th>First Name</th>
<th>Middle Name</th>
<th>Last Name</th>
<th>Birthdate</th>
<th>Age</th>
<th>Gender</th>

<th>SSS Number</th>
<th>PhilHealth Number</th>
<th>Pag-IBIG Number</th>
<th>Health Card Number</th>

<th>Bank Name</th>
<th>Bank Account Number</th>

<th>ID Type</th>
<th>ID Number</th>

<th>Mobile</th>
<th>Email</th>

<th>Employee ID</th>
<th>Position</th>
<th>Department</th>
<th>Employment</th>
<th>Salary Rate</th>

<th>Action</th>

</tr>

</thead>

<tbody></tbody>

</table>

</div>

<!-- MODAL -->

<div
class="modal"
id="employeeModal">

<div class="modal-box">

<button
class="close-btn"
onclick="closeModal()">

X

</button>

<h3>Employee Information</h3>

<!-- TABS -->

<div class="classic-tabs">

<button
class="tab-btn active"
onclick="openTab(event,'personal')">

Personal

</button>

<button
class="tab-btn"
onclick="openTab(event,'contact')">

Contact

</button>

<button
class="tab-btn"
onclick="openTab(event,'job')">

Job

</button>

<button
class="tab-btn"
onclick="openTab(event,'deduction')">

Deduction

</button>

</div>

<!-- PERSONAL -->

<div
id="personal"
class="tab-content active">

<div class="form-grid">

<input
class="emp-field"
placeholder="First Name">

<input
class="emp-field"
placeholder="Middle Name">

<input
class="emp-field"
placeholder="Last Name">

<input
class="emp-field"
type="date"
id="birthdate"
onchange="calcAge()">

<input
class="emp-field"
id="age"
placeholder="Age"
readonly>

<select
class="emp-field">

<option>Gender</option>
<option>Male</option>
<option>Female</option>

</select>

<input
class="emp-field"
placeholder="SSS Number">

<input
class="emp-field"
placeholder="PhilHealth Number">

<input
class="emp-field"
placeholder="Pag-IBIG Number">

<input
class="emp-field"
placeholder="Health Card Number">

<input
class="emp-field"
placeholder="Bank Name">

<input
class="emp-field"
placeholder="Bank Account Number">

<select class="emp-field">

<option>Select ID</option>

<option>PhilSys National ID</option>
<option>Passport</option>
<option>Driver's License</option>
<option>UMID</option>
<option>Postal ID</option>
<option>Voter's ID</option>
<option>PRC ID</option>
<option>Senior Citizen ID</option>
<option>PWD ID</option>
<option>TIN ID</option>
<option>Barangay ID</option>
<option>Company ID</option>
<option>School ID</option>
<option>Seaman's Book</option>
<option>OFW ID</option>

</select>

<input
class="emp-field"
placeholder="ID Number">

</div>

</div>

<!-- CONTACT -->

<div
id="contact"
class="tab-content">

<div class="form-grid">

<input
class="emp-field"
placeholder="Mobile">

<input
class="emp-field"
placeholder="Email">

<input
class="emp-field"
placeholder="Current Address">

<input
class="emp-field"
placeholder="Permanent Address">

</div>

</div>

<!-- JOB -->

<div
id="job"
class="tab-content">

<div class="form-grid">

<input
class="emp-field"
placeholder="Employee ID">

<input
class="emp-field"
placeholder="Position">

<input
class="emp-field"
placeholder="Department">

<select
class="emp-field">

<option>Employment</option>
<option>Regular</option>
<option>Probationary</option>
<option>Contractual</option>

</select>

<input
class="emp-field"
placeholder="Salary Rate">

</div>

</div>

<!-- DEDUCTION -->

<div
id="deduction"
class="tab-content">

<div class="form-grid">

<input
class="emp-field"
placeholder="SSS">

<input
class="emp-field"
placeholder="PhilHealth">

<input
class="emp-field"
placeholder="Pag-IBIG">

<input
class="emp-field"
placeholder="Health Card">

<input
class="emp-field"
placeholder="Uniform">

<input
class="emp-field"
placeholder="Others">

</div>

</div>

<br>

<button
class="save-btn"
onclick="addEmployee()">

Save Employee

</button>

</div>

</div>

<script>

let editRowIndex = null;

let employees =

JSON.parse(
localStorage.getItem('employees')
) || [];

/* MODAL */

function openModal(){

employeeModal.style.display='flex';

}

function closeModal(){

employeeModal.style.display='none';

}

/* TAB */

function openTab(evt,tabId){

document
.querySelectorAll('.tab-content')

.forEach(tab=>{

tab.classList.remove('active');

});

document
.getElementById(tabId)

.classList.add('active');

document
.querySelectorAll('.tab-btn')

.forEach(btn=>{

btn.classList.remove('active');

});

evt.currentTarget
.classList.add('active');

}

/* AGE */

function calcAge(){

let birth =
new Date(birthdate.value);

let today =
new Date();

let years =
today.getFullYear() -
birth.getFullYear();

let m =
today.getMonth() -
birth.getMonth();

if(
m < 0 ||

(m === 0 &&
today.getDate() <
birth.getDate())
){

years--;

}

age.value = years;

}

/* SAVE */

function addEmployee(){

let fields =

document.querySelectorAll(
'.emp-field'
);

let employeeData = [];

fields.forEach(field=>{

employeeData.push(field.value);

});

if(editRowIndex !== null){

employees[editRowIndex] =
employeeData;

editRowIndex = null;

alert('Employee Updated');

}else{

employees.push(employeeData);

alert('Employee Saved');

}

localStorage.setItem(
'employees',
JSON.stringify(employees)
);

renderTable();

closeModal();

clearForm();

}

/* RENDER */

function renderTable(){

let table =

document.querySelector(
'#empTable tbody'
);

table.innerHTML='';

employees.forEach((emp,index)=>{

table.innerHTML += `

<tr>

<td>${emp[0]}</td>
<td>${emp[1]}</td>
<td>${emp[2]}</td>
<td>${emp[3]}</td>
<td>${emp[4]}</td>
<td>${emp[5]}</td>

<td>${emp[6]}</td>
<td>${emp[7]}</td>
<td>${emp[8]}</td>
<td>${emp[9]}</td>

<td>${emp[10]}</td>
<td>${emp[11]}</td>

<td>${emp[12]}</td>
<td>${emp[13]}</td>

<td>${emp[14]}</td>
<td>${emp[15]}</td>

<td>${emp[18]}</td>
<td>${emp[19]}</td>
<td>${emp[20]}</td>
<td>${emp[21]}</td>
<td>${emp[22]}</td>

<td>

<button
class='btn'
onclick='editRow(${index})'>

Edit

</button>

<button
class='btn'
onclick='deleteRow(${index})'>

Delete

</button>

</td>

</tr>

`;

});

updateTotal();

}

/* EDIT */

function editRow(index){

openModal();

editRowIndex = index;

let emp = employees[index];

let fields =

document.querySelectorAll(
'.emp-field'
);

fields.forEach((field,i)=>{

field.value = emp[i] || '';

});

}

/* DELETE */

function deleteRow(index){

employees.splice(index,1);

localStorage.setItem(
'employees',
JSON.stringify(employees)
);

renderTable();

}

/* SEARCH */

function searchEmp(){

let val =
search.value.toLowerCase();

let rows =

document.querySelectorAll(
'#empTable tbody tr'
);

let visible = 0;

rows.forEach(row=>{

let show =

row.innerText
.toLowerCase()
.includes(val);

row.style.display =
show ? '' : 'none';

if(show) visible++;

});

total.innerText =
'Showing : ' + visible;

}

/* CLEAR */

function clearForm(){

document
.querySelectorAll('.emp-field')

.forEach(el=>{

el.value='';

});

}

/* TOTAL */

function updateTotal(){

let rows =

document.querySelectorAll(
'#empTable tbody tr'
);

total.innerText =
'Total : ' + rows.length;

}

renderTable();

</script>

</body>
</html>
