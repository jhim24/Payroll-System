<!DOCTYPE html>
<html>
<head>

<title>Employee Masterlist</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<style>

*{
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{

margin:0;

padding:15px;

background:
linear-gradient(
135deg,
#1f1f1f,
#2b2b2b
);

color:white;
}

/* TOP */

.top-bar{

display:flex;

justify-content:space-between;

align-items:center;

flex-wrap:wrap;

gap:10px;

margin-bottom:15px;
}

h2{

margin:0;

font-size:30px;

color:#ffcc00;

text-shadow:
2px 2px 5px black;
}

/* BUTTON */

.btn{

padding:10px 18px;

border:none;

border-radius:10px;

cursor:pointer;

font-weight:bold;

font-size:13px;

transition:0.3s;

color:white;
}

.btn:hover{

transform:scale(1.03);
}

.add-btn{

background:
linear-gradient(
135deg,
#ffcc00,
#ff9900
);

color:black;
}

.save-btn{

background:
linear-gradient(
135deg,
#00cc66,
#00994d
);
}

.edit-btn{

background:#0066cc;
}

.delete-btn{

background:#cc0000;
}

.back-btn{

background:#444;
}

/* SEARCH */

.search-box input{

padding:10px;

width:250px;

border:2px solid #ffcc00;

border-radius:8px;

background:#2f2f2f;

color:white;
}

/* TABLE */

.table-box{

background:#2b2b2b;

border:2px solid #ffcc00;

overflow:auto;

height:70vh;

border-radius:12px;

box-shadow:
0 5px 15px rgba(0,0,0,0.5);
}

table{

width:100%;

border-collapse:collapse;

min-width:1800px;

font-size:12px;
}

th,
td{

border:1px solid #555;

padding:8px;

text-align:left;

white-space:nowrap;
}

th{

background:#ffcc00;

color:black;

position:sticky;

top:0;
}

tr:nth-child(even){

background:#242424;
}

tr:hover{

background:#3a3a3a;
}

/* MODAL */

.modal{

display:none;

position:fixed;

inset:0;

background:rgba(0,0,0,0.7);

justify-content:center;

align-items:center;

z-index:999;
}

.modal-box{

background:#2b2b2b;

width:95%;

max-width:1100px;

height:95vh;

overflow:auto;

padding:20px;

border:3px solid #ffcc00;

border-radius:15px;

position:relative;
}

/* FORM */

.form-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:10px;
}

input,
select{

width:100%;

padding:10px;

border-radius:8px;

border:2px solid #555;

background:#1f1f1f;

color:white;
}

/* CLOSE */

.close-btn{

position:absolute;

top:10px;
right:10px;

background:#cc0000;
}

/* MOBILE */

@media(max-width:768px){

table{

font-size:11px;
}

h2{

font-size:24px;
}

}

</style>

</head>

<body>

<div class="top-bar">

<button
class="btn back-btn"
onclick="window.location.href='index.html'">

← BACK

</button>

<h2>
EMPLOYEE MASTERLIST
</h2>

<div style="display:flex;gap:10px;">

<div class="search-box">

<input
type="text"
id="search"
placeholder="Search Employee"
onkeyup="searchEmployee()">

</div>

<button
class="btn add-btn"
onclick="openModal()">

+ ADD EMPLOYEE

</button>

</div>

</div>

<h3 id="total">
Total : 0
</h3>

<!-- TABLE -->

<div class="table-box">

<table id="employeeTable">

<thead>

<tr>

<th>EMPLOYEE ID</th>
<th>FIRST NAME</th>
<th>MIDDLE NAME</th>
<th>LAST NAME</th>
<th>BIRTHDATE</th>
<th>AGE</th>
<th>GENDER</th>
<th>MOBILE</th>
<th>EMAIL</th>
<th>POSITION</th>
<th>DEPARTMENT</th>
<th>EMPLOYMENT</th>
<th>SALARY</th>
<th>ACTION</th>

</tr>

</thead>

<tbody id="employeeBody">

</tbody>

</table>

</div>

<!-- MODAL -->

<div
class="modal"
id="employeeModal">

<div class="modal-box">

<button
class="btn close-btn"
onclick="closeModal()">

X

</button>

<h2 style="margin-bottom:15px;">
Employee Information
</h2>

<div class="form-grid">

<input id="firstname"
placeholder="First Name">

<input id="middlename"
placeholder="Middle Name">

<input id="lastname"
placeholder="Last Name">

<input type="date"
id="birthdate">

<input id="age"
placeholder="Age">

<select id="gender">

<option value="">
Gender
</option>

<option>
Male
</option>

<option>
Female
</option>

</select>

<input id="mobile"
placeholder="Mobile">

<input id="email"
placeholder="Email">

<input id="employeeid"
placeholder="Employee ID">

<input id="position"
placeholder="Position">

<input id="department"
placeholder="Department">

<select id="employment">

<option value="">
Employment
</option>

<option>
Regular
</option>

<option>
Probationary
</option>

<option>
Contractual
</option>

</select>

<input id="salary"
placeholder="Salary">

</div>

<br>

<button
class="btn save-btn"
onclick="saveEmployee()">

SAVE EMPLOYEE

</button>

</div>

</div>

<script type="module">

/* =========================
FIREBASE IMPORT
========================= */

import {

initializeApp

}

from
"https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";

import {

getFirestore,
collection,
addDoc,
getDocs,
updateDoc,
deleteDoc,
doc

}

from
"https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

/* =========================
FIREBASE CONFIG
========================= */

const firebaseConfig = {

apiKey:
"AIzaSyAehoq0teVYHiJ4bkKOgBqIgJZrQpce3k8",

authDomain:
"hr-system-38fc3.firebaseapp.com",

projectId:
"hr-system-38fc3",

storageBucket:
"hr-system-38fc3.firebasestorage.app",

messagingSenderId:
"615471610834",

appId:
"1:615471610834:web:a0d671d4e3f4c1b57b660b"

};

/* =========================
INIT
========================= */

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* =========================
VARIABLES
========================= */

let editId = null;

/* =========================
MODAL
========================= */

window.openModal = function(){

employeeModal.style.display =
'flex';

}

window.closeModal = function(){

employeeModal.style.display =
'none';

clearForm();

}

/* =========================
SAVE EMPLOYEE
========================= */

window.saveEmployee =
async function(){

if(
firstname.value === '' ||
lastname.value === '' ||
employeeid.value === ''
){

alert(
'Complete Required Fields'
);

return;

}

let data = {

firstname:
firstname.value,

middlename:
middlename.value,

lastname:
lastname.value,

birthdate:
birthdate.value,

age:
age.value,

gender:
gender.value,

mobile:
mobile.value,

email:
email.value,

employeeid:
employeeid.value,

position:
position.value,

department:
department.value,

employment:
employment.value,

salary:
salary.value

};

try{

if(editId){

await updateDoc(
doc(db,'employees',editId),
data
);

alert(
'Employee Updated'
);

}else{

await addDoc(
collection(db,'employees'),
data
);

alert(
'Employee Saved'
);

}

closeModal();

loadEmployees();

}catch(error){

console.log(error);

alert(
'Firebase Error'
);

}

}

/* =========================
LOAD EMPLOYEES
========================= */

async function loadEmployees(){

employeeBody.innerHTML='';

let querySnapshot =

await getDocs(
collection(db,'employees')
);

let totalCount = 0;

querySnapshot.forEach(docSnap=>{

totalCount++;

let emp =
docSnap.data();

employeeBody.innerHTML += `

<tr>

<td>
${emp.employeeid || ''}
</td>

<td>
${emp.firstname || ''}
</td>

<td>
${emp.middlename || ''}
</td>

<td>
${emp.lastname || ''}
</td>

<td>
${emp.birthdate || ''}
</td>

<td>
${emp.age || ''}
</td>

<td>
${emp.gender || ''}
</td>

<td>
${emp.mobile || ''}
</td>

<td>
${emp.email || ''}
</td>

<td>
${emp.position || ''}
</td>

<td>
${emp.department || ''}
</td>

<td>
${emp.employment || ''}
</td>

<td>
${emp.salary || ''}
</td>

<td>

<div style="display:flex;gap:5px;">

<button
class="btn edit-btn"
onclick="editEmployee(
'${docSnap.id}',
'${emp.firstname || ''}',
'${emp.middlename || ''}',
'${emp.lastname || ''}',
'${emp.birthdate || ''}',
'${emp.age || ''}',
'${emp.gender || ''}',
'${emp.mobile || ''}',
'${emp.email || ''}',
'${emp.employeeid || ''}',
'${emp.position || ''}',
'${emp.department || ''}',
'${emp.employment || ''}',
'${emp.salary || ''}'
)">

EDIT

</button>

<button
class="btn delete-btn"
onclick="deleteEmployee(
'${docSnap.id}'
)">

DELETE

</button>

</div>

</td>

</tr>

`;

});

total.innerText =
'Total : ' + totalCount;

}

loadEmployees();

/* =========================
EDIT
========================= */

window.editEmployee = function(

id,
fn,
mn,
ln,
bd,
ag,
gen,
mob,
em,
eid,
pos,
dep,
emp,
sal

){

editId = id;

firstname.value = fn;
middlename.value = mn;
lastname.value = ln;
birthdate.value = bd;
age.value = ag;
gender.value = gen;
mobile.value = mob;
email.value = em;
employeeid.value = eid;
position.value = pos;
department.value = dep;
employment.value = emp;
salary.value = sal;

openModal();

}

/* =========================
DELETE
========================= */

window.deleteEmployee =
async function(id){

let confirmDelete = confirm(
'Delete Employee?'
);

if(!confirmDelete) return;

try{

await deleteDoc(
doc(db,'employees',id)
);

alert(
'Employee Deleted'
);

loadEmployees();

}catch(error){

console.log(error);

alert(
'Delete Error'
);

}

}

/* =========================
SEARCH
========================= */

window.searchEmployee =
function(){

let value =

search.value.toLowerCase();

let rows =

document.querySelectorAll(
'#employeeBody tr'
);

rows.forEach(row=>{

row.style.display =

row.innerText
.toLowerCase()
.includes(value)

? ''

: 'none';

});

}

/* =========================
CLEAR
========================= */

function clearForm(){

editId = null;

firstname.value='';
middlename.value='';
lastname.value='';
birthdate.value='';
age.value='';
gender.value='';
mobile.value='';
email.value='';
employeeid.value='';
position.value='';
department.value='';
employment.value='';
salary.value='';

}

</script>

</body>
</html>
