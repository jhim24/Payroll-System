<!DOCTYPE html>
<html>
<head>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#ffcc00">

<link rel="apple-touch-icon" href="icon-192.png">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Attendance Request</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{

background:
linear-gradient(
135deg,
#1f1f1f,
#2b2b2b
);

padding:15px;

color:white;
}

/* CONTAINER */

.container{

max-width:800px;

margin:auto;

background:#2b2b2b;

border:3px solid #ffcc00;

border-radius:20px;

overflow:hidden;

box-shadow:
0 5px 20px rgba(0,0,0,0.5);
}

/* HEADER */

.header{

background:
linear-gradient(
135deg,
#ffcc00,
#ff8800
);

padding:18px;

display:flex;

justify-content:space-between;

align-items:center;

flex-wrap:wrap;
}

.title{

font-size:28px;

font-weight:bold;

color:black;
}

/* BUTTON */

.btn{

padding:10px 18px;

border:none;

border-radius:10px;

cursor:pointer;

font-weight:bold;

font-size:13px;

transition:0.3s;
}

.btn:hover{

transform:scale(1.03);
}

.back-btn{

background:#0066cc;

color:white;
}

.submit-btn{

background:
linear-gradient(
135deg,
#00cc66,
#00994d
);

color:white;

width:100%;

margin-top:20px;

font-size:16px;
}

/* FORM */

.form-box{

padding:25px;
}

.form-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));

gap:15px;
}

label{

display:block;

margin-bottom:5px;

font-weight:bold;

color:#ffcc00;
}

input,
select,
textarea{

width:100%;

padding:12px;

border:none;

border-radius:10px;

background:#f1f1f1;

font-size:14px;
}

textarea{

resize:none;

height:120px;
}

/* SUCCESS */

.success-box{

margin-top:15px;

padding:15px;

background:#003300;

border:2px solid #00ff99;

border-radius:10px;

display:none;

font-weight:bold;

text-align:center;

color:#00ff99;
}

/* MOBILE */

@media(max-width:768px){

.title{

font-size:22px;
}

.form-grid{

grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="container">

<!-- HEADER -->

<div class="header">

<div class="title">
🕒 ATTENDANCE REQUEST
</div>

<button
class="btn back-btn"
onclick="window.location.href='index.html'">

← BACK

</button>

</div>

<!-- FORM -->

<div class="form-box">

<div class="form-grid">

<div>

<label>
Employee ID
</label>

<input
type="text"
id="empid"
placeholder="Enter Employee ID">

</div>

<div>

<label>
Employee Name
</label>

<input
type="text"
id="employee"
placeholder="Enter Employee Name">

</div>

<div>

<label>
Request Type
</label>

<select id="requesttype">

<option>
Missing Time In
</option>

<option>
Missing Time Out
</option>

<option>
Late Correction
</option>

<option>
Overtime Request
</option>

<option>
Official Business
</option>

<option>
Schedule Adjustment
</option>

</select>

</div>

<div>

<label>
Date
</label>

<input
type="date"
id="date">

</div>

<div>

<label>
Time
</label>

<input
type="time"
id="time">

</div>

<div>

<label>
Status
</label>

<input
type="text"
value="PENDING"
readonly>

</div>

</div>

<br>

<label>
Reason
</label>

<textarea
id="reason"
placeholder="Enter Reason..."></textarea>

<button
class="btn submit-btn"
onclick="submitRequest()">

SUBMIT REQUEST

</button>

<div
class="success-box"
id="successBox">

REQUEST SUBMITTED SUCCESSFULLY

</div>

</div>

</div>

<script type="module">

/* =========================
FIREBASE IMPORT
========================= */

import {

initializeApp

}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getFirestore,
collection,
addDoc

}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

/* =========================
FIREBASE CONFIG
========================= */

const firebaseConfig = {

apiKey:
"AIzaSyAehoq0teVYHiJ4bkKOgBqIgJZrQpce3k8",

authDomain:
"hr-system-38fc3.firebaseapp.com",

projectId:
"hr-system-38fc3",

storageBucket:
"hr-system-38fc3.firebasestorage.app",

messagingSenderId:
"615471610834",

appId:
"1:615471610834:web:a0d671d4e3f4c1b57b660b"

};

/* =========================
INIT FIREBASE
========================= */

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* =========================
SUBMIT REQUEST
========================= */

window.submitRequest =
async function(){

let empid =
document.getElementById(
'empid'
).value;

let employee =
document.getElementById(
'employee'
).value;

let requesttype =
document.getElementById(
'requesttype'
).value;

let date =
document.getElementById(
'date'
).value;

let time =
document.getElementById(
'time'
).value;

let reason =
document.getElementById(
'reason'
).value;

/* VALIDATION */

if(
!empid ||
!employee ||
!date ||
!time ||
!reason
){

alert(
'Please complete all fields'
);

return;

}

try{

await addDoc(

collection(
db,
'attendanceRequests'
),

{

employeeid:empid,

employee:employee,

requesttype:requesttype,

date:date,

time:time,

reason:reason,

status:'PENDING',

timestamp:Date.now()

}

);

/* SUCCESS */

successBox.style.display='block';

setTimeout(()=>{

successBox.style.display='none';

},3000);

/* CLEAR */

document.getElementById(
'empid'
).value='';

document.getElementById(
'employee'
).value='';

document.getElementById(
'date'
).value='';

document.getElementById(
'time'
).value='';

document.getElementById(
'reason'
).value='';

}catch(error){

console.log(error);

alert(
'Submit Error'
);

}

}

</script>

</body>
</html>
