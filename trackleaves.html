<!DOCTYPE html>
<html>
<head>

<title>Track Leaves</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#1f1f1f;
padding:15px;
color:white;
}

.container{

max-width:1500px;

margin:auto;

background:#2b2b2b;

border:3px solid #ffcc00;

border-radius:15px;

overflow:hidden;
}

.header{

background:
linear-gradient(
135deg,
#ffcc00,
#ff8800
);

padding:15px;

display:flex;

justify-content:space-between;

align-items:center;

flex-wrap:wrap;

gap:10px;
}

.title{

font-size:28px;

font-weight:bold;

color:#990000;
}

.btn{

padding:10px 18px;

border:none;

border-radius:10px;

cursor:pointer;

font-weight:bold;

font-size:13px;

transition:0.3s;
}

.btn:hover{
transform:scale(1.03);
}

.back-btn{
background:#0066cc;
color:white;
}

.refresh-btn{
background:#008000;
color:white;
}

.content{
padding:20px;
}

.stats{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:15px;

margin-bottom:20px;
}

.stat-card{

padding:20px;

border-radius:12px;

text-align:center;

font-weight:bold;

box-shadow:0 5px 10px rgba(0,0,0,0.4);
}

.pending{
background:linear-gradient(135deg,#ff9900,#cc6600);
}

.approved{
background:linear-gradient(135deg,#00aa00,#006600);
}

.rejected{
background:linear-gradient(135deg,#cc0000,#660000);
}

.total{
background:linear-gradient(135deg,#444,#111);
}

.stat-card h2{
font-size:40px;
margin-bottom:10px;
}

.table-wrapper{

overflow-x:auto;

background:white;

border-radius:10px;
}

table{
width:100%;
border-collapse:collapse;
min-width:1200px;
}

th,
td{

border:1px solid #999;

padding:10px;

text-align:center;
}

th{
background:#ffcc00;
color:black;
}

td{
color:black;
}

.status-pending{
color:#ff8800;
font-weight:bold;
}

.status-approved{
color:green;
font-weight:bold;
}

.status-rejected{
color:red;
font-weight:bold;
}

@media(max-width:768px){

.title{
font-size:22px;
}

.stats{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="title">
📋 TRACK LEAVES
</div>

<div style="display:flex;gap:10px;flex-wrap:wrap;">

<button
class="btn refresh-btn"
onclick="loadLeaves()">

🔄 REFRESH

</button>

<button
class="btn back-btn"
onclick="window.location.href='index.html'">

← BACK

</button>

</div>

</div>

<div class="content">

<div class="stats">

<div class="stat-card total">

<h2 id="totalRequests">
0
</h2>

<p>TOTAL REQUESTS</p>

</div>

<div class="stat-card pending">

<h2 id="pendingCount">
0
</h2>

<p>PENDING</p>

</div>

<div class="stat-card approved">

<h2 id="approvedCount">
0
</h2>

<p>APPROVED</p>

</div>

<div class="stat-card rejected">

<h2 id="rejectedCount">
0
</h2>

<p>REJECTED</p>

</div>

</div>

<div class="table-wrapper">

<table>

<thead>

<tr>

<th>EMPLOYEE ID</th>
<th>EMPLOYEE</th>
<th>REQUEST TYPE</th>
<th>DATE</th>
<th>DAYS</th>
<th>REASON</th>
<th>STATUS</th>

</tr>

</thead>

<tbody id="leaveBody">

</tbody>

</table>

</div>

</div>

</div>

<script type="module">

import {
initializeApp
}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:
"AIzaSyAehoq0teVYHiJ4bkKOgBqIgJZrQpce3k8",

authDomain:
"hr-system-38fc3.firebaseapp.com",

projectId:
"hr-system-38fc3",

storageBucket:
"hr-system-38fc3.firebasestorage.app",

messagingSenderId:
"615471610834",

appId:
"1:615471610834:web:a0d671d4e3f4c1b57b660b"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

window.loadLeaves =
async function(){

leaveBody.innerHTML='';

let total = 0;
let pending = 0;
let approved = 0;
let rejected = 0;

const querySnapshot =
await getDocs(
collection(db,'employeeRequests')
);

querySnapshot.forEach(docSnap=>{

let data = docSnap.data();

let status =
(data.status || 'PENDING')
.toUpperCase();

let statusClass = '';

if(status === 'PENDING'){

pending++;
statusClass = 'status-pending';

}

if(status === 'APPROVED'){

approved++;
statusClass = 'status-approved';

}

if(status === 'REJECTED'){

rejected++;
statusClass = 'status-rejected';

}

total++;

leaveBody.innerHTML += `

<tr>

<td>${data.empid || ''}</td>

<td>${data.employee || ''}</td>

<td>${data.type || ''}</td>

<td>${data.date || ''}</td>

<td>${data.days || ''}</td>

<td>${data.reason || ''}</td>

<td class="${statusClass}">
${status}
</td>

</tr>

`;

});

document.getElementById(
'totalRequests'
).innerText = total;

document.getElementById(
'pendingCount'
).innerText = pending;

document.getElementById(
'approvedCount'
).innerText = approved;

document.getElementById(
'rejectedCount'
).innerText = rejected;

}

loadLeaves();

</script>

</body>
</html>
