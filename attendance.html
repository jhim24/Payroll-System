<!DOCTYPE html>
<html>
<head>

<title>Employee Attendance</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#1f1f1f;
padding:10px;
color:white;
}

/* CONTAINER */

.container{

max-width:1300px;

margin:auto;

background:#2b2b2b;

border:2px solid #ffcc00;

border-radius:12px;

box-shadow:0 5px 15px rgba(0,0,0,0.5);

padding:10px;
}

/* HEADER */

.header{

padding:10px;

text-align:center;

position:relative;
}

/* BUTTONS */

.top-btn{

padding:10px 18px;

cursor:pointer;

font-weight:bold;

font-size:12px;

border:none;

border-radius:10px;

transition:0.3s;

box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

.top-btn:hover{

transform:translateY(-2px);

filter:brightness(1.1);
}

.back-btn{

position:absolute;

left:15px;
top:15px;

background:linear-gradient(
135deg,
#ffcc00,
#ff6600
);

color:black;
}

.print-btn{

position:absolute;

right:15px;
top:15px;

background:linear-gradient(
135deg,
#00cc66,
#00994d
);

color:white;
}

/* LOGO */

.logo{

width:65px;
height:65px;

margin:auto;

background:white;

border-radius:50%;

display:flex;

align-items:center;
justify-content:center;

overflow:hidden;

border:2px solid #ffcc00;

margin-bottom:8px;
}

.logo img{

width:100%;
height:100%;

object-fit:cover;
}

/* TITLE */

.title{

font-size:30px;

font-weight:bold;

margin-bottom:10px;

color:#ffcc00;

text-shadow:2px 2px 5px black;
}

/* FILTERS */

.filter-section{

display:flex;

justify-content:center;

gap:10px;

flex-wrap:wrap;

margin-top:15px;
}

select,
input{

padding:10px;

border:2px solid #555;

font-size:13px;

min-width:220px;

border-radius:8px;

background:#1f1f1f;

color:white;
}

input:focus,
select:focus{

outline:none;

border-color:#ffcc00;
}

/* EMPLOYEE INFO */

.employee-info{

margin-top:15px;

line-height:1.5;

font-size:15px;

font-weight:bold;

color:#ffcc00;
}

/* CLOCK */

.clock{

font-size:30px;

font-weight:bold;

margin-top:10px;

color:#00ff99;
}

.date{

font-size:18px;

margin-top:3px;
}

/* ACTION BUTTONS */

.button-group{

display:flex;

justify-content:center;

gap:8px;

flex-wrap:wrap;

margin:18px 0;
}

.action-btn{

padding:10px 20px;

font-size:13px;

font-weight:bold;

cursor:pointer;

border:none;

border-radius:10px;

color:white;

min-width:120px;

transition:0.3s;

box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

.action-btn:hover{

transform:translateY(-2px);

filter:brightness(1.1);
}

.timein{
background:#008000;
}

.breakout{
background:#c58a00;
}

.breakin{
background:#0066cc;
}

.timeout{
background:#cc0000;
}

/* DELETE BUTTON */

.delete-btn{

background:#cc0000;

color:white;

border:none;

padding:6px 12px;

border-radius:6px;

cursor:pointer;

font-weight:bold;

transition:0.3s;
}

.delete-btn:hover{

background:#ff0000;

transform:scale(1.05);
}

/* TABLE */

.table-wrapper{

overflow:auto;

max-height:350px;

background:#2b2b2b;

margin-top:10px;

border:2px solid #ffcc00;

border-radius:10px;
}

/* SCROLLBAR */

.table-wrapper::-webkit-scrollbar{

width:12px;
height:12px;
}

.table-wrapper::-webkit-scrollbar-track{

background:#333;
}

.table-wrapper::-webkit-scrollbar-thumb{

background:#ffcc00;

border-radius:10px;
}

/* TABLE */

table{

width:100%;

border-collapse:collapse;

min-width:1600px;

font-size:12px;
}

th,
td{

border:1px solid #555;

padding:8px;

text-align:center;

white-space:nowrap;
}

th{

background:#ffcc00;

color:black;

position:sticky;

top:0;
}

tr:nth-child(even){

background:#242424;
}

tr:hover{

background:#3a3a3a;
}

/* SUMMARY */

.summary{

margin-top:15px;

background:#2b2b2b;

padding:15px;

border:2px solid #ffcc00;

font-weight:bold;

line-height:1.8;

border-radius:10px;

color:#ffcc00;
}

/* SIGNATURE */

.signature{

margin-top:50px;

display:flex;

justify-content:space-between;

text-align:center;
}

.line{

margin-top:50px;

border-top:1px solid white;

padding-top:5px;

width:250px;
}

/* PRINT */

@media print{

@page{
size:landscape;
margin:10mm;
}

body{
background:white;
padding:0;
zoom:85%;
color:black;
}

/* HIDE BUTTONS */

.back-btn,
.print-btn,
.button-group,
.filter-section,
.clock,
.date,
.delete-btn{

display:none !important;
}

/* REMOVE BOARD */

.container{

border:none !important;
box-shadow:none !important;

background:white;
}

/* REMOVE SCROLLBAR */

.table-wrapper{

overflow:visible !important;

max-height:none !important;

border:none !important;
}

.table-wrapper::-webkit-scrollbar{

display:none;
}

/* AUTO FIT */

table{

min-width:100% !important;

font-size:10px;
}

th,
td{

white-space:normal !important;

padding:4px;
}

}

/* MOBILE */

@media(max-width:768px){

.filter-section{
flex-direction:column;
}

select,
input{
width:100%;
}

.button-group{
flex-direction:column;
}

.action-btn{
width:100%;
}

}

</style>

</head>

<body>

<div class="container">

<!-- HEADER -->

<div class="header">

<button
class="top-btn back-btn"
onclick="window.history.back()">

← BACK

</button>

<button
class="top-btn print-btn"
onclick="printAttendance()">

🖨 PRINT DTR

</button>

<div class="logo">

<img
src="https://i.imgur.com/8Km9tLL.png">

</div>

<div class="title">
EMPLOYEE ATTENDANCE
</div>

<!-- FILTER -->

<div class="filter-section">

<select
id="employeeSelect"
onchange="filterAttendance()">

<option value="">
Select Employee
</option>

</select>

<input
type="date"
id="fromDate"
onchange="filterAttendance()">

<input
type="date"
id="toDate"
onchange="filterAttendance()">

</div>

<!-- INFO -->

<div class="employee-info">

<div id="employeeId">
EMPLOYEE ID :
</div>

<div id="employeeName">
EMPLOYEE NAME :
</div>

</div>

<!-- CLOCK -->

<div
class="clock"
id="clock">

00:00:00

</div>

<div
class="date"
id="dateToday">

DATE

</div>

<!-- BUTTONS -->

<div class="button-group">

<button
class="action-btn timein"
onclick="timeIn()">

TIME IN

</button>

<button
class="action-btn breakout"
onclick="breakOut()">

BREAK OUT

</button>

<button
class="action-btn breakin"
onclick="breakIn()">

BREAK IN

</button>

<button
class="action-btn timeout"
onclick="timeOut()">

TIME OUT

</button>

</div>

<!-- TABLE -->

<div class="table-wrapper">

<table>

<thead>

<tr>

<th>DATE</th>
<th>EMP ID</th>
<th>EMPLOYEE NAME</th>
<th>TIME IN</th>
<th>BREAK OUT</th>
<th>BREAK IN</th>
<th>TIME OUT</th>
<th>BREAK MINUTES</th>
<th>TOTAL HOURS</th>
<th>LATE</th>
<th>STATUS</th>
<th>ACTION</th>

</tr>

</thead>

<tbody id="attendanceBody">

</tbody>

</table>

</div>

<!-- SUMMARY -->

<div class="summary">

<div id="totalDays">
TOTAL DAYS : 0
</div>

<div id="totalRecords">
TOTAL RECORDS : 0
</div>

</div>

<!-- SIGNATURE -->

<div class="signature">

<div>

<div class="line">
EMPLOYER SIGNATURE
</div>

</div>

<div>

<div class="line">
EMPLOYEE SIGNATURE
</div>

</div>

</div>

</div>

<script>

/* CLOCK */

function updateClock(){

let now = new Date();

clock.innerText =
now.toLocaleTimeString();

dateToday.innerText =
now.toDateString();

}

setInterval(updateClock,1000);

updateClock();

/* EMPLOYEES */

function loadEmployees(){

let employees =

JSON.parse(
localStorage.getItem('employees')
) || [];

employeeSelect.innerHTML =
'<option value="">Select Employee</option>';

employees.forEach((emp,index)=>{

let fullName =

(emp[0] || '') + ' ' +
(emp[1] || '') + ' ' +
(emp[2] || '');

let empId =
emp[18] || 'NO-ID';

employeeSelect.innerHTML += `

<option value="${fullName}">

${empId} - ${fullName}

</option>

`;

});

}

/* STORAGE */

let attendance =

JSON.parse(
localStorage.getItem('attendance')
) || [];

/* DATE */

function getToday(){

let d = new Date();

return (
d.getMonth()+1
) + '/' +
d.getDate() + '/' +
d.getFullYear();

}

function getTime(){

return new Date()
.toLocaleTimeString();

}

/* FORMAT DATE */

function formatDate(dateStr){

let parts =
dateStr.split('/');

let month =
parts[0].padStart(2,'0');

let day =
parts[1].padStart(2,'0');

let year =
parts[2];

return `${year}-${month}-${day}`;

}

/* TIME IN */

function timeIn(){

if(employeeSelect.value===''){

alert('Select Employee');

return;

}

let fullName =
employeeSelect.value;

/* GET EMPLOYEE ID FROM MASTERLIST */

let employees =

JSON.parse(
localStorage.getItem('employees')
) || [];

let empId = 'NO-ID';

employees.forEach(emp=>{

let full =

(emp[0] || '') + ' ' +
(emp[1] || '') + ' ' +
(emp[2] || '');

if(full === fullName){

empId = emp[18] || 'NO-ID';

}

});

let data = {

date:getToday(),

empid:empId,

name:fullName,

timein:getTime(),

breakout:'-',

breakin:'-',

timeout:'-',

breakminutes:'0 mins',

totalhours:'0',

late:'0 mins',

status:'PRESENT'

};

attendance.push(data);

localStorage.setItem(
'attendance',
JSON.stringify(attendance)
);

filterAttendance();

}

/* BREAK OUT */

function breakOut(){

if(attendance.length===0) return;

attendance[
attendance.length-1
].breakout = getTime();

localStorage.setItem(
'attendance',
JSON.stringify(attendance)
);

filterAttendance();

}

/* BREAK IN */

function breakIn(){

if(attendance.length===0) return;

attendance[
attendance.length-1
].breakin = getTime();

localStorage.setItem(
'attendance',
JSON.stringify(attendance)
);

filterAttendance();

}

/* TIME OUT */

function timeOut(){

if(attendance.length===0) return;

let last =
attendance[
attendance.length-1
];

last.timeout = getTime();

let inTime =
new Date(
'1/1/2024 ' + last.timein
);

let outTime =
new Date(
'1/1/2024 ' + last.timeout
);

let diff =

(outTime - inTime)
/ 1000 / 60 / 60;

let breakMinutes = 0;

if(
last.breakout !== '-' &&
last.breakin !== '-'
){

let breakOut =
new Date(
'1/1/2024 ' + last.breakout
);

let breakIn =
new Date(
'1/1/2024 ' + last.breakin
);

breakMinutes =

(breakIn - breakOut)
/ 1000 / 60;

}

let finalHours =

diff - (breakMinutes / 60);

last.breakminutes =
breakMinutes.toFixed(0) + ' mins';

last.totalhours =
finalHours.toFixed(2);

localStorage.setItem(
'attendance',
JSON.stringify(attendance)
);

filterAttendance();

}

/* FILTER */

function filterAttendance(){

let emp =
employeeSelect.value;

let fromDate =
document.getElementById(
'fromDate'
).value;

let toDate =
document.getElementById(
'toDate'
).value;

let tbody =
document.getElementById(
'attendanceBody'
);

tbody.innerHTML = '';

let filtered = attendance.filter(att=>{

let empMatch =
emp === '' ||
att.name === emp;

let attDate =
formatDate(att.date);

let fromMatch =
fromDate === '' ||
attDate >= fromDate;

let toMatch =
toDate === '' ||
attDate <= toDate;

return (
empMatch &&
fromMatch &&
toMatch
);

});

if(filtered.length===0){

tbody.innerHTML = `

<tr>

<td colspan="12">

NO ATTENDANCE RECORD

</td>

</tr>

`;

totalDays.innerText =
'TOTAL DAYS : 0';

totalRecords.innerText =
'TOTAL RECORDS : 0';

return;

}

filtered.forEach(att=>{

let row =
document.createElement('tr');

row.innerHTML = `

<td>${att.date}</td>
<td>${att.empid}</td>
<td>${att.name}</td>
<td>${att.timein}</td>
<td>${att.breakout}</td>
<td>${att.breakin}</td>
<td>${att.timeout}</td>
<td>${att.breakminutes}</td>
<td>${att.totalhours}</td>
<td>${att.late}</td>
<td>${att.status}</td>

<td>

<button
class="delete-btn"
onclick="deleteAttendance(${attendance.indexOf(att)})">

DELETE

</button>

</td>

`;

tbody.appendChild(row);

});

totalDays.innerText =
'TOTAL DAYS : ' +
filtered.length;

totalRecords.innerText =
'TOTAL RECORDS : ' +
filtered.length;

employeeId.innerText =
'EMPLOYEE ID : ' +
(filtered[0]?.empid || '-');

employeeName.innerText =
'EMPLOYEE NAME : ' +
(emp || 'ALL');

}

/* DELETE */

function deleteAttendance(index){

if(
confirm(
'Delete Attendance Record?'
)
){

attendance.splice(index,1);

localStorage.setItem(
'attendance',
JSON.stringify(attendance)
);

filterAttendance();

}

}

/* PRINT */

function printAttendance(){

window.print();

}

/* AUTO LOAD */

loadEmployees();

filterAttendance();

</script>

</body>
</html>
