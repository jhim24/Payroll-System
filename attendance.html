<!DOCTYPE html>
<html>
<head>

<title>Employee Attendance</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#d4d0c8;
padding:10px;
}

/* CONTAINER */

.container{

max-width:1200px;

margin:auto;

background:#c0c0c0;

border:2px solid #808080;

box-shadow:
inset 1px 1px white,
inset -1px -1px #808080;
}

/* HEADER */

.header{

padding:10px;

text-align:center;

background:#d4d0c8;

position:relative;
}

/* BACK BUTTON */

.back-btn{

position:absolute;

left:15px;
top:15px;

padding:6px 14px;

background:#dcdcdc;

border-top:1px solid white;
border-left:1px solid white;

border-right:1px solid #808080;
border-bottom:1px solid #808080;

cursor:pointer;

font-weight:bold;

font-size:12px;
}

/* LOGO */

.logo{

width:65px;
height:65px;

margin:auto;

background:white;

border-radius:50%;

display:flex;

align-items:center;
justify-content:center;

overflow:hidden;

border:2px solid #808080;

margin-bottom:8px;
}

.logo img{

width:100%;
height:100%;

object-fit:cover;
}

/* TITLE */

.title{

font-size:28px;

font-weight:bold;

margin-bottom:10px;

color:#000;
}

/* SELECT */

select{

width:320px;

padding:8px;

border:1px solid #808080;

font-size:13px;

background:white;
}

/* EMPLOYEE INFO */

.employee-info{

margin-top:10px;

line-height:1.5;

font-size:15px;

font-weight:bold;

color:#000;
}

/* CLOCK */

.clock{

font-size:32px;

font-weight:bold;

margin-top:10px;

color:#000;
}

.date{

font-size:18px;

margin-top:3px;

color:#000;
}

/* BUTTONS */

.button-group{

display:flex;

justify-content:center;

gap:8px;

flex-wrap:wrap;

margin:18px 0;
}

.action-btn{

padding:10px 20px;

font-size:13px;

font-weight:bold;

cursor:pointer;

border-top:1px solid white;
border-left:1px solid white;

border-right:1px solid #808080;
border-bottom:1px solid #808080;

color:white;

min-width:120px;
}

.timein{
background:#008000;
}

.breakout{
background:#c58a00;
}

.breakin{
background:#0066cc;
}

.timeout{
background:#cc0000;
}

/* TABLE */

.table-wrapper{

overflow-x:auto;
overflow-y:auto;

max-height:300px;

background:white;

border-top:2px solid #808080;
}

/* SCROLLBAR */

.table-wrapper::-webkit-scrollbar{
height:12px;
width:12px;
}

.table-wrapper::-webkit-scrollbar-track{
background:#d4d0c8;
}

.table-wrapper::-webkit-scrollbar-thumb{
background:#808080;
}

/* TABLE */

table{

width:100%;

border-collapse:collapse;

min-width:1400px;

font-size:12px;
}

th,
td{

border:1px solid #808080;

padding:8px;

text-align:center;

white-space:nowrap;
}

th{

background:#dcdcdc;

position:sticky;

top:0;

z-index:2;
}

/* STATUS */

.late{

color:red;

font-weight:bold;
}

@media(max-width:768px){

.title{
font-size:22px;
}

.clock{
font-size:26px;
}

.employee-info{
font-size:13px;
}

select{
width:100%;
}

.button-group{
flex-direction:column;
}

.action-btn{
width:100%;
}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<button
class="back-btn"
onclick="window.history.back()">

← BACK

</button>

<!-- SMALL LOGO -->

<div class="logo">

<img
src="https://i.imgur.com/8Km9tLL.png">

</div>

<div class="title">
EMPLOYEE ATTENDANCE
</div>

<!-- EMPLOYEE SELECT -->

<select
id="employeeSelect"
onchange="selectEmployee()">

<option value="">
Select Employee
</option>

</select>

<!-- EMPLOYEE INFO -->

<div class="employee-info">

<div id="employeeId">
EMPLOYEE ID :
</div>

<div id="employeeName">
EMPLOYEE NAME :
</div>

</div>

<!-- CLOCK -->

<div
class="clock"
id="clock">

00:00:00

</div>

<div
class="date"
id="dateToday">

DATE

</div>

<!-- BUTTONS -->

<div class="button-group">

<button
class="action-btn timein"
onclick="timeIn()">

TIME IN

</button>

<button
class="action-btn breakout"
onclick="breakOut()">

BREAK OUT

</button>

<button
class="action-btn breakin"
onclick="breakIn()">

BREAK IN

</button>

<button
class="action-btn timeout"
onclick="timeOut()">

TIME OUT

</button>

</div>

</div>

<!-- TABLE -->

<div class="table-wrapper">

<table id="attendanceTable">

<thead>

<tr>

<th>DATE</th>
<th>EMP ID</th>
<th>EMPLOYEE NAME</th>
<th>TIME IN</th>
<th>BREAK OUT</th>
<th>BREAK IN</th>
<th>TIME OUT</th>
<th>BREAK MINUTES</th>
<th>TOTAL HOURS</th>
<th>LATE</th>
<th>STATUS</th>

</tr>

</thead>

<tbody></tbody>

</table>

</div>

</div>

<script>

/* CLOCK */

function updateClock(){

let now = new Date();

clock.innerText =
now.toLocaleTimeString();

dateToday.innerText =
now.toDateString();

}

setInterval(updateClock,1000);

updateClock();

/* LOAD EMPLOYEES */

function loadEmployees(){

let employees =

JSON.parse(
localStorage.getItem('employees')
) || [];

let select =

document.getElementById(
'employeeSelect'
);

select.innerHTML =

'<option value="">Select Employee</option>';

employees.forEach((emp,index)=>{

let firstName = emp[0];
let middleName = emp[1];
let lastName = emp[2];

let empId = emp[18];

let fullName =

firstName + ' ' +
middleName + ' ' +
lastName;

select.innerHTML += `

<option value="${index}">

${empId} - ${fullName}

</option>

`;

});

}

/* SELECT EMPLOYEE */

function selectEmployee(){

let employees =

JSON.parse(
localStorage.getItem('employees')
) || [];

let index =
employeeSelect.value;

if(index === '') return;

let emp = employees[index];

let fullName =

emp[0] + ' ' +
emp[1] + ' ' +
emp[2];

document.getElementById(
'employeeId'
).innerText =

'EMPLOYEE ID : ' + emp[18];

document.getElementById(
'employeeName'
).innerText =

'EMPLOYEE NAME : ' + fullName;

}

/* ATTENDANCE STORAGE */

let attendance =

JSON.parse(
localStorage.getItem('attendance')
) || [];

/* GET TODAY */

function getToday(){

let d = new Date();

return (
d.getMonth()+1
) + '/' +
d.getDate() + '/' +
d.getFullYear();

}

/* GET TIME */

function getTime(){

return new Date()
.toLocaleTimeString();

}

/* TIME IN */

function timeIn(){

if(employeeSelect.value===''){

alert('Select Employee');

return;

}

let employees =

JSON.parse(
localStorage.getItem('employees')
) || [];

let emp =
employees[employeeSelect.value];

let fullName =

emp[0] + ' ' +
emp[1] + ' ' +
emp[2];

let data = {

date:getToday(),

empid:emp[18],

name:fullName,

timein:getTime(),

breakout:'-',

breakin:'-',

timeout:'-',

breakminutes:'0 mins',

totalhours:'0',

late:'0 mins',

status:'PRESENT'

};

attendance.push(data);

localStorage.setItem(
'attendance',
JSON.stringify(attendance)
);

renderAttendance();

}

/* BREAK OUT */

function breakOut(){

if(attendance.length===0) return;

attendance[
attendance.length-1
].breakout = getTime();

localStorage.setItem(
'attendance',
JSON.stringify(attendance)
);

renderAttendance();

}

/* BREAK IN */

function breakIn(){

if(attendance.length===0) return;

attendance[
attendance.length-1
].breakin = getTime();

localStorage.setItem(
'attendance',
JSON.stringify(attendance)
);

renderAttendance();

}

/* TIME OUT */

function timeOut(){

if(attendance.length===0) return;

attendance[
attendance.length-1
].timeout = getTime();

localStorage.setItem(
'attendance',
JSON.stringify(attendance)
);

renderAttendance();

}

/* RENDER */

function renderAttendance(){

let table =

document.querySelector(
'#attendanceTable tbody'
);

table.innerHTML='';

attendance.forEach(att=>{

table.innerHTML += `

<tr>

<td>${att.date}</td>
<td>${att.empid}</td>
<td>${att.name}</td>
<td>${att.timein}</td>
<td>${att.breakout}</td>
<td>${att.breakin}</td>
<td>${att.timeout}</td>
<td>${att.breakminutes}</td>
<td>${att.totalhours}</td>

<td class="late">
${att.late}
</td>

<td class="late">
${att.status}
</td>

</tr>

`;

});

}

/* AUTO LOAD */

loadEmployees();

renderAttendance();

</script>

</body>
</html>
