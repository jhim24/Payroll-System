<!DOCTYPE html>
<html>
<head>

<title>Employee Attendance</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#d4d0c8;
padding:10px;
}

/* CONTAINER */

.container{

max-width:1300px;

margin:auto;

background:#c0c0c0;

border:2px solid #808080;

box-shadow:
inset 1px 1px white,
inset -1px -1px #808080;
}

/* HEADER */

.header{

padding:10px;

text-align:center;

background:#d4d0c8;

position:relative;
}

/* BUTTONS */

.top-btn{

padding:6px 14px;

cursor:pointer;

font-weight:bold;

font-size:12px;

border-top:1px solid white;
border-left:1px solid white;

border-right:1px solid #808080;
border-bottom:1px solid #808080;
}

.back-btn{

position:absolute;

left:15px;
top:15px;

background:#dcdcdc;
}

.print-btn{

position:absolute;

right:15px;
top:15px;

background:#008000;

color:white;
}

/* LOGO */

.logo{

width:65px;
height:65px;

margin:auto;

background:white;

border-radius:50%;

display:flex;

align-items:center;
justify-content:center;

overflow:hidden;

border:2px solid #808080;

margin-bottom:8px;
}

.logo img{

width:100%;
height:100%;

object-fit:cover;
}

/* TITLE */

.title{

font-size:28px;

font-weight:bold;

margin-bottom:10px;
}

/* FILTERS */

.filter-section{

display:flex;

justify-content:center;

gap:10px;

flex-wrap:wrap;

margin-top:15px;
}

select{

padding:8px;

border:1px solid #808080;

font-size:13px;

min-width:220px;
}

/* EMPLOYEE INFO */

.employee-info{

margin-top:15px;

line-height:1.5;

font-size:15px;

font-weight:bold;
}

/* CLOCK */

.clock{

font-size:30px;

font-weight:bold;

margin-top:10px;
}

.date{

font-size:18px;

margin-top:3px;
}

/* ACTION BUTTONS */

.button-group{

display:flex;

justify-content:center;

gap:8px;

flex-wrap:wrap;

margin:18px 0;
}

.action-btn{

padding:10px 20px;

font-size:13px;

font-weight:bold;

cursor:pointer;

border-top:1px solid white;
border-left:1px solid white;

border-right:1px solid #808080;
border-bottom:1px solid #808080;

color:white;

min-width:120px;
}

.timein{
background:#008000;
}

.breakout{
background:#c58a00;
}

.breakin{
background:#0066cc;
}

.timeout{
background:#cc0000;
}

/* TABLE */

.table-wrapper{

overflow:auto;

max-height:350px;

background:white;

margin-top:10px;
}

.table-wrapper::-webkit-scrollbar{
width:0;
height:0;
}

table{

width:100%;

border-collapse:collapse;

min-width:1400px;

font-size:12px;
}

th,
td{

border:1px solid #808080;

padding:8px;

text-align:center;

white-space:nowrap;
}

th{

background:#dcdcdc;

position:sticky;

top:0;
}

/* SUMMARY */

.summary{

margin-top:15px;

background:white;

padding:15px;

border:1px solid #808080;

font-weight:bold;

line-height:1.8;
}

/* SIGNATURE */

.signature{

margin-top:50px;

display:flex;

justify-content:space-between;

text-align:center;
}

.line{

margin-top:50px;

border-top:1px solid black;

padding-top:5px;

width:250px;
}

/* PRINT */

@media print{

@page{
size:landscape;
margin:10mm;
}

body{
background:white;
padding:0;
zoom:85%;
}

.back-btn,
.print-btn,
.button-group,
.filter-section,
.clock,
.date{

display:none !important;
}

.container{

border:none !important;
box-shadow:none !important;

background:white;
}

.table-wrapper{

overflow:visible !important;

max-height:none !important;
}

table{

min-width:100% !important;

font-size:10px;
}

th,
td{

white-space:normal !important;

padding:4px;
}

}

/* MOBILE */

@media(max-width:768px){

.filter-section{
flex-direction:column;
}

select{
width:100%;
}

.button-group{
flex-direction:column;
}

.action-btn{
width:100%;
}

}

</style>

</head>

<body>

<div class="container">

<!-- HEADER -->

<div class="header">

<button
class="top-btn back-btn"
onclick="window.history.back()">

← BACK

</button>

<button
class="top-btn print-btn"
onclick="printAttendance()">

🖨 PRINT DTR

</button>

<div class="logo">

<img
src="https://i.imgur.com/8Km9tLL.png">

</div>

<div class="title">
EMPLOYEE ATTENDANCE
</div>

<!-- FILTER -->

<div class="filter-section">

<select
id="employeeSelect"
onchange="filterAttendance()">

<option value="">
Select Employee
</option>

</select>

<select
id="cutoffSelect"
onchange="filterAttendance()">

<option value="">
Select Cutoff
</option>

<option value="6-20">
6 to 20
</option>

<option value="21-5">
21 to 5
</option>

</select>

</div>

<!-- INFO -->

<div class="employee-info">

<div id="employeeId">
EMPLOYEE ID :
</div>

<div id="employeeName">
EMPLOYEE NAME :
</div>

</div>

<!-- CLOCK -->

<div
class="clock"
id="clock">

00:00:00

</div>

<div
class="date"
id="dateToday">

DATE

</div>

<!-- BUTTONS -->

<div class="button-group">

<button
class="action-btn timein"
onclick="timeIn()">

TIME IN

</button>

<button
class="action-btn breakout"
onclick="breakOut()">

BREAK OUT

</button>

<button
class="action-btn breakin"
onclick="breakIn()">

BREAK IN

</button>

<button
class="action-btn timeout"
onclick="timeOut()">

TIME OUT

</button>

</div>

<!-- TABLE -->

<div class="table-wrapper">

<table>

<thead>

<tr>

<th>DATE</th>
<th>EMP ID</th>
<th>EMPLOYEE NAME</th>
<th>TIME IN</th>
<th>BREAK OUT</th>
<th>BREAK IN</th>
<th>TIME OUT</th>
<th>BREAK MINUTES</th>
<th>TOTAL HOURS</th>
<th>LATE</th>
<th>STATUS</th>

</tr>

</thead>

<tbody id="attendanceBody">

</tbody>

</table>

</div>

<!-- SUMMARY -->

<div class="summary">

<div id="totalDays">
TOTAL DAYS : 0
</div>

<div id="totalRecords">
TOTAL RECORDS : 0
</div>

</div>

<!-- SIGNATURE -->

<div class="signature">

<div>

<div class="line">
EMPLOYER SIGNATURE
</div>

</div>

<div>

<div class="line">
EMPLOYEE SIGNATURE
</div>

</div>

</div>

</div>

<script>

/* CLOCK */

function updateClock(){

let now = new Date();

clock.innerText =
now.toLocaleTimeString();

dateToday.innerText =
now.toDateString();

}

setInterval(updateClock,1000);

updateClock();

/* EMPLOYEES */

function loadEmployees(){

let employees =

JSON.parse(
localStorage.getItem('employees')
) || [];

employeeSelect.innerHTML =
'<option value="">Select Employee</option>';

employees.forEach((emp,index)=>{

let fullName =

(emp[0] || '') + ' ' +
(emp[1] || '') + ' ' +
(emp[2] || '');

let empId =
emp[18] || 'NO-ID';

employeeSelect.innerHTML += `

<option value="${fullName}">

${empId} - ${fullName}

</option>

`;

});

}

/* STORAGE */

let attendance =

JSON.parse(
localStorage.getItem('attendance')
) || [];

/* DATE */

function getToday(){

let d = new Date();

return (
d.getMonth()+1
) + '/' +
d.getDate() + '/' +
d.getFullYear();

}

function getTime(){

return new Date()
.toLocaleTimeString();

}

/* TIME IN */

function timeIn(){

if(employeeSelect.value===''){

alert('Select Employee');

return;

}

let fullName =
employeeSelect.value;

let empId =
'EMP-' + Math.floor(
Math.random()*9999
);

let data = {

date:getToday(),

empid:empId,

name:fullName,

timein:getTime(),

breakout:'-',

breakin:'-',

timeout:'-',

breakminutes:'0 mins',

totalhours:'0',

late:'0 mins',

status:'PRESENT'

};

attendance.push(data);

localStorage.setItem(
'attendance',
JSON.stringify(attendance)
);

filterAttendance();

}

/* BREAK OUT */

function breakOut(){

if(attendance.length===0) return;

attendance[
attendance.length-1
].breakout = getTime();

localStorage.setItem(
'attendance',
JSON.stringify(attendance)
);

filterAttendance();

}

/* BREAK IN */

function breakIn(){

if(attendance.length===0) return;

attendance[
attendance.length-1
].breakin = getTime();

localStorage.setItem(
'attendance',
JSON.stringify(attendance)
);

filterAttendance();

}

/* TIME OUT */

function timeOut(){

if(attendance.length===0) return;

attendance[
attendance.length-1
].timeout = getTime();

localStorage.setItem(
'attendance',
JSON.stringify(attendance)
);

filterAttendance();

}

/* FILTER */

function filterAttendance(){

let emp =
employeeSelect.value;

let cutoff =
cutoffSelect.value;

let tbody =
document.getElementById(
'attendanceBody'
);

tbody.innerHTML = '';

let filtered = attendance.filter(att=>{

let empMatch =
emp === '' ||
att.name === emp;

if(cutoff===''){

return empMatch;

}

let dateParts =
att.date.split('/');

let day =
parseInt(dateParts[1]);

if(cutoff==='6-20'){

return empMatch &&
day >= 6 &&
day <= 20;

}

if(cutoff==='21-5'){

return empMatch &&
(day >= 21 ||
day <= 5);

}

});

if(filtered.length===0){

tbody.innerHTML = `

<tr>

<td colspan="11">

NO ATTENDANCE RECORD

</td>

</tr>

`;

totalDays.innerText =
'TOTAL DAYS : 0';

totalRecords.innerText =
'TOTAL RECORDS : 0';

return;

}

filtered.forEach(att=>{

let row =
document.createElement('tr');

row.innerHTML = `

<td>${att.date}</td>
<td>${att.empid}</td>
<td>${att.name}</td>
<td>${att.timein}</td>
<td>${att.breakout}</td>
<td>${att.breakin}</td>
<td>${att.timeout}</td>
<td>${att.breakminutes}</td>
<td>${att.totalhours}</td>
<td>${att.late}</td>
<td>${att.status}</td>

`;

tbody.appendChild(row);

});

totalDays.innerText =
'TOTAL DAYS : ' +
filtered.length;

totalRecords.innerText =
'TOTAL RECORDS : ' +
filtered.length;

employeeId.innerText =
'EMPLOYEE ID : FILTERED';

employeeName.innerText =
'EMPLOYEE NAME : ' +
(emp || 'ALL');

}

/* PRINT */

function printAttendance(){

window.print();

}

/* AUTO LOAD */

loadEmployees();

filterAttendance();

</script>

</body>
</html>
