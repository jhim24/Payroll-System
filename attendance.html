<!DOCTYPE html>
<html>
<head>

<title>Employee Masterlist</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#1f1f1f;
padding:15px;
color:white;
}

/* CONTAINER */

.container{

max-width:1400px;

margin:auto;

background:#2b2b2b;

border:2px solid #ffcc00;

border-radius:15px;

padding:15px;

box-shadow:0 5px 15px rgba(0,0,0,0.5);
}

/* TOP BAR */

.top-bar{

display:flex;

justify-content:space-between;

align-items:center;

flex-wrap:wrap;

gap:10px;

margin-bottom:15px;
}

.title{

font-size:30px;

font-weight:bold;

color:#ffcc00;

text-shadow:2px 2px 5px black;
}

/* BUTTON */

.btn{

padding:10px 18px;

border:none;

border-radius:10px;

cursor:pointer;

font-weight:bold;

font-size:13px;

transition:0.3s;

box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

.btn:hover{

transform:translateY(-2px);

filter:brightness(1.1);
}

.add-btn{

background:linear-gradient(
135deg,
#00cc66,
#00994d
);

color:white;
}

.back-btn{

background:linear-gradient(
135deg,
#ffcc00,
#ff6600
);

color:black;
}

.save-btn{

background:linear-gradient(
135deg,
#00cc66,
#00994d
);

color:white;
}

.edit-btn{

background:#0066cc;

color:white;

padding:6px 12px;
}

.delete-btn{

background:#cc0000;

color:white;

padding:6px 12px;
}

.close-btn{

background:#444;

color:white;

position:absolute;

top:10px;
right:10px;
}

/* SEARCH */

.search-box input{

padding:10px;

width:250px;

border:2px solid #ffcc00;

border-radius:8px;

background:#1f1f1f;

color:white;
}

/* TABLE */

.table-wrapper{

overflow:auto;

max-height:70vh;

border:2px solid #ffcc00;

border-radius:10px;

background:#2b2b2b;
}

table{

width:100%;

border-collapse:collapse;

min-width:3000px;

font-size:12px;
}

th,
td{

border:1px solid #555;

padding:8px;

text-align:left;

white-space:nowrap;
}

th{

background:#ffcc00;

color:black;

position:sticky;

top:0;

z-index:2;
}

tr:nth-child(even){

background:#242424;
}

tr:hover{

background:#3a3a3a;
}

/* MODAL */

.modal{

display:none;

position:fixed;

inset:0;

background:rgba(0,0,0,0.6);

justify-content:center;

align-items:center;

z-index:999;
}

.modal-box{

background:#2b2b2b;

width:95%;

max-width:1200px;

height:95vh;

overflow:auto;

padding:20px;

border-radius:15px;

border:3px solid #ffcc00;

position:relative;
}

/* TABS */

.classic-tabs{

display:flex;

gap:5px;

flex-wrap:wrap;

margin-top:15px;
}

.tab-btn{

padding:10px 18px;

border:none;

cursor:pointer;

font-weight:bold;

background:#444;

color:white;

border-radius:8px;
}

.tab-btn.active{

background:#ffcc00;

color:black;
}

/* CONTENT */

.tab-content{

display:none;

margin-top:15px;

background:#333;

padding:15px;

border-radius:10px;
}

.tab-content.active{

display:block;
}

/* FORM */

.form-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:12px;
}

input,
select{

width:100%;

padding:10px;

border-radius:8px;

border:2px solid #555;

background:#1f1f1f;

color:white;
}

input:focus,
select:focus{

outline:none;

border-color:#ffcc00;
}

/* TOTAL */

.total{

margin-bottom:10px;

font-size:18px;

font-weight:bold;

color:#ff4444;
}

</style>

</head>

<body>

<div class="container">

<div class="top-bar">

<button
class="btn back-btn"
onclick="window.location.href='index.html'">

← BACK

</button>

<div class="title">
EMPLOYEE MASTERLIST
</div>

<div style="display:flex;gap:10px;flex-wrap:wrap;">

<div class="search-box">

<input
type="text"
id="search"
placeholder="Search Employee..."
onkeyup="searchEmployee()">

</div>

<button
class="btn add-btn"
onclick="openModal()">

+ ADD EMPLOYEE

</button>

</div>

</div>

<div
class="total"
id="total">

TOTAL : 0

</div>

<!-- TABLE -->

<div class="table-wrapper">

<table>

<thead>

<tr>

<th>FIRST NAME</th>
<th>MIDDLE NAME</th>
<th>LAST NAME</th>
<th>BIRTHDATE</th>
<th>AGE</th>
<th>GENDER</th>

<th>SSS</th>
<th>PHILHEALTH</th>
<th>PAG-IBIG</th>
<th>HEALTH CARD</th>

<th>BANK NAME</th>
<th>BANK ACCOUNT</th>

<th>ID TYPE</th>
<th>ID NUMBER</th>

<th>MOBILE</th>
<th>EMAIL</th>
<th>CURRENT ADDRESS</th>
<th>PERMANENT ADDRESS</th>

<th>EMPLOYEE ID</th>
<th>POSITION</th>
<th>DEPARTMENT</th>
<th>EMPLOYMENT</th>
<th>SALARY RATE</th>

<th>ACTION</th>

</tr>

</thead>

<tbody id="employeeBody">

</tbody>

</table>

</div>

</div>

<!-- MODAL -->

<div
class="modal"
id="employeeModal">

<div class="modal-box">

<button
class="btn close-btn"
onclick="closeModal()">

X

</button>

<h2 style="color:#ffcc00;">
EMPLOYEE INFORMATION
</h2>

<!-- TABS -->

<div class="classic-tabs">

<button
class="tab-btn active"
onclick="openTab(event,'personal')">

PERSONAL INFO

</button>

<button
class="tab-btn"
onclick="openTab(event,'government')">

GOVERNMENT INFO

</button>

<button
class="tab-btn"
onclick="openTab(event,'contact')">

CONTACT INFO

</button>

<button
class="tab-btn"
onclick="openTab(event,'employment')">

EMPLOYMENT INFO

</button>

</div>

<!-- PERSONAL -->

<div
id="personal"
class="tab-content active">

<div class="form-grid">

<input class="emp-field" placeholder="First Name">
<input class="emp-field" placeholder="Middle Name">
<input class="emp-field" placeholder="Last Name">

<input
class="emp-field"
type="date"
id="birthdate"
onchange="calcAge()">

<input
class="emp-field"
id="age"
placeholder="Age"
readonly>

<select class="emp-field">

<option value="">
Gender
</option>

<option>Male</option>
<option>Female</option>

</select>

</div>

</div>

<!-- GOVERNMENT -->

<div
id="government"
class="tab-content">

<div class="form-grid">

<input class="emp-field" placeholder="SSS Number">
<input class="emp-field" placeholder="PhilHealth Number">
<input class="emp-field" placeholder="Pag-IBIG Number">
<input class="emp-field" placeholder="Health Card Number">

<input class="emp-field" placeholder="Bank Name">
<input class="emp-field" placeholder="Bank Account Number">

<select class="emp-field">

<option value="">
ID Type
</option>

<option>Passport</option>
<option>Driver License</option>
<option>National ID</option>
<option>Company ID</option>

</select>

<input class="emp-field" placeholder="ID Number">

</div>

</div>

<!-- CONTACT -->

<div
id="contact"
class="tab-content">

<div class="form-grid">

<input class="emp-field" placeholder="Mobile Number">
<input class="emp-field" placeholder="Email Address">
<input class="emp-field" placeholder="Current Address">
<input class="emp-field" placeholder="Permanent Address">

</div>

</div>

<!-- EMPLOYMENT -->

<div
id="employment"
class="tab-content">

<div class="form-grid">

<input class="emp-field" placeholder="Employee ID">
<input class="emp-field" placeholder="Position">
<input class="emp-field" placeholder="Department">

<select class="emp-field">

<option value="">
Employment Status
</option>

<option>Regular</option>
<option>Probationary</option>
<option>Contractual</option>

</select>

<input class="emp-field" placeholder="Salary Rate">

</div>

</div>

<br>

<button
class="btn save-btn"
onclick="saveEmployee()">

SAVE EMPLOYEE

</button>

</div>

</div>

<script type="module">

/* FIREBASE */

import { initializeApp }

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc

}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

/* FIREBASE CONFIG */

const firebaseConfig = {

apiKey: "AIzaSyAehoq0teVYHiJ4bkKOgBqIgJZrQpce3k8",

authDomain: "hr-system-38fc3.firebaseapp.com",

projectId: "hr-system-38fc3",

storageBucket: "hr-system-38fc3.firebasestorage.app",

messagingSenderId: "615471610834",

appId: "1:615471610834:web:a0d671d4e3f4c1b57b660b"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* VARIABLES */

let employees = [];

let editId = null;

/* MODAL */

window.openModal = function(){

employeeModal.style.display='flex';

}

window.closeModal = function(){

employeeModal.style.display='none';

clearForm();

}

/* TABS */

window.openTab = function(evt,id){

document.querySelectorAll('.tab-content')

.forEach(tab=>{

tab.classList.remove('active');

});

document.getElementById(id)

.classList.add('active');

document.querySelectorAll('.tab-btn')

.forEach(btn=>{

btn.classList.remove('active');

});

evt.currentTarget.classList.add('active');

}

/* AGE */

window.calcAge = function(){

let birth =
new Date(birthdate.value);

let today =
new Date();

let ageValue =

today.getFullYear() -
birth.getFullYear();

age.value = ageValue;

}

/* SAVE */

window.saveEmployee =
async function(){

let fields =

document.querySelectorAll(
'.emp-field'
);

let data = [];

fields.forEach(field=>{

data.push(field.value);

});

let employeeData = {

firstname:data[0] || '',
middlename:data[1] || '',
lastname:data[2] || '',
birthdate:data[3] || '',
age:data[4] || '',
gender:data[5] || '',

sss:data[6] || '',
philhealth:data[7] || '',
pagibig:data[8] || '',
healthcard:data[9] || '',

bankname:data[10] || '',
bankaccount:data[11] || '',
idtype:data[12] || '',
idnumber:data[13] || '',

mobile:data[14] || '',
email:data[15] || '',
currentaddress:data[16] || '',
permanentaddress:data[17] || '',

employeeid:data[18] || '',
position:data[19] || '',
department:data[20] || '',
employment:data[21] || '',
salary:data[22] || ''

};

try{

if(editId){

await updateDoc(

doc(db,'employees',editId),

employeeData

);

alert('Employee Updated');

}else{

await addDoc(

collection(db,'employees'),

employeeData

);

alert('Employee Saved');

}

closeModal();

loadEmployees();

}catch(error){

console.log(error);

alert('Save Error');

}

}

/* LOAD */

async function loadEmployees(){

employees = [];

employeeBody.innerHTML='';

let snapshot =

await getDocs(
collection(db,'employees')
);

snapshot.forEach(docSnap=>{

employees.push({

id:docSnap.id,

...docSnap.data()

});

});

renderTable();

}

/* RENDER */

function renderTable(){

employeeBody.innerHTML='';

employees.forEach(emp=>{

employeeBody.innerHTML += `

<tr>

<td>${emp.firstname}</td>
<td>${emp.middlename}</td>
<td>${emp.lastname}</td>
<td>${emp.birthdate}</td>
<td>${emp.age}</td>
<td>${emp.gender}</td>

<td>${emp.sss}</td>
<td>${emp.philhealth}</td>
<td>${emp.pagibig}</td>
<td>${emp.healthcard}</td>

<td>${emp.bankname}</td>
<td>${emp.bankaccount}</td>

<td>${emp.idtype}</td>
<td>${emp.idnumber}</td>

<td>${emp.mobile}</td>
<td>${emp.email}</td>
<td>${emp.currentaddress}</td>
<td>${emp.permanentaddress}</td>

<td>${emp.employeeid}</td>
<td>${emp.position}</td>
<td>${emp.department}</td>
<td>${emp.employment}</td>
<td>${emp.salary}</td>

<td>

<button
class="btn edit-btn"
onclick="editEmployee('${emp.id}')">

EDIT

</button>

<button
class="btn delete-btn"
onclick="deleteEmployee('${emp.id}')">

DELETE

</button>

</td>

</tr>

`;

});

total.innerText =
'TOTAL : ' + employees.length;

}

/* EDIT */

window.editEmployee = function(id){

let emp = employees.find(e=>e.id===id);

if(!emp) return;

openModal();

editId = id;

let values = [

emp.firstname,
emp.middlename,
emp.lastname,
emp.birthdate,
emp.age,
emp.gender,

emp.sss,
emp.philhealth,
emp.pagibig,
emp.healthcard,

emp.bankname,
emp.bankaccount,
emp.idtype,
emp.idnumber,

emp.mobile,
emp.email,
emp.currentaddress,
emp.permanentaddress,

emp.employeeid,
emp.position,
emp.department,
emp.employment,
emp.salary

];

document.querySelectorAll('.emp-field')

.forEach((field,index)=>{

field.value = values[index] || '';

});

}

/* DELETE */

window.deleteEmployee =
async function(id){

if(confirm('Delete Employee?')){

await deleteDoc(

doc(db,'employees',id)

);

loadEmployees();

}

}

/* SEARCH */

window.searchEmployee = function(){

let value =
search.value.toLowerCase();

let rows =

document.querySelectorAll(
'#employeeBody tr'
);

rows.forEach(row=>{

row.style.display =

row.innerText
.toLowerCase()
.includes(value)

? ''

: 'none';

});

}

/* CLEAR */

function clearForm(){

editId = null;

document.querySelectorAll('.emp-field')

.forEach(field=>{

field.value='';

});

}

/* AUTO LOAD */

loadEmployees();

</script>

</body>
</html>
